 by mirroring them.</p>\n    <p class=\"law-body\">Asymmetric balance is more interesting than symmetric balance. A large light element on the left can balance a small dark element on the right. This is why the best layouts feel dynamic \u2014 they balance without being boring.</p>\n\n    <div class=\"law-example\">\n      <div class=\"law-example-label\">The Squint Test</div>\n      <p>Half-close your eyes when looking at a layout. Does it feel balanced? Does one side feel too heavy? This removes detail and lets you perceive pure visual weight. Designers do this constantly \u2014 it's the fastest way to diagnose balance problems without measuring anything.</p>\n    </div>\n    <div class=\"callout-amber callout\" style=\"margin-top:20px\">\n      <p class=\"callout-label\">Prompt Language</p>\n      <p>\"The left side of the hero feels too heavy \u2014 the text block is dense and the right side is empty. Balance it by either moving some text right, or adding a subtle visual element on the right side.\"</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- LAW 6: PROXIMITY -->\n<section>\n<div class=\"wrap\">\n  <div class=\"law-card reveal\">\n    <div class=\"law-num\">06</div>\n    <span class=\"law-icon\">\ud83e\uddf2</span>\n    <div class=\"law-name\">Proximity \u2014 Things near each other feel related.</div>\n    <div class=\"law-tagline\">The brain groups things that are close together.</div>\n    <p class=\"law-body\">Proximity is Gestalt psychology applied to design. When elements are physically close, users assume they're related. When they're far apart, they're perceived as separate. This governs card design, form layout, navigation structure \u2014 everywhere you group content.</p>\n    <p class=\"law-body\">A heading and the paragraph below it should be much closer to each other than to the previous section. The button for a product should be visually glued to that product. The icon and its label should nearly touch. Violating proximity creates confusion even when the logic is correct.</p>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0\">\n      <div style=\"padding:24px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border2)\">\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:var(--ink);margin-bottom:20px\">Product Name</div>\n        <div style=\"font-size:12px;color:var(--ink3);margin-bottom:20px\">Description of the product and its benefits in a brief line.</div>\n        <div style=\"margin-bottom:20px\"><span style=\"padding:6px 14px;background:var(--fire);color:white;border-radius:100px;font-size:11px;font-family:'DM Mono',monospace\">Buy Now</span></div>\n        <div style=\"font-size:11px;color:var(--ink4)\">\u2190 Button is far from name. Related things feel unrelated.</div>\n      </div>\n      <div style=\"padding:24px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border2)\">\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:var(--ink);margin-bottom:4px\">Product Name</div>\n        <div style=\"font-size:12px;color:var(--ink3);margin-bottom:16px\">Description of the product and its benefits in a brief line.</div>\n        <div><span style=\"padding:6px 14px;background:var(--fire);color:white;border-radius:100px;font-size:11px;font-family:'DM Mono',monospace\">Buy Now</span></div>\n        <div style=\"font-size:11px;color:var(--ink4);margin-top:16px\">\u2190 Button is close to name. Feels like a cohesive unit.</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- LAW 7: REPETITION -->\n<section>\n<div class=\"wrap\">\n  <div class=\"law-card reveal\">\n    <div class=\"law-num\">07</div>\n    <span class=\"law-icon\">\ud83d\udd04</span>\n    <div class=\"law-name\">Repetition \u2014 The rhythm that makes a system.</div>\n    <div class=\"law-tagline\">Repeat visual elements to create unity.</div>\n    <p class=\"law-body\">Repetition is how consistency becomes felt. When you use the same card style, the same heading treatment, the same button radius, the same color across your whole site \u2014 you're creating a rhythm. Users learn this rhythm unconsciously and it feels natural, reliable, designed.</p>\n    <p class=\"law-body\">Robin Williams (the designer, not the actor) defined repetition as: \"Repeat some aspect of the design throughout the entire piece.\" It can be a color, a shape, a spatial relationship, a texture, a typographic treatment. The point is that it recurs \u2014 signaling intentionality.</p>\n\n    <div class=\"callout-jade callout\">\n      <p class=\"callout-label\">What to Repeat Across Your Sites</p>\n      <p>The same orange accent color on all CTAs and highlights \u2192 the same border radius on all cards \u2192 the same mono font for all labels and eyebrows \u2192 the same shadow depth on all elevated surfaces \u2192 the same section spacing. These five repeated elements make any site look coherent and professional, even if nothing else is perfect.</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- LAW 8: ALIGNMENT -->\n<section>\n<div class=\"wrap\">\n  <div class=\"law-card reveal\">\n    <div class=\"law-num\">08</div>\n    <span class=\"law-icon\">\ud83d\udccf</span>\n    <div class=\"law-name\">Alignment \u2014 Nothing should be placed arbitrarily.</div>\n    <div class=\"law-tagline\">Every element should have a visual connection to the grid.</div>\n    <p class=\"law-body\">Alignment is invisible when it's right and glaring when it's wrong. Elements that are almost aligned but not quite create visual noise \u2014 the eye keeps trying to connect them and failing. Strict alignment on a grid creates clarity and calm.</p>\n    <p class=\"law-body\">Left-alignment is the default for western text (we read left to right). Centre-alignment is used sparingly \u2014 usually for short, impactful statements. Right-alignment is rare and intentional, used for contrast. Mixing all three without reason creates chaos.</p>\n\n    <div class=\"two-col\" style=\"margin-top:24px\">\n      <div class=\"card-sm\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sapphire);margin-bottom:14px\">Centre-align works for</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:1.9\">\n          Hero statements (1\u20133 lines)<br>\n          Testimonial quotes<br>\n          Section introductions<br>\n          Marketing taglines<br>\n          Award announcements\n        </div>\n      </div>\n      <div class=\"card-sm\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fire);margin-bottom:14px\">Left-align everything else</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:1.9\">\n          Body paragraphs (always)<br>\n          Navigation menus<br>\n          Card content<br>\n          Blog articles<br>\n          Form labels and inputs\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- LAW 9: EMOTION -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow eyebrow-fire\">The Meta-Law</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">Every design decision should serve an emotion.</h2>\n    <p class=\"body-text\">The laws above are technical. This one is philosophical \u2014 and it unifies all the others. Before every design decision, ask: what should the visitor feel? All eight laws are in service of this answer.</p>\n    <p class=\"body-text\">Trust requires: Consistent design system. Clean hierarchy. Generous white space. Stable, grounded layout.<br><br>\n    Excitement requires: High contrast. Dynamic asymmetry. Fast animations. Bold accent colors.<br><br>\n    Luxury requires: Extreme white space. Refined typography. Muted palette with one statement accent. Slow, deliberate motion.<br><br>\n    Energy requires: Tight spacing. Dense content. Vibrant colors. Quick, snappy animations.</p>\n\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:28px\">\n      <div style=\"padding:20px;background:rgba(46,111,212,.06);border:1px solid rgba(46,111,212,.12);border-radius:var(--r2);text-align:center\">\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--sapphire);margin-bottom:8px\">Trust</div>\n        <div style=\"font-size:12px;color:var(--ink3);line-height:1.6\">Consistent \u00b7 Clean \u00b7 Generous space \u00b7 Stable</div>\n      </div>\n      <div style=\"padding:20px;background:rgba(232,80,10,.06);border:1px solid rgba(232,80,10,.12);border-radius:var(--r2);text-align:center\">\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--fire);margin-bottom:8px\">Excitement</div>\n        <div style=\"font-size:12px;color:var(--ink3);line-height:1.6\">High contrast \u00b7 Bold \u00b7 Fast motion \u00b7 Dynamic</div>\n      </div>\n      <div style=\"padding:20px;background:rgba(212,136,10,.06);border:1px solid rgba(212,136,10,.12);border-radius:var(--r2);text-align:center\">\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--amber);margin-bottom:8px\">Luxury</div>\n        <div style=\"font-size:12px;color:var(--ink3);line-height:1.6\">Vast space \u00b7 Refined type \u00b7 Muted \u00b7 Slow motion</div>\n      </div>\n      <div style=\"padding:20px;background:rgba(31,122,92,.06);border:1px solid rgba(31,122,92,.12);border-radius:var(--r2);text-align:center\">\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--jade);margin-bottom:8px\">Calm</div>\n        <div style=\"font-size:12px;color:var(--ink3);line-height:1.6\">Soft colors \u00b7 Balanced \u00b7 Minimal motion \u00b7 Open</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- EXERCISE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"exercise reveal\">\n    <p class=\"eyebrow eyebrow-jade\">Chapter 02 \u2014 Exercise</p>\n    <h2 class=\"ex-title\">The Critique Framework \u2014 audit any site in 10 minutes.</h2>\n    <p class=\"ex-desc\">Pick a website \u2014 any website. Run it through all 8 laws. This is the exercise professional designers do when reviewing work. It trains your eye faster than anything else. Do this daily for a week and your design instinct will transform.</p>\n    <div class=\"ex-steps\">\n      <div class=\"ex-step\">\n        <div class=\"ex-n\">01</div>\n        <div class=\"ex-text\"><strong>Hierarchy:</strong> Squint at the page. Is there a clear visual path? Does one thing stand out most? What's first, second, third in visual priority?</div>\n      </div>\n      <div class=\"ex-step\">\n        <div class=\"ex-n\">02</div>\n        <div class=\"ex-text\"><strong>White space:</strong> Does the page feel generous or cramped? Can the content breathe? How much padding exists between sections? Is it enough?</div>\n      </div>\n      <div class=\"ex-step\">\n        <div class=\"ex-n\">03</div>\n        <div class=\"ex-text\"><strong>Contrast:</strong> Is there visual tension and interest? Or does everything feel same-weight? Look for size extremes and color drama.</div>\n      </div>\n      <div class=\"ex-step\">\n        <div class=\"ex-n\">04</div>\n        <div class=\"ex-text\"><strong>Consistency:</strong> Do all buttons look the same? Same card style everywhere? Same font treatment throughout? What's inconsistent and why does it bother you?</div>\n      </div>\n      <div class=\"ex-step\">\n        <div class=\"ex-n\">05</div>\n        <div class=\"ex-text\"><strong>Emotion:</strong> Without reading content, what does this design make you feel? Match the emotion to the laws being applied to create it.</div>\n      </div>\n      <div class=\"ex-step\">\n        <div class=\"ex-n\">06</div>\n        <div class=\"ex-text\">Now <strong>describe your findings to Claude</strong> and ask it to build a version that solves the problems you found. See what it produces.</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"ch-footer\">\n  <div class=\"ch-footer-inner\">\n    <a href=\"chapter-01.html\" class=\"ch-btn prev\">\n      <span class=\"ch-btn-arr\">\u2190</span>\n      <div><div class=\"ch-btn-label\">Previous</div><div class=\"ch-btn-title\">How the Web Works</div></div>\n    </a>\n    <div class=\"ch-center\"><div style=\"margin-bottom:6px\">Chapter 02 of 12</div><a href=\"index.html\">Design Mastery</a></div>\n    <a href=\"chapter-03.html\" class=\"ch-btn next\">\n      <div><div class=\"ch-btn-label\">Next Chapter</div><div class=\"ch-btn-title\">Typography</div></div>\n      <span class=\"ch-btn-arr\">\u2192</span>\n    </a>\n  </div>\n</div>\n\n<script>\ngsap.registerPlugin(ScrollTrigger);\nwindow.addEventListener('scroll',()=>{const s=document.documentElement.scrollTop,h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('pb').style.width=(s/h*100)+'%'});\ngsap.utils.toArray('.reveal').forEach((el,i)=>{gsap.fromTo(el,{opacity:0,y:44},{opacity:1,y:0,duration:.85,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 84%'},delay:(i%3)*.07})});\n<\/script>\n</body>\n</html>\n"</script>
<script type="application/json" id="ch-data-2">"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ch 03 \u2014 Typography \u00b7 Design Mastery</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;700;800&display=swap\" rel=\"stylesheet\">\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js\"><\/script>\n<style>\n:root{--bg:#f6f4f0;--bg2:#edeae4;--bg3:#e4e0d8;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.06);--ink:#100f0d;--ink2:#45433f;--ink3:#8c8880;--ink4:#b5b2ac;--fire:#e8500a;--amber:#d4880a;--amber2:#eaac40;--sapphire:#2e6fd4;--jade:#1f7a5c;--glass:rgba(255,255,255,.65);--glass2:rgba(255,255,255,.42);--sh2:0 8px 32px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.05);--sh3:0 20px 60px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.06);--sh4:0 40px 100px rgba(0,0,0,.13);--r1:8px;--r2:14px;--r3:22px;--ease-out:cubic-bezier(0.16,1,0.3,1);--ease-io:cubic-bezier(0.4,0,0.2,1)}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}*{scrollbar-width:none}*::-webkit-scrollbar{display:none}\nbody{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden}a{color:inherit;text-decoration:none}\nbody::after{content:'';position:fixed;inset:0;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/s :1px;background:linear-gradient(90deg,transparent,var(--border),transparent);position:relative;z-index:10}\n.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;gap:12px;margin-bottom:18px}\n.eyebrow::before{content:'';width:28px;height:1px;background:var(--amber);flex-shrink:0}\n.eyebrow-fire{color:var(--fire)}.eyebrow-fire::before{background:var(--fire)}\n.eyebrow-jade{color:var(--jade)}.eyebrow-jade::before{background:var(--jade)}\n.display{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink)}\n.display em{font-style:normal;background:linear-gradient(135deg,var(--amber),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.035em;line-height:1.1;color:var(--ink)}\n.h3{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.1rem,2vw,1.5rem);font-weight:700;letter-spacing:-.025em;color:var(--ink)}\n.lead{font-size:clamp(1rem,1.5vw,1.12rem);color:var(--ink2);line-height:1.8}\n.body-text{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:20px}\n.body-text:last-child{margin-bottom:0}\n.card{background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh3);padding:52px;position:relative;overflow:hidden}\n.card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.card-sm{background:var(--glass2);backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);padding:32px;position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s,background .3s}\n.card-sm::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.55) 0%,transparent 50%);pointer-events:none;border-radius:inherit}\n.card-sm:hover{transform:translateY(-6px);box-shadow:var(--sh3);background:var(--glass)}\n.callout{padding:24px 28px;border-radius:var(--r2);border-left:3px solid var(--amber);background:rgba(212,136,10,.04);margin:28px 0}\n.callout-blue{border-color:var(--sapphire);background:rgba(46,111,212,.04)}\n.callout-fire{border-color:var(--fire);background:rgba(232,80,10,.04)}\n.callout-jade{border-color:var(--jade);background:rgba(31,122,92,.04)}\n.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}\n.callout-blue .callout-label{color:var(--sapphire)}\n.callout-fire .callout-label{color:var(--fire)}\n.callout-jade .callout-label{color:var(--jade)}\n.callout p{font-size:14px;color:var(--ink2);line-height:1.75}\n.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:32px 0}\n.code-block{background:var(--ink);border-radius:var(--r2);padding:24px 28px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.9;color:#d4d0c8;overflow-x:auto;position:relative;margin:20px 0}\n.code-block .kw{color:#f0a050}.code-block .str{color:#7dd3a8}.code-block .cm{color:rgba(255,255,255,.28);font-style:italic}.code-block .prop{color:#c4b5fd}.code-block .val{color:#f9a8d4}\n.code-label{position:absolute;top:12px;right:16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.2)}\n\n/* FONT PAIR CARDS */\n.pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:32px 0}\n.pair-card{padding:36px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh2);position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s}\n.pair-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.pair-card:hover{transform:translateY(-6px);box-shadow:var(--sh4)}\n.pair-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}\n.pair-vibe{padding:4px 10px;background:var(--bg2);border-radius:100px;font-size:9px;letter-spacing:.08em}\n.pair-headline{line-height:1.1;letter-spacing:-.04em;color:var(--ink);margin-bottom:12px}\n.pair-body-sample{line-height:1.75;color:var(--ink2);margin-bottom:16px}\n.pair-usage{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--ink3);padding:10px 14px;background:var(--bg2);border-radius:var(--r1)}\n\n/* ANATOMY DIAGRAM */\n.anatomy-wrap{padding:40px;background:var(--bg2);border-radius:var(--r2);margin:28px 0;border:1px solid var(--border2);overflow:hidden}\n.anatomy-sample{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(60px,10vw,100px);font-weight:800;letter-spacing:-.05em;color:var(--ink);line-height:1;position:relative;display:inline-block;margin-bottom:24px}\n.anatomy-labels{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}\n.anat-item{padding:14px 18px;background:rgba(255,255,255,.5);border-radius:var(--r1);border:1px solid var(--border2)}\n.anat-term{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:4px}\n.anat-def{font-size:12px;color:var(--ink2);line-height:1.5}\n\n/* TRACKING DEMO */\n.tracking-demo{display:flex;flex-direction:column;gap:16px;margin:24px 0;padding:32px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border2)}\n.track-row{display:grid;grid-template-columns:140px 1fr;gap:20px;align-items:center}\n.track-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}\n.track-sample{font-family:'Bricolage Grotesque',sans-serif;font-size:32px;font-weight:800;color:var(--ink)}\n\n/* SCALE DEMO */\n.scale-demo{display:flex;flex-direction:column;gap:8px;padding:32px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border2);margin:24px 0}\n.scale-row{display:flex;align-items:baseline;gap:16px}\n.scale-size{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--ink3);min-width:50px}\n.scale-text{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;letter-spacing:-.04em;color:var(--ink);line-height:1.1}\n\n/* EXERCISE */\n.exercise{background:linear-gradient(135deg,rgba(31,122,92,.07),rgba(255,255,255,.4));border:1px solid rgba(31,122,92,.2);border-radius:var(--r3);padding:48px;position:relative;overflow:hidden;margin:48px 0}\n.exercise::before{content:'EXERCISE';position:absolute;top:24px;right:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(31,122,92,.4)}\n.ex-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}\n.ex-desc{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:28px}\n.ex-steps{display:flex;flex-direction:column;gap:12px}\n.ex-step{display:grid;grid-template-columns:32px 1fr;gap:14px;align-items:start;padding:16px 20px;background:rgba(255,255,255,.5);border-radius:var(--r2);border:1px solid rgba(31,122,92,.1)}\n.ex-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--jade);font-weight:500}\n.ex-text{font-size:14px;color:var(--ink2);line-height:1.65}.ex-text strong{color:var(--ink)}\n\n.ch-footer{position:relative;z-index:10;padding:60px 0 80px;border-top:1px solid var(--border)}\n.ch-footer-inner{max-width:900px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}\n.ch-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .35s var(--ease-out);text-decoration:none;color:inherit}\n.ch-btn:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateY(-3px)}\n.ch-btn-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}\n.ch-btn-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}\n.ch-btn.next{flex-direction:row-reverse;text-align:right}\n.ch-btn-arr{font-size:20px;color:var(--ink3);transition:transform .3s}\n.ch-btn.prev:hover .ch-btn-arr{transform:translateX(-4px)}\n.ch-btn.next:hover .ch-btn-arr{transform:translateX(4px)}\n.ch-center{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink4);text-align:center}\n.ch-center a{color:var(--fire)}\n.reveal{opacity:0;transform:translateY(40px)}\n@media(max-width:768px){.two-col,.pair-grid,.anatomy-labels{grid-template-columns:1fr}.track-row{grid-template-columns:1fr;gap:8px}.card{padding:32px 24px}.ch-footer-inner{flex-direction:column}}\n@media(max-width:480px){nav{display:none}}\n</style>\n</head>\n<body>\n\n<div class=\"orb o1\"></div><div class=\"orb o2\"></div>\n\n<section class=\"hero-sec\">\n<div class=\"wrap\">\n  <div style=\"opacity:0;animation:fU .7s cubic-bezier(0.16,1,0.3,1) .5s forwards\"><p class=\"eyebrow\">Chapter 03 \u2014 Visual Language</p></div>\n  <h1 class=\"display\" style=\"opacity:0;animation:fU .9s cubic-bezier(0.16,1,0.3,1) .65s forwards;margin-bottom:28px\">Typography:<br>your loudest<br><em>design voice.</em></h1>\n  <p class=\"lead\" style=\"opacity:0;animation:fU .9s cubic-bezier(0.16,1,0.3,1) .8s forwards;max-width:580px;margin-bottom:40px\">Fonts communicate personality before a single word is read. The right typeface can make the same content feel like a luxury brand or a discount store. This chapter teaches you to choose type like a professional.</p>\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fU .7s cubic-bezier(0.16,1,0.3,1) .95s forwards\">\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:var(--glass2);border:1px solid var(--border2);border-radius:100px;color:var(--ink3)\">~35 min read</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(31,122,92,.08);border:1px solid rgba(31,122,92,.18);border-radius:100px;color:var(--jade)\">1 exercise</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(212,136,10,.08);border:1px solid rgba(212,136,10,.18);border-radius:100px;color:var(--amber)\">Visual Language</span>\n  </div>\n</div>\n</section>\n<style>@keyframes fU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}</style>\n<div class=\"divider\"></div>\n\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">Why Type Matters This Much</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">95% of web design is typography, and almost nobody optimizes it.</h2>\n    <p class=\"body-text\">Information architect Oliver Reichenstein famously said \"Web Design is 95% Typography.\" He's right. Most of what you see on a page is text. How that text looks \u2014 its size, weight, spacing, font choice \u2014 IS the design. Not decoration on top of design. The design itself.</p>\n    <p class=\"body-text\">The fastest way to make a site look more professional is to switch from a mediocre system font to a distinctive display typeface and tighten the letter-spacing. Not new colors, not new animations \u2014 just better type. It takes 30 seconds to change and transforms how everything looks.</p>\n    <div class=\"callout-fire callout\">\n      <p class=\"callout-label\">The Free Secret</p>\n      <p>Google Fonts has 1,400+ free professional fonts. Every premium site you admire that isn't paying for custom type is using Google Fonts. The font itself isn't what makes it premium \u2014 it's the size, weight, spacing, and pairing decisions. Free fonts, professional results.</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">Anatomy of Type</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Knowing the terms lets you direct with precision.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">You don't need to be a typographer. But knowing these six terms transforms how you describe what you want to Claude.</p>\n  <div class=\"anatomy-wrap reveal\">\n    <div class=\"anatomy-sample\">Ag</div>\n    <div class=\"anatomy-labels\">\n      <div class=\"anat-item\"><div class=\"anat-term\">Serif</div><div class=\"anat-def\">Small feet on letter strokes. Signals tradition, luxury, editorial. Think: Vogue, New York Times, high fashion brands.</div></div>\n      <div class=\"anat-item\"><div class=\"anat-term\">Sans-Serif</div><div class=\"anat-def\">Clean strokes, no feet. Signals modern, clean, tech. Think: Apple, Google, almost every SaaS company.</div></div>\n      <div class=\"anat-item\"><div class=\"anat-term\">Monospace</div><div class=\"anat-def\">Each character the same width. Signals technical precision, code, data. Used for labels and eyebrows on premium sites.</div></div>\n      <div class=\"anat-item\"><div class=\"anat-term\">Weight</div><div class=\"anat-def\">Thin (100) to Black (900). Display headings should be 700\u2013900. Body text 400. Never use 400 for headlines \u2014 it looks weak.</div></div>\n      <div class=\"anat-item\"><div class=\"anat-term\">Tracking</div><div class=\"anat-def\">Space between letters (letter-spacing in CSS). Negative tracking (-0.03em to -0.05em) on large headings = premium. Positive tracking (0.1em+) on tiny labels = precision.</div></div>\n      <div class=\"anat-item\"><div class=\"anat-term\">Leading</div><div class=\"anat-def\">Space between lines (line-height in CSS). Tight (0.95\u20131.1) for display headlines. Generous (1.6\u20131.8) for body text. Never use browser default for body text.</div></div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">The Secret Weapon</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Negative letter-spacing is the single most common trait of premium sites.</h2>\n  <div class=\"tracking-demo reveal\">\n    <div class=\"track-row\">\n      <div class=\"track-label\">+0.05em<br>(loose)</div>\n      <div class=\"track-sample\" style=\"letter-spacing:.05em;font-size:clamp(22px,4vw,40px)\">Premium Design</div>\n    </div>\n    <div class=\"track-row\">\n      <div class=\"track-label\">0em<br>(default)</div>\n      <div class=\"track-sample\" style=\"letter-spacing:0;font-size:clamp(22px,4vw,40px)\">Premium Design</div>\n    </div>\n    <div class=\"track-row\">\n      <div class=\"track-label\">-0.02em<br>(tight)</div>\n      <div class=\"track-sample\" style=\"letter-spacing:-.02em;font-size:clamp(22px,4vw,40px)\">Premium Design</div>\n    </div>\n    <div class=\"track-row\">\n      <div class=\"track-label\">-0.04em<br>(premium)</div>\n      <div class=\"track-sample\" style=\"letter-spacing:-.04em;font-size:clamp(22px,4vw,40px)\">Premium Design</div>\n    </div>\n    <div class=\"track-row\">\n      <div class=\"track-label\">-0.06em<br>(editorial)</div>\n      <div class=\"track-sample\" style=\"letter-spacing:-.06em;font-size:clamp(22px,4vw,40px)\">Premium Design</div>\n    </div>\n  </div>\n  <p style=\"font-size:14px;color:var(--ink3);font-style:italic;margin-top:-8px\">The tighter the tracking, the more each word reads as a solid, confident unit. This is why every Apple, Stripe, and Linear headline feels authoritative.</p>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">Type Scale</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">A proper type scale creates hierarchy automatically.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:36px\">Don't pick font sizes randomly. Use a mathematical scale based on a ratio. The most common ratios: 1.25 (Major Third), 1.333 (Perfect Fourth), 1.5 (Perfect Fifth). Here's a Perfect Fourth scale starting at 16px base:</p>\n  <div class=\"scale-demo reveal\">\n    <div class=\"scale-row\"><div class=\"scale-size\">11px</div><div class=\"scale-text\" style=\"font-size:11px;letter-spacing:.12em;font-family:'DM Mono',monospace;text-transform:uppercase;color:var(--ink3)\">MONO LABELS \u2014 eyebrows, tags, meta</div></div>\n    <div class=\"scale-row\"><div class=\"scale-size\">14px</div><div class=\"scale-text\" style=\"font-size:14px;font-weight:400;letter-spacing:0;color:var(--ink2)\">Body text \u2014 the workhorse of readability</div></div>\n    <div class=\"scale-row\"><div class=\"scale-size\">16px</div><div class=\"scale-text\" style=\"font-size:16px;font-weight:500;letter-spacing:-.01em\">Base \u2014 comfortable reading size</div></div>\n    <div class=\"scale-row\"><div class=\"scale-size\">21px</div><div class=\"scale-text\" style=\"font-size:21px;font-weight:600;letter-spacing:-.02em\">Lead text \u2014 introduction paragraphs</div></div>\n    <div class=\"scale-row\"><div class=\"scale-size\">28px</div><div class=\"scale-text\" style=\"font-size:28px;font-weight:700;letter-spacing:-.03em\">H3 \u2014 subsection headings</div></div>\n    <div class=\"scale-row\"><div class=\"scale-size\">42px</div><div class=\"scale-text\" style=\"font-size:clamp(28px,5vw,42px);font-weight:800;letter-spacing:-.04em\">H2 \u2014 section headings</div></div>\n    <div class=\"scale-row\"><div class=\"scale-size\">56px+</div><div class=\"scale-text\" style=\"font-size:clamp(36px,7vw,56px);font-weight:800;letter-spacing:-.05em\">H1 \u2014 hero display headline</div></div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">Font Pairing Masterclass</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">The rule: one distinctive display font + one clean body font. Never more than two.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">The display font provides personality and drama. The body font ensures readability. They should contrast in style but harmonize in spirit. Here are the five pairings used across premium web design:</p>\n\n  <div class=\"pair-grid\">\n    <div class=\"pair-card reveal\">\n      <div class=\"pair-label\">Pairing 01 <span class=\"pair-vibe\">Editorial \u00b7 Warm</span></div>\n      <div class=\"pair-headline\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,42px);font-weight:800\">Bricolage<br>Grotesque</div>\n      <div class=\"pair-body-sample\" style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:14px\">Paired with Plus Jakarta Sans for body. Editorial, warm, modern. Used throughout this course. Perfect for SaaS, portfolios, and product sites that want to feel designed.</div>\n      <div class=\"pair-usage\">Best for: Product pages \u00b7 SaaS \u00b7 Portfolios</div>\n    </div>\n    <div class=\"pair-card reveal\">\n      <div class=\"pair-label\">Pairing 02 <span class=\"pair-vibe\">Luxury \u00b7 Editorial</span></div>\n      <div class=\"pair-headline\" style=\"font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,48px);font-weight:400;font-style:italic;letter-spacing:-.02em\">Cormorant<br>Garamond</div>\n      <div class=\"pair-body-sample\" style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:14px\">The most luxurious pairing on the web. Italic serif headlines feel like Vogue covers and high-fashion brands. The contrast with clean sans-serif body text is extreme and beautiful.</div>\n      <div class=\"pair-usage\">Best for: Luxury brands \u00b7 Fashion \u00b7 Editorial</div>\n    </div>\n    <div class=\"pair-card reveal\">\n      <div class=\"pair-label\">Pairing 03 <span class=\"pair-vibe\">Tech \u00b7 Precise</span></div>\n      <div class=\"pair-headline\" style=\"font-family:'Syne',sans-serif;font-size:clamp(28px,4vw,42px);font-weight:800;letter-spacing:-.04em\">Syne</div>\n      <div class=\"pair-body-sample\" style=\"font-family:'DM Mono',monospace;font-size:12px;line-height:1.8;color:var(--ink3)\">Paired with DM Mono. Ultra technical, precise, futuristic. This pairing signals engineering and data. Both are monospaced or geometric \u2014 they create a unified technical language.</div>\n      <div class=\"pair-usage\">Best for: Dev tools \u00b7 Data dashboards \u00b7 Agencies</div>\n    </div>\n    <div class=\"pair-card reveal\">\n      <div class=\"pair-label\">Pairing 04 <span class=\"pair-vibe\">Bold \u00b7 Commercial</span></div>\n      <div class=\"pair-headline\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(24px,3.5vw,36px);font-weight:800;letter-spacing:-.04em\">Clash Display</div>\n      <div class=\"pair-body-sample\" style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:14px\">Clash Display with Satoshi. Punchy, confident, commercial. Used widely on Awwwards finalists. Feels aggressive in the best way \u2014 like it means business. High energy SaaS and startup sites.</div>\n      <div class=\"pair-usage\">Best for: Startups \u00b7 VC-backed \u00b7 High energy</div>\n    </div>\n  </div>\n\n  <div class=\"callout reveal\">\n    <p class=\"callout-label\">The Pairing Test</p>\n    <p>Put your two fonts next to each other and ask: do they contrast enough to be interesting? And do they feel like they come from the same world? Cormorant (elegant serif) + DM Mono (cold tech) clash uncomfortably. Cormorant + DM Sans (clean, neutral) harmonize beautifully. The personality difference should be significant, not jarring.</p>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">Fluid Typography</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">clamp() \u2014 the one CSS function you must understand.</h2>\n    <p class=\"body-text\">Fluid typography scales smoothly between a minimum and maximum size based on screen width. No breakpoints needed. The text just flows. This is how professional sites handle mobile without writing separate styles.</p>\n    <div class=\"code-block reveal\">\n      <span class=\"code-label\">CSS</span>\n      <span class=\"cm\">/* clamp(minimum, preferred, maximum) */</span><br>\n      <span class=\"prop\">font-size</span>: <span class=\"kw\">clamp</span>(<span class=\"val\">2.5rem</span>, <span class=\"val\">6vw</span>, <span class=\"val\">6rem</span>);<br>\n      <span class=\"cm\">/* \u2191 never smaller than 2.5rem */</span><br>\n      <span class=\"cm\">/* \u2191 scales with viewport width */</span><br>\n      <span class=\"cm\">/* \u2191 never larger than 6rem */</span><br><br>\n      <span class=\"cm\">/* Real example \u2014 the hero headline on this course */</span><br>\n      <span class=\"prop\">font-size</span>: <span class=\"kw\">clamp</span>(<span class=\"val\">3rem</span>, <span class=\"val\">7vw</span>, <span class=\"val\">6.5rem</span>);<br>\n      <span class=\"prop\">letter-spacing</span>: <span class=\"val\">-0.05em</span>;<br>\n      <span class=\"prop\">font-weight</span>: <span class=\"val\">800</span>;<br>\n      <span class=\"prop\">line-height</span>: <span class=\"val\">0.95</span>; <span class=\"cm\">/* Tighter than 1 for display */</span>\n    </div>\n    <div class=\"callout-blue callout\">\n      <p class=\"callout-label\">Tell Claude This</p>\n      <p>\"Use clamp() for all font sizes so they scale fluidly from mobile to desktop. The hero headline should be clamp(3rem, 7vw, 6.5rem) with -0.05em letter-spacing and font-weight 800.\"</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow eyebrow-fire\">Anti-Patterns \u2014 What Not to Do</p>\n    <h2 class=\"h2\" style=\"margin-bottom:24px\">The typography mistakes that immediately signal amateur.</h2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n      <div style=\"padding:20px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.12);border-radius:var(--r2)\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ef4444;margin-bottom:12px\">\u2717 Never Do</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:2\">Using Inter or Roboto as a display font<br>More than 2 typefaces on one page<br>Font size below 13px for any body text<br>Line-height of 1 or less on body text<br>Mixing serif AND script AND sans on one page<br>Default letter-spacing on large headings<br>Using system fonts on premium pages</div>\n      </div>\n      <div style=\"padding:20px;background:rgba(31,122,92,.05);border:1px solid rgba(31,122,92,.12);border-radius:var(--r2)\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:12px\">\u2713 Always Do</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:2\">Load from Google Fonts with specific weights<br>Maximum 2 typefaces per site<br>Body text minimum 14px (16px ideal)<br>Body line-height 1.6\u20131.8<br>Display font weight 700\u2013800 minimum<br>Negative letter-spacing on all large headings<br>Mono font for labels and technical copy</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<section>\n<div class=\"wrap\">\n  <div class=\"exercise reveal\">\n    <p class=\"eyebrow eyebrow-jade\">Chapter 03 \u2014 Exercise</p>\n    <h2 class=\"ex-title\">Typography makeover \u2014 same content, totally different personality.</h2>\n    <p class=\"ex-desc\">This exercise proves that typography IS the design. You'll take identical content and transform it into two completely different personalities just by changing font choices and spacing.</p>\n    <div class=\"ex-steps\">\n      <div class=\"ex-step\"><div class=\"ex-n\">01</div><div class=\"ex-text\">Write a simple headline + paragraph + button in Claude. Tell it to use <strong>system fonts, no letter-spacing, default line-height</strong>. Screenshot the result.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">02</div><div class=\"ex-text\">Now give the same content to Claude and say: <strong>\"Use Bricolage Grotesque at 800 weight with -0.05em letter-spacing for the headline, Plus Jakarta Sans at 16px/1.75 line-height for body, and DM Mono uppercase for the button label.\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">03</div><div class=\"ex-text\">Do it a third time with: <strong>\"Use Cormorant Garamond italic at 400 weight for the headline at 60px, DM Sans for body, and keep everything left-aligned with generous spacing.\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">04</div><div class=\"ex-text\">Compare all three. Same words. Radically different personalities. This is the power of typography \u2014 and now you know how to direct it.</div></div>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"ch-footer\">\n  <div class=\"ch-footer-inner\">\n    <a href=\"chapter-02.html\" class=\"ch-btn prev\"><span class=\"ch-btn-arr\">\u2190</span><div><div class=\"ch-btn-label\">Previous</div><div class=\"ch-btn-title\">Visual Design Laws</div></div></a>\n    <div class=\"ch-center\"><div style=\"margin-bottom:6px\">Chapter 03 of 12</div><a href=\"index.html\">Design Mastery</a></div>\n    <a href=\"chapter-04.html\" class=\"ch-btn next\"><div><div class=\"ch-btn-label\">Next Chapter</div><div class=\"ch-btn-title\">Color Theory</div></div><span class=\"ch-btn-arr\">\u2192</span></a>\n  </div>\n</div>\n<script>\ngsap.registerPlugin(ScrollTrigger);\nwindow.addEventListener('scroll',()=>{const s=document.documentElement.scrollTop,h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('pb').style.width=(s/h*100)+'%'});\ngsap.utils.toArray('.reveal').forEach((el,i)=>{gsap.fromTo(el,{opacity:0,y:44},{opacity:1,y:0,duration:.85,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 84%'},delay:(i%3)*.07})});\n<\/script>\n</body>\n</html>\n"</script>
<script type="application/json" id="ch-data-3">"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ch 04 \u2014 Color Theory \u00b7 Design Mastery</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js\"><\/script>\n<style>\n:root{--bg:#f6f4f0;--bg2:#edeae4;--bg3:#e4e0d8;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.06);--ink:#100f0d;--ink2:#45433f;--ink3:#8c8880;--ink4:#b5b2ac;--fire:#e8500a;--amber:#d4880a;--amber2:#eaac40;--sapphire:#2e6fd4;--jade:#1f7a5c;--glass:rgba(255,255,255,.65);--glass2:rgba(255,255,255,.42);--sh2:0 8px 32px rgba(0,0,0,.08);--sh3:0 20px 60px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.06);--sh4:0 40px 100px rgba(0,0,0,.13);--r1:8px;--r2:14px;--r3:22px;--ease-out:cubic-bezier(0.16,1,0.3,1)}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}*{scrollbar-width:none}*::-webkit-scrollbar{display:none}\nbody{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden}a{color:inherit;text-decoration:none}\nbody::after{content:'';position:fixed;inset:0;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E\");pointer-events:none;z-index:9999;opacity:.5}\n.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}\n.o1{width:600px;height:600px;background:radial-gradient(circle,rgba(212,136,10,.12),transparent 68%);top:-100px;right:-100px;animation:oA 22s ease-in-out infinite}\n.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(31,122,92,.08),transparent 68%);bottom:-80px;left:-80px;animation:oB 28s ease-in-out infinite}\n@keyframes oA{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,50px)}}\n@keyframes oB{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-40px)}}\n.progress-bar{position:fixed;top:0;left:0;height:2px;z-index:1000;background:linear-gradient(90deg,#d4880a,#1f7a5c);width:0%;transition:width .1s linear}\nnav{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:500;background:var(--glass);backdrop-filter:blur(28px);border:1px solid var(--border);border-radius:100px;padding:10px 22px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh2);opacity:0;animation:navIn .7s var(--ease-out) .4s forwards;white-space:nowrap}\n@keyframes navIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}\n.nav-home{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-right:14px;border-right:1px solid var(--border)}\n.wrap{max-width:900px;margin:0 auto;padding:0 32px}\nsection{position:relative;z-index:10;padding:100px 0}\n.hero-sec{min-height:100vh;display:flex;align-items:center;padding:80px 0}\n.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);position:relative;z-index:10}\n.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;gap:12px;margin-bottom:18px}\n.eyebrow::before{content:'';width:28px;height:1px;background:var(--amber);flex-shrink:0}\n.ej{color:var(--jade)}.ej::before{background:var(--jade)}\n.ef{color:var(--fire)}.ef::before{background:var(--fire)}\n.display{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink)}\n.display em{font-style:normal;background:linear-gradient(135deg,var(--amber),var(--jade));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.035em;line-height:1.1;color:var(--ink)}\n.h3{font-family:'Bricolage Grotesque',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:-.025em;color:var(--ink)}\n.lead{font-size:clamp(1rem,1.5vw,1.12rem);color:var(--ink2);line-height:1.8}\n.bt{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:20px}\n.bt:last-child{margin-bottom:0}\n.card{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh3);padding:52px;position:relative;overflow:hidden}\n.card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.csm{background:var(--glass2);backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);padding:32px;position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s,background .3s}\n.csm::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 50%);pointer-events:none;border-radius:inherit}\n.csm:hover{transform:translateY(-5px);box-shadow:var(--sh3);background:var(--glass)}\n.callout{padding:24px 28px;border-radius:var(--r2);border-left:3px solid var(--amber);background:rgba(212,136,10,.04);margin:28px 0}\n.cb{border-color:var(--sapphire);background:rgba(46,111,212,.04)}\n.cj{border-color:var(--jade);background:rgba(31,122,92,.04)}\n.cf{border-color:var(--fire);background:rgba(232,80,10,.04)}\n.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}\n.cb .callout-label{color:var(--sapphire)}.cj .callout-label{color:var(--jade)}.cf .callout-label{color:var(--fire)}\n.callout p,.callout li{font-size:14px;color:var(--ink2);line-height:1.75}\n.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:32px 0}\n.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:28px 0}\n.code-block{background:var(--ink);border-radius:var(--r2);padding:24px 28px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.9;color:#d4d0c8;overflow-x:auto;position:relative;margin:20px 0}\n.kw{color:#f0a050}.str{color:#7dd3a8}.cm{color:rgba(255,255,255,.28);font-style:italic}.prop{color:#c4b5fd}.val{color:#f9a8d4}\n.code-label{position:absolute;top:12px;right:16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.2)}\n\n/* COLOR SWATCHES */\n.swatch-row{display:flex;gap:0;border-radius:var(--r2);overflow:hidden;height:80px;margin:24px 0;box-shadow:var(--sh2)}\n.sw{flex:1;transition:flex .4s var(--ease-out);cursor:default;position:relative;display:flex;align-items:flex-end;padding:10px 14px}\n.sw:hover{flex:2}\n.sw-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.7);opacity:0;transition:opacity .3s}\n.sw:hover .sw-label{opacity:1}\n.psych-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:28px 0}\n.psych-card{padding:22px 20px;border-radius:var(--r2);text-align:center;border:1px solid var(--border2);transition:transform .3s var(--ease-out)}\n.psych-card:hover{transform:translateY(-4px)}\n.psych-swatch{width:40px;height:40px;border-radius:50%;margin:0 auto 12px}\n.psych-name{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-bottom:6px}\n.psych-mood{font-size:12px;color:var(--ink3);line-height:1.5}\n.six-three-one{display:grid;grid-template-rows:auto auto auto;gap:12px;margin:24px 0}\n.ratio-row{display:grid;grid-template-columns:100px 1fr;gap:16px;align-items:center}\n.ratio-bar{height:44px;border-radius:var(--r1);display:flex;align-items:center;padding:0 16px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(0,0,0,.5);font-weight:500}\n.ratio-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-align:right}\n\n/* DARK MODE PAIR */\n.dm-pair{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:28px 0}\n.dm-card{border-radius:var(--r2);padding:32px;border:1px solid var(--border2)}\n.dm-light{background:#f6f4f0}\n.dm-dark{background:#0d0d14}\n.dm-title{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:8px}\n.dm-body{font-size:13px;line-height:1.7;margin-bottom:16px}\n.dm-btn{display:inline-block;padding:8px 18px;border-radius:100px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase}\n.dm-light .dm-title{color:#100f0d}.dm-light .dm-body{color:#45433f}.dm-light .dm-btn{background:#100f0d;color:#f6f4f0}\n.dm-dark .dm-title{color:#f4f4f5}.dm-dark .dm-body{color:#a1a1aa}.dm-dark .dm-btn{background:#e8500a;color:#ffffff}\n.dm-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-align:center;margin-top:8px}\n\n.exercise{background:linear-gradient(135deg,rgba(31,122,92,.07),rgba(255,255,255,.4));border:1px solid rgba(31,122,92,.2);border-radius:var(--r3);padding:48px;position:relative;overflow:hidden;margin:48px 0}\n.exercise::before{content:'EXERCISE';position:absolute;top:24px;right:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(31,122,92,.4)}\n.ex-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}\n.ex-desc{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:28px}\n.ex-steps{display:flex;flex-direction:column;gap:12px}\n.ex-step{display:grid;grid-template-columns:32px 1fr;gap:14px;align-items:start;padding:16px 20px;background:rgba(255,255,255,.5);border-radius:var(--r2);border:1px solid rgba(31,122,92,.1)}\n.ex-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--jade);font-weight:500}\n.ex-text{font-size:14px;color:var(--ink2);line-height:1.65}.ex-text strong{color:var(--ink)}\n.ch-footer{position:relative;z-index:10;padding:60px 0 80px;border-top:1px solid var(--border)}\n.ch-footer-inner{max-width:900px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}\n.ch-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .35s var(--ease-out);text-decoration:none;color:inherit}\n.ch-btn:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateY(-3px)}\n.ch-btn-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}\n.ch-btn-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}\n.ch-btn.next{flex-direction:row-reverse;text-align:right}\n.ch-btn-arr{font-size:20px;color:var(--ink3);transition:transform .3s}\n.ch-btn.prev:hover .ch-btn-arr{transform:translateX(-4px)}.ch-btn.next:hover .ch-btn-arr{transform:translateX(4px)}\n.ch-center{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink4);text-align:center}\n.ch-center a{color:var(--fire)}\n.reveal{opacity:0;transform:translateY(40px)}\n@keyframes fU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}\n@media(max-width:768px){.two-col,.three-col,.psych-grid,.dm-pair{grid-template-columns:1fr 1fr}.card{padding:32px 24px}.ch-footer-inner{flex-direction:column}}\n@media(max-width:480px){nav{display:none}.psych-grid{grid-template-columns:1fr 1fr}}\n</style>\n</head>\n<body>\n\n<div class=\"orb o1\"></div><div class=\"orb o2\"></div>\n\n\n<section class=\"hero-sec\">\n<div class=\"wrap\">\n  <div style=\"opacity:0;animation:fU .7s var(--ease-out) .5s forwards\"><p class=\"eyebrow\">Chapter 04 \u2014 Visual Language</p></div>\n  <h1 class=\"display\" style=\"opacity:0;animation:fU .9s var(--ease-out) .65s forwards;margin-bottom:28px\">Color:<br>emotion in<br><em>a hex code.</em></h1>\n  <p class=\"lead\" style=\"opacity:0;animation:fU .9s var(--ease-out) .8s forwards;max-width:580px;margin-bottom:40px\">Color is the fastest emotional signal in design. Before hierarchy, before typography \u2014 color sets the emotional tone. Learn to use it as a system, not a decoration.</p>\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fU .7s var(--ease-out) .95s forwards\">\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:var(--glass2);border:1px solid var(--border2);border-radius:100px;color:var(--ink3)\">~30 min read</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(31,122,92,.08);border:1px solid rgba(31,122,92,.18);border-radius:100px;color:var(--jade)\">1 exercise</span>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- PSYCHOLOGY -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">Color Psychology</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Color communicates before the brain reads a single word.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">These associations are partly cultural, partly evolutionary, and entirely real. Ignoring them doesn't make you edgy \u2014 it makes you confusing.</p>\n  <div class=\"psych-grid reveal\">\n    <div class=\"psych-card\" style=\"background:rgba(232,80,10,.05)\"><div class=\"psych-swatch\" style=\"background:#e8500a\"></div><div class=\"psych-name\">Orange/Red</div><div class=\"psych-mood\">Energy \u00b7 Action \u00b7 Urgency \u00b7 Heat. Best for CTAs and conversion-focused elements. Amazon's button is orange for a reason.</div></div>\n    <div class=\"psych-card\" style=\"background:rgba(46,111,212,.05)\"><div class=\"psych-swatch\" style=\"background:#2e6fd4\"></div><div class=\"psych-name\">Blue</div><div class=\"psych-mood\">Trust \u00b7 Technology \u00b7 Calm \u00b7 Professional. Dominant in fintech, SaaS, healthcare. The color of reliability.</div></div>\n    <div class=\"psych-card\" style=\"background:rgba(31,122,92,.05)\"><div class=\"psych-swatch\" style=\"background:#1f7a5c\"></div><div class=\"psych-name\">Green</div><div class=\"psych-mood\">Growth \u00b7 Nature \u00b7 Success \u00b7 Money. Fintech uses it for positive states. Health brands default here.</div></div>\n    <div class=\"psych-card\" style=\"background:rgba(212,136,10,.05)\"><div class=\"psych-swatch\" style=\"background:#d4880a\"></div><div class=\"psych-name\">Amber/Gold</div><div class=\"psych-mood\">Warmth \u00b7 Premium \u00b7 Craft \u00b7 Attention. Luxury tier without the cold metallic feeling of silver and platinum.</div></div>\n    <div class=\"psych-card\" style=\"background:rgba(147,51,234,.05)\"><div class=\"psych-swatch\" style=\"background:#9333ea\"></div><div class=\"psych-name\">Purple</div><div class=\"psych-mood\">Creativity \u00b7 Mystery \u00b7 Premium \u00b7 Magic. AI companies love purple now. Signals imagination and the future.</div></div>\n    <div class=\"psych-card\" style=\"background:rgba(16,15,13,.06)\"><div class=\"psych-swatch\" style=\"background:#100f0d\"></div><div class=\"psych-name\">Near-Black</div><div class=\"psych-mood\">Sophistication \u00b7 Power \u00b7 Luxury \u00b7 Editorial. Always off-black, never #000. The color of every premium brand.</div></div>\n    <div class=\"psych-card\" style=\"background:rgba(245,244,240,.8);border:1px solid var(--border2)\"><div class=\"psych-swatch\" style=\"background:#f6f4f0;border:1px solid var(--border2)\"></div><div class=\"psych-name\">Warm White</div><div class=\"psych-mood\">Clean \u00b7 Honest \u00b7 Open \u00b7 Modern. Never pure #ffffff \u2014 always warm off-white. Feels paper-like and human.</div></div>\n    <div class=\"psych-card\" style=\"background:rgba(239,68,68,.05)\"><div class=\"psych-swatch\" style=\"background:#ef4444\"></div><div class=\"psych-name\">Red</div><div class=\"psych-mood\">Danger \u00b7 Error \u00b7 Passion \u00b7 Sale. Use sparingly for alerts and critical states. Never as a primary brand color on SaaS.</div></div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- 60-30-10 -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">The Golden Rule</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">60-30-10: The palette formula used by every interior designer, brand designer, and fashion stylist.</h2>\n    <p class=\"bt\">60% dominant (background, largest surfaces) \u00b7 30% secondary (cards, supporting elements) \u00b7 10% accent (CTAs, highlights, icons). This ratio creates harmony without boredom. It's borrowed from fashion and architecture and it works exactly the same way in web design.</p>\n\n    <div class=\"six-three-one reveal\">\n      <div class=\"ratio-row\">\n        <div class=\"ratio-label\">60% \u2014 Dominant</div>\n        <div class=\"ratio-bar\" style=\"background:#f6f4f0;flex:6;width:100%;color:rgba(0,0,0,.35)\">Background, page surface</div>\n      </div>\n      <div class=\"ratio-row\">\n        <div class=\"ratio-label\">30% \u2014 Secondary</div>\n        <div class=\"ratio-bar\" style=\"background:#edeae4;width:50%;color:rgba(0,0,0,.35)\">Cards, panels, sections</div>\n      </div>\n      <div class=\"ratio-row\">\n        <div class=\"ratio-label\">10% \u2014 Accent</div>\n        <div class=\"ratio-bar\" style=\"background:#e8500a;width:16%;color:rgba(255,255,255,.8);font-size:10px\">CTAs</div>\n      </div>\n    </div>\n\n    <div class=\"callout cj\" style=\"margin-top:12px\">\n      <p class=\"callout-label\">The Danger Zone</p>\n      <p>Most bad color decisions come from using the accent color too much. If your orange appears everywhere \u2014 backgrounds, all headings, borders, icons \u2014 it stops being an accent and becomes noise. The accent earns its power from restraint. Use it only where you want the eye to go.</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- PALETTE BUILDING -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">Building a Palette</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Every great web palette has five ingredients.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">Not five colors \u2014 five roles. Fill each role and you have a complete system.</p>\n\n  <div class=\"swatch-row reveal\">\n    <div class=\"sw\" style=\"background:#f6f4f0\"><span class=\"sw-label\" style=\"color:rgba(0,0,0,.5)\">BG</span></div>\n    <div class=\"sw\" style=\"background:#edeae4\"><span class=\"sw-label\" style=\"color:rgba(0,0,0,.5)\">Surface</span></div>\n    <div class=\"sw\" style=\"background:#8c8880\"><span class=\"sw-label\">Muted</span></div>\n    <div class=\"sw\" style=\"background:#100f0d\"><span class=\"sw-label\">Ink</span></div>\n    <div class=\"sw\" style=\"background:#e8500a\"><span class=\"sw-label\">Accent</span></div>\n  </div>\n\n  <div class=\"three-col\">\n    <div class=\"csm reveal\">\n      <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fire);margin-bottom:14px\">Step 1: Background</div>\n      <p class=\"bt\" style=\"font-size:13px\">Never pure white (#ffffff). Pick a warm off-white like #f6f4f0 or a cool near-white like #f8f8fc. The warmth or coolness sets the entire page's temperature. Warm = human, approachable. Cool = technical, precise.</p>\n    </div>\n    <div class=\"csm reveal\">\n      <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:14px\">Step 2: Ink (Text)</div>\n      <p class=\"bt\" style=\"font-size:13px\">Never pure black (#000000). Pick a near-black like #100f0d or #0a0a0a. Then create 3 lighter variants for hierarchy: ink2 for body, ink3 for captions, ink4 for placeholder text.</p>\n    </div>\n    <div class=\"csm reveal\">\n      <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sapphire);margin-bottom:14px\">Step 3: Accent</div>\n      <p class=\"bt\" style=\"font-size:13px\">One vivid color that represents your brand personality. Maximum one. This appears on CTAs, active states, highlights, and hover effects. Keep it in one shade family \u2014 don't use both orange AND blue.</p>\n    </div>\n  </div>\n\n  <div class=\"code-block reveal\">\n    <span class=\"code-label\">Complete Palette</span>\n    <span class=\"prop\">:root</span> {<br>\n    &nbsp;&nbsp;<span class=\"cm\">/* Backgrounds */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">--bg</span>: <span class=\"val\">#f6f4f0</span>; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"cm\">/* Warm off-white \u2014 never #fff */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">--bg2</span>: <span class=\"val\">#edeae4</span>; &nbsp;&nbsp;&nbsp;&nbsp;<span class=\"cm\">/* Card/surface \u2014 slightly darker */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">--border</span>: <span class=\"val\">rgba(0,0,0,.09)</span>; <span class=\"cm\">/* Subtle \u2014 never hard black */</span><br><br>\n    &nbsp;&nbsp;<span class=\"cm\">/* Text hierarchy */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">--ink</span>: <span class=\"val\">#100f0d</span>; &nbsp;&nbsp;&nbsp;&nbsp;<span class=\"cm\">/* Headlines \u2014 near black, not pure */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">--ink2</span>: <span class=\"val\">#45433f</span>; &nbsp;&nbsp;&nbsp;<span class=\"cm\">/* Body text */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">--ink3</span>: <span class=\"val\">#8c8880</span>; &nbsp;&nbsp;&nbsp;<span class=\"cm\">/* Captions, labels */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">--ink4</span>: <span class=\"val\">#b5b2ac</span>; &nbsp;&nbsp;&nbsp;<span class=\"cm\">/* Placeholder, disabled */</span><br><br>\n    &nbsp;&nbsp;<span class=\"cm\">/* Accent system */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">--fire</span>: <span class=\"val\">#e8500a</span>; &nbsp;&nbsp;<span class=\"cm\">/* Primary accent \u2014 CTAs, highlights */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">--fire2</span>: <span class=\"val\">#f07535</span>; &nbsp;&nbsp;<span class=\"cm\">/* Hover state of fire */</span><br>\n    }\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- DARK MODE -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal ef\">Dark Mode Design</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Dark mode is not just inverting light mode. It's a different palette.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:36px\">Amateur dark mode: invert #f6f4f0 \u2192 #090a0f. Professional dark mode: rethink every surface color, reduce saturation on accents, and reduce contrast (yes, reduce \u2014 pure white on pure black is too harsh).</p>\n\n  <div class=\"dm-pair reveal\">\n    <div>\n      <div class=\"dm-card dm-light\">\n        <div class=\"dm-title\">Light Mode</div>\n        <div class=\"dm-body\">Background #f6f4f0, body text #45433f. The warmth of an off-white page feels approachable and premium.</div>\n        <span class=\"dm-btn\">Start Building \u2192</span>\n      </div>\n      <div class=\"dm-label\">Warm white base</div>\n    </div>\n    <div>\n      <div class=\"dm-card dm-dark\">\n        <div class=\"dm-title\">Dark Mode</div>\n        <div class=\"dm-body\" style=\"color:#a1a1aa\">Background #0d0d14, body text #a1a1aa \u2014 not pure white. The dark isn't #000 and the text isn't #fff.</div>\n        <span class=\"dm-btn\">Start Building \u2192</span>\n      </div>\n      <div class=\"dm-label\">Near-black base, muted text</div>\n    </div>\n  </div>\n\n  <div class=\"callout cb reveal\">\n    <p class=\"callout-label\">Dark Mode Rules</p>\n    <p>Background: Never #000000 \u2014 use #0d0d14, #09090b, or #0a0a0f. Text: Never #ffffff \u2014 use #f4f4f5 for headings, #a1a1aa for body. Cards: Slightly lighter than bg \u2014 #16161e instead of #0d0d14. Accents: Slightly more saturated than light mode to pop against dark backgrounds. Shadows: Glow effects instead of drop shadows \u2014 glows feel native to dark UIs.</p>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- GLASSMORPHISM -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">Glassmorphism</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">Frosted glass \u2014 the aesthetic you already use. Here's the formula.</h2>\n    <p class=\"bt\">Glassmorphism uses translucent surfaces, blur, and subtle borders to create depth on a single page. It suggests layers \u2014 foreground, midground, background \u2014 without any actual 3D. When done right it's the most premium feel in web design today. When overdone it's a mess.</p>\n    <div class=\"code-block reveal\">\n      <span class=\"code-label\">Glassmorphism CSS</span>\n      <span class=\"prop\">.glass-card</span> {<br>\n      &nbsp;&nbsp;<span class=\"prop\">background</span>: <span class=\"val\">rgba(255, 255, 255, 0.65)</span>; <span class=\"cm\">/* Translucent */</span><br>\n      &nbsp;&nbsp;<span class=\"prop\">backdrop-filter</span>: <span class=\"val\">blur(24px)</span>; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"cm\">/* The blur */</span><br>\n      &nbsp;&nbsp;<span class=\"prop\">-webkit-backdrop-filter</span>: <span class=\"val\">blur(24px)</span>; &nbsp;<span class=\"cm\">/* Safari */</span><br>\n      &nbsp;&nbsp;<span class=\"prop\">border</span>: <span class=\"val\">1px solid rgba(0, 0, 0, 0.09)</span>; <span class=\"cm\">/* Hairline border */</span><br>\n      &nbsp;&nbsp;<span class=\"prop\">border-radius</span>: <span class=\"val\">22px</span>;<br>\n      &nbsp;&nbsp;<span class=\"prop\">box-shadow</span>: <span class=\"val\">0 20px 60px rgba(0,0,0,.10)</span>;<br>\n      }<br><br>\n      <span class=\"cm\">/* The glass needs SOMETHING behind it to blur */</span><br>\n      <span class=\"cm\">/* Place colorful orbs or gradients in the background */</span>\n    </div>\n    <div class=\"callout cf\" style=\"margin-top:8px\">\n      <p class=\"callout-label\">The Key Insight</p>\n      <p>Glassmorphism only works if there's something behind the glass to blur. If the background is a flat color, the blur does nothing \u2014 you just get a white rectangle. Always pair glass cards with colorful ambient orbs or gradients in the background. This course uses exactly that system.</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- EXERCISE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"exercise reveal\">\n    <p class=\"eyebrow ej\">Chapter 04 \u2014 Exercise</p>\n    <h2 class=\"ex-title\">Build your personal color system.</h2>\n    <p class=\"ex-desc\">You're going to create a color palette that works for you \u2014 one you'll use across all your future builds. This forces real decisions and forces you to think about what you want your sites to feel like.</p>\n    <div class=\"ex-steps\">\n      <div class=\"ex-step\"><div class=\"ex-n\">01</div><div class=\"ex-text\">Decide on one emotion: Trust, Energy, Luxury, or Creativity. This determines everything else.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">02</div><div class=\"ex-text\">Go to <strong>coolors.co</strong> or <strong>huemint.com</strong>. Generate palettes until one feels right. Save your favorite 5-color palette.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">03</div><div class=\"ex-text\">Tell Claude: <strong>\"Create a CSS :root block using these hex codes as my design system: [paste your colors]. Define them as --bg, --ink, --ink2, --ink3, --accent, and --accent2.\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">04</div><div class=\"ex-text\">Ask Claude to build a simple card component using only your CSS variables. See how the personality comes through purely from color.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">05</div><div class=\"ex-text\">Repeat with a completely different palette and compare. Same structure, totally different feeling. Save the one you love \u2014 it's your design identity.</div></div>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"ch-footer\">\n  <div class=\"ch-footer-inner\">\n    <a href=\"chapter-03.html\" class=\"ch-btn prev\"><span class=\"ch-btn-arr\">\u2190</span><div><div class=\"ch-btn-label\">Previous</div><div class=\"ch-btn-title\">Typography</div></div></a>\n    <div class=\"ch-center\"><div style=\"margin-bottom:6px\">Chapter 04 of 12</div><a href=\"index.html\">Design Mastery</a></div>\n    <a href=\"chapter-05.html\" class=\"ch-btn next\"><div><div class=\"ch-btn-label\">Next Chapter</div><div class=\"ch-btn-title\">Layout & Composition</div></div><span class=\"ch-btn-arr\">\u2192</span></a>\n  </div>\n</div>\n\n<script>\ngsap.registerPlugin(ScrollTrigger);\nwindow.addEventListener('scroll',()=>{const s=document.documentElement.scrollTop,h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('pb').style.width=(s/h*100)+'%'});\ngsap.utils.toArray('.reveal').forEach((el,i)=>{gsap.fromTo(el,{opacity:0,y:44},{opacity:1,y:0,duration:.85,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 84%'},delay:(i%3)*.07})});\n<\/script>\n</body>\n</html>\n"</script>
<script type="application/json" id="ch-data-4">"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ch 05 \u2014 Layout & Composition \u00b7 Design Mastery</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js\"><\/script>\n<style>\n:root{--bg:#f6f4f0;--bg2:#edeae4;--bg3:#e4e0d8;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.06);--ink:#100f0d;--ink2:#45433f;--ink3:#8c8880;--ink4:#b5b2ac;--fire:#e8500a;--amber:#d4880a;--sapphire:#2e6fd4;--jade:#1f7a5c;--glass:rgba(255,255,255,.65);--glass2:rgba(255,255,255,.42);--sh2:0 8px 32px rgba(0,0,0,.08);--sh3:0 20px 60px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.06);--sh4:0 40px 100px rgba(0,0,0,.13);--r1:8px;--r2:14px;--r3:22px;--ease-out:cubic-bezier(0.16,1,0.3,1)}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}*{scrollbar-width:none}*::-webkit-scrollbar{display:none}\nbody{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden}a{color:inherit;text-decoration:none}\nbody::after{content:'';position:fixed;inset:0;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E\");pointer-events:none;z-index:9999;opacity:.5}\n.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}\n.o1{width:600px;height:600px;background:radial-gradient(circle,rgba(46,111,212,.10),transparent 68%);top:-100px;left:-100px;animation:oA 22s ease-in-out infinite}\n.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(31,122,92,.08),transparent 68%);bottom:-80px;right:-80px;animation:oB 28s ease-in-out infinite}\n@keyframes oA{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,50px)}}\n@keyframes oB{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-40px)}}\n.progress-bar{position:fixed;top:0;left:0;height:2px;z-index:1000;background:linear-gradient(90deg,var(--sapphire),var(--jade));width:0%;transition:width .1s linear}\nnav{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:500;background:var(--glass);backdrop-filter:blur(28px);border:1px solid var(--border);border-radius:100px;padding:10px 22px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh2);opacity:0;animation:navIn .7s var(--ease-out) .4s forwards;white-space:nowrap}\n@keyframes navIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}\n.nav-home{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-right:14px;border-right:1px solid var(--border)}\n.wrap{max-width:900px;margin:0 auto;padding:0 32px}\nsection{position:relative;z-index:10;padding:100px 0}\n.hero-sec{min-height:100vh;display:flex;align-items:center;padding:80px 0}\n.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);position:relative;z-index:10}\n.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--sapphire);display:flex;align-items:center;gap:12px;margin-bottom:18px}\n.eyebrow::before{content:'';width:28px;height:1px;background:var
