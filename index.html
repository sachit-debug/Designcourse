(--sapphire);flex-shrink:0}\n.ej{color:var(--jade)}.ej::before{background:var(--jade)}\n.ef{color:var(--fire)}.ef::before{background:var(--fire)}\n.ea{color:var(--amber)}.ea::before{background:var(--amber)}\n.display{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink)}\n.display em{font-style:normal;background:linear-gradient(135deg,var(--sapphire),var(--jade));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.035em;line-height:1.1;color:var(--ink)}\n.h3{font-family:'Bricolage Grotesque',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:-.025em;color:var(--ink)}\n.lead{font-size:clamp(1rem,1.5vw,1.12rem);color:var(--ink2);line-height:1.8}\n.bt{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:20px}\n.bt:last-child{margin-bottom:0}\n.card{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh3);padding:52px;position:relative;overflow:hidden}\n.card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.csm{background:var(--glass2);backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);padding:28px;position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s,background .3s}\n.csm::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 50%);pointer-events:none;border-radius:inherit}\n.csm:hover{transform:translateY(-5px);box-shadow:var(--sh3);background:var(--glass)}\n.callout{padding:24px 28px;border-radius:var(--r2);border-left:3px solid var(--sapphire);background:rgba(46,111,212,.04);margin:28px 0}\n.ca{border-color:var(--amber);background:rgba(212,136,10,.04)}\n.cj{border-color:var(--jade);background:rgba(31,122,92,.04)}\n.cf{border-color:var(--fire);background:rgba(232,80,10,.04)}\n.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sapphire);margin-bottom:10px}\n.ca .callout-label{color:var(--amber)}.cj .callout-label{color:var(--jade)}.cf .callout-label{color:var(--fire)}\n.callout p{font-size:14px;color:var(--ink2);line-height:1.75}\n.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:28px 0}\n.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:28px 0}\n.code-block{background:var(--ink);border-radius:var(--r2);padding:24px 28px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.9;color:#d4d0c8;overflow-x:auto;position:relative;margin:20px 0}\n.kw{color:#f0a050}.str{color:#7dd3a8}.cm{color:rgba(255,255,255,.28);font-style:italic}.prop{color:#c4b5fd}.val{color:#f9a8d4}\n.code-label{position:absolute;top:12px;right:16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.2)}\n\n/* GRID VISUALIZERS */\n.grid-demo{padding:24px;background:var(--bg2);border-radius:var(--r2);border:1px dashed var(--border);margin:20px 0}\n.grid-demo-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px}\n.grid-vis{display:grid;gap:8px}\n.grid-vis.g12{grid-template-columns:repeat(12,1fr)}\n.grid-vis.g3{grid-template-columns:repeat(3,1fr)}\n.grid-vis.g21{grid-template-columns:2fr 1fr}\n.grid-vis.g121{grid-template-columns:1fr 2fr 1fr}\n.grid-vis.g-auto{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}\n.gc{height:40px;background:rgba(46,111,212,.12);border:1px solid rgba(46,111,212,.2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;color:rgba(46,111,212,.6)}\n.gc.span2{grid-column:span 2}\n.gc.span3{grid-column:span 3}\n.gc.span4{grid-column:span 4}\n.gc.span6{grid-column:span 6}\n.gc.span8{grid-column:span 8}\n.gc.tall{height:80px}\n.gc.featured{background:rgba(232,80,10,.1);border-color:rgba(232,80,10,.2)}\n\n/* SPACING */\n.spacing-demo{display:flex;flex-direction:column;gap:0;margin:20px 0}\n.sp-row{display:grid;grid-template-columns:80px 1fr;gap:12px;align-items:center;padding:8px 0}\n.sp-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}\n.sp-bar{height:16px;border-radius:3px;background:rgba(46,111,212,.15);border:1px solid rgba(46,111,212,.2);position:relative;display:flex;align-items:center;padding:0 8px}\n.sp-val{font-family:'DM Mono',monospace;font-size:9px;color:rgba(46,111,212,.7)}\n\n/* BREAKPOINT VIS */\n.bp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}\n.bp-card{padding:20px;border-radius:var(--r2);border:2px solid var(--border2);text-align:center;transition:all .3s var(--ease-out);cursor:default}\n.bp-card:hover{border-color:var(--sapphire);background:rgba(46,111,212,.03)}\n.bp-icon{font-size:28px;margin-bottom:10px}\n.bp-size{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:6px}\n.bp-desc{font-size:12px;color:var(--ink3);line-height:1.5}\n\n.exercise{background:linear-gradient(135deg,rgba(31,122,92,.07),rgba(255,255,255,.4));border:1px solid rgba(31,122,92,.2);border-radius:var(--r3);padding:48px;position:relative;overflow:hidden;margin:48px 0}\n.exercise::before{content:'EXERCISE';position:absolute;top:24px;right:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(31,122,92,.4)}\n.ex-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}\n.ex-desc{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:28px}\n.ex-steps{display:flex;flex-direction:column;gap:12px}\n.ex-step{display:grid;grid-template-columns:32px 1fr;gap:14px;align-items:start;padding:16px 20px;background:rgba(255,255,255,.5);border-radius:var(--r2);border:1px solid rgba(31,122,92,.1)}\n.ex-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--jade);font-weight:500}\n.ex-text{font-size:14px;color:var(--ink2);line-height:1.65}.ex-text strong{color:var(--ink)}\n.ch-footer{position:relative;z-index:10;padding:60px 0 80px;border-top:1px solid var(--border)}\n.ch-footer-inner{max-width:900px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}\n.ch-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .35s var(--ease-out);text-decoration:none;color:inherit}\n.ch-btn:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateY(-3px)}\n.ch-btn-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}\n.ch-btn-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}\n.ch-btn.next{flex-direction:row-reverse;text-align:right}\n.ch-btn-arr{font-size:20px;color:var(--ink3);transition:transform .3s}\n.ch-btn.prev:hover .ch-btn-arr{transform:translateX(-4px)}.ch-btn.next:hover .ch-btn-arr{transform:translateX(4px)}\n.ch-center{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink4);text-align:center}\n.ch-center a{color:var(--fire)}\n.reveal{opacity:0;transform:translateY(40px)}\n@keyframes fU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}\n@media(max-width:768px){.two-col,.three-col,.bp-grid{grid-template-columns:1fr 1fr}.card{padding:32px 24px}.ch-footer-inner{flex-direction:column}}\n@media(max-width:480px){nav{display:none}.bp-grid{grid-template-columns:1fr}}\n</style>\n</head>\n<body>\n\n<div class=\"orb o1\"></div><div class=\"orb o2\"></div>\n\n\n<section class=\"hero-sec\">\n<div class=\"wrap\">\n  <div style=\"opacity:0;animation:fU .7s var(--ease-out) .5s forwards\"><p class=\"eyebrow\">Chapter 05 \u2014 Intermediate</p></div>\n  <h1 class=\"display\" style=\"opacity:0;animation:fU .9s var(--ease-out) .65s forwards;margin-bottom:28px\">Layout &<br><em>composition.</em></h1>\n  <p class=\"lead\" style=\"opacity:0;animation:fU .9s var(--ease-out) .8s forwards;max-width:580px;margin-bottom:40px\">The grid is the invisible architecture of every great site. Learn how columns, spacing systems, and breakpoints work \u2014 and how to break rules intentionally to create tension and interest.</p>\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fU .7s var(--ease-out) .95s forwards\">\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:var(--glass2);border:1px solid var(--border2);border-radius:100px;color:var(--ink3)\">~40 min read</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(31,122,92,.08);border:1px solid rgba(31,122,92,.18);border-radius:100px;color:var(--jade)\">1 build exercise</span>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- CSS GRID -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">CSS Grid</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Grid is how professionals think about page structure.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">CSS Grid is a 2-dimensional layout system. It controls columns AND rows simultaneously. Every major site uses it for page structure. You never write it yourself \u2014 but understanding it means you can describe exactly what layout you want.</p>\n\n  <div class=\"card reveal\">\n    <h3 class=\"h3\" style=\"margin-bottom:20px\">The 12-column grid \u2014 the design industry standard</h3>\n    <p class=\"bt\">Everything in print and web design is based on a 12-column grid. Why 12? Because it divides evenly into 2, 3, 4, and 6 columns. One system, infinite layouts.</p>\n    <div class=\"grid-demo\">\n      <div class=\"grid-demo-label\">12-Column Base Grid</div>\n      <div class=\"grid-vis g12\">\n        <div class=\"gc\">1</div><div class=\"gc\">2</div><div class=\"gc\">3</div><div class=\"gc\">4</div>\n        <div class=\"gc\">5</div><div class=\"gc\">6</div><div class=\"gc\">7</div><div class=\"gc\">8</div>\n        <div class=\"gc\">9</div><div class=\"gc\">10</div><div class=\"gc\">11</div><div class=\"gc\">12</div>\n      </div>\n    </div>\n\n    <h3 class=\"h3\" style=\"margin:32px 0 16px\">Common layout patterns built on 12 columns</h3>\n    <div class=\"grid-demo reveal\">\n      <div class=\"grid-demo-label\">Content + Sidebar (8 + 4)</div>\n      <div class=\"grid-vis g12\">\n        <div class=\"gc span8 tall\">Main content area</div>\n        <div class=\"gc span4 tall\">Sidebar</div>\n      </div>\n    </div>\n    <div class=\"grid-demo reveal\">\n      <div class=\"grid-demo-label\">3-Column Cards (4 + 4 + 4)</div>\n      <div class=\"grid-vis g12\">\n        <div class=\"gc span4 tall\">Card One</div>\n        <div class=\"gc span4 tall\">Card Two</div>\n        <div class=\"gc span4 tall\">Card Three</div>\n      </div>\n    </div>\n    <div class=\"grid-demo reveal\">\n      <div class=\"grid-demo-label\">Featured + 2 Small (6 + 3 + 3)</div>\n      <div class=\"grid-vis g12\">\n        <div class=\"gc span6 tall featured\">Featured</div>\n        <div class=\"gc span3 tall\">Card</div>\n        <div class=\"gc span3 tall\">Card</div>\n      </div>\n    </div>\n    <div class=\"grid-demo reveal\">\n      <div class=\"grid-demo-label\">Auto-fill cards (responsive, no breakpoints)</div>\n      <div class=\"grid-vis g-auto\">\n        <div class=\"gc tall\">Card</div><div class=\"gc tall\">Card</div>\n        <div class=\"gc tall\">Card</div><div class=\"gc tall\">Card</div><div class=\"gc tall\">Card</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- FLEXBOX VS GRID -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal ea\">Grid vs Flexbox</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Both are layout tools. Each has its domain.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">The confusion is real but the rule is simple: Grid for page-level structure (rows AND columns). Flexbox for component-level alignment (one direction).</p>\n  <div class=\"two-col reveal\">\n    <div class=\"csm\">\n      <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sapphire);margin-bottom:16px\">CSS Grid \u2014 Use For</div>\n      <div style=\"font-size:14px;color:var(--ink2);line-height:2\">Page section layouts<br>Card grids<br>Dashboards with panels<br>Any 2D layout (rows + columns)<br>When items need to align across rows<br>Image galleries</div>\n      <div class=\"code-block\" style=\"margin-top:16px;font-size:11px\">\n        <span class=\"prop\">display</span>: <span class=\"val\">grid</span>;<br>\n        <span class=\"prop\">grid-template-columns</span>: <span class=\"val\">repeat(3, 1fr)</span>;<br>\n        <span class=\"prop\">gap</span>: <span class=\"val\">24px</span>;\n      </div>\n    </div>\n    <div class=\"csm\">\n      <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:16px\">Flexbox \u2014 Use For</div>\n      <div style=\"font-size:14px;color:var(--ink2);line-height:2\">Navigation bars<br>Button groups<br>Card internals<br>Horizontal pill lists<br>Single-row or single-column flows<br>Centering things</div>\n      <div class=\"code-block\" style=\"margin-top:16px;font-size:11px\">\n        <span class=\"prop\">display</span>: <span class=\"val\">flex</span>;<br>\n        <span class=\"prop\">align-items</span>: <span class=\"val\">center</span>;<br>\n        <span class=\"prop\">gap</span>: <span class=\"val\">12px</span>;\n      </div>\n    </div>\n  </div>\n  <div class=\"callout cf reveal\">\n    <p class=\"callout-label\">The Easy Rule</p>\n    <p>Think about it this way: the outer structure of a page (sections, content areas, sidebars) \u2192 Grid. The insides of each component (icon + text, buttons, tags) \u2192 Flexbox. You'll often use both: Grid to lay out cards in a grid, then Flexbox inside each card to align its icon and text.</p>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- SPACING -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">Spacing Systems</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">Never guess spacing. Use a system based on a single base unit.</h2>\n    <p class=\"bt\">Professional design systems use multiples of 4px or 8px for all spacing. This creates visual rhythm \u2014 elements feel like they belong to the same world. Random spacing (14px here, 17px there) creates invisible friction that makes designs feel unresolved.</p>\n    <p class=\"bt\">The 8-point grid: 8, 16, 24, 32, 40, 48, 64, 80, 96, 120, 160. Every spacing value in your design should come from this list. Padding, margin, gap \u2014 all multiples of 8.</p>\n    <div class=\"spacing-demo reveal\">\n      <div class=\"sp-row\"><div class=\"sp-label\">4px \u2014 xs</div><div class=\"sp-bar\" style=\"width:5%\"><span class=\"sp-val\">Inline gap, tag spacing</span></div></div>\n      <div class=\"sp-row\"><div class=\"sp-label\">8px \u2014 sm</div><div class=\"sp-bar\" style=\"width:8%\"><span class=\"sp-val\">Button padding y-axis</span></div></div>\n      <div class=\"sp-row\"><div class=\"sp-label\">16px \u2014 md</div><div class=\"sp-bar\" style=\"width:16%\"><span class=\"sp-val\">Card internal padding</span></div></div>\n      <div class=\"sp-row\"><div class=\"sp-label\">24px \u2014 lg</div><div class=\"sp-bar\" style=\"width:22%\"><span class=\"sp-val\">Component gap</span></div></div>\n      <div class=\"sp-row\"><div class=\"sp-label\">48px \u2014 xl</div><div class=\"sp-bar\" style=\"width:40%\"><span class=\"sp-val\">Between sections in card</span></div></div>\n      <div class=\"sp-row\"><div class=\"sp-label\">80px \u2014 2xl</div><div class=\"sp-bar\" style=\"width:65%\"><span class=\"sp-val\">Header / section start</span></div></div>\n      <div class=\"sp-row\"><div class=\"sp-label\">120px \u2014 3xl</div><div class=\"sp-bar\" style=\"width:92%\"><span class=\"sp-val\">Full section padding</span></div></div>\n    </div>\n    <div class=\"callout cj\" style=\"margin-top:8px\">\n      <p class=\"callout-label\">Tell Claude This</p>\n      <p>\"Use an 8-point spacing system throughout. Section padding should be 120px top and bottom. Card padding 48px. Component gaps 24px. Internal element gaps 12\u201316px.\"</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- RESPONSIVE / BREAKPOINTS -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">Responsive Design</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Every site needs to work at every screen size. This is not optional.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">More than 60% of web browsing is on mobile. A site that breaks on phone is a broken site. Breakpoints are the widths at which layout changes. Master these three and you cover 98% of devices.</p>\n  <div class=\"bp-grid reveal\">\n    <div class=\"bp-card\"><div class=\"bp-icon\">\ud83d\udcf1</div><div class=\"bp-size\">480px max</div><div class=\"bp-desc\">Mobile. Single column. Large touch targets. Stacked navigation. Font sizes reduced slightly.</div></div>\n    <div class=\"bp-card\"><div class=\"bp-icon\">\ud83d\udcbb</div><div class=\"bp-size\">768px max</div><div class=\"bp-desc\">Tablet. 2-column layouts where possible. Navigation may collapse. Images resize.</div></div>\n    <div class=\"bp-card\"><div class=\"bp-icon\">\ud83d\udda5\ufe0f</div><div class=\"bp-size\">1200px+</div><div class=\"bp-desc\">Desktop. Full grid, multi-column layouts, side-by-side content, full navigation.</div></div>\n  </div>\n  <div class=\"code-block reveal\">\n    <span class=\"code-label\">Responsive CSS</span>\n    <span class=\"cm\">/* Desktop: 3 columns */</span><br>\n    <span class=\"prop\">.cards</span> { <span class=\"prop\">display</span>: <span class=\"val\">grid</span>; <span class=\"prop\">grid-template-columns</span>: <span class=\"val\">repeat(3,1fr)</span>; }<br><br>\n    <span class=\"cm\">/* Tablet: 2 columns */</span><br>\n    <span class=\"kw\">@media</span>(<span class=\"val\">max-width: 768px</span>) {<br>\n    &nbsp;&nbsp;<span class=\"prop\">.cards</span> { <span class=\"prop\">grid-template-columns</span>: <span class=\"val\">repeat(2,1fr)</span>; }<br>\n    }<br><br>\n    <span class=\"cm\">/* Mobile: 1 column */</span><br>\n    <span class=\"kw\">@media</span>(<span class=\"val\">max-width: 480px</span>) {<br>\n    &nbsp;&nbsp;<span class=\"prop\">.cards</span> { <span class=\"prop\">grid-template-columns</span>: <span class=\"val\">1fr</span>; }<br>\n    }\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- BREAKING THE GRID -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow ej\">Advanced Composition</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">Breaking the grid on purpose is how Awwwards sites create tension.</h2>\n    <p class=\"bt\">The grid creates order. Breaking it intentionally creates energy. The key word is intentionally \u2014 you must establish the grid first before you can break it meaningfully. Awwwards winners often have one element that bleeds past the container, one oversized heading that crashes into the layout, one overlapping card that ignores the column boundary.</p>\n    <p class=\"bt\">These breaks create dynamic tension. The eye is surprised, interest is activated, the design feels alive. But they only work because the rest of the page is rigorously gridded. Without the discipline, there's no contrast.</p>\n    <div class=\"callout reveal\" style=\"border-color:var(--sapphire);background:rgba(46,111,212,.04)\">\n      <p class=\"callout-label\" style=\"color:var(--sapphire)\">Prompt Template for Breaking the Grid</p>\n      <p>\"The hero section should use an asymmetric layout \u2014 the heading should be massive and bleed to the left edge of the viewport, while the supporting text sits right-aligned in a narrow column on the right side. Create intentional visual tension.\"</p>\n    </div>\n    <div class=\"two-col\" style=\"margin-top:20px\">\n      <div class=\"csm\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sapphire);margin-bottom:12px\">Ways to Break the Grid</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:1.9\">Bleed text to viewport edge<br>Oversized display numbers (200px+)<br>Overlapping card elements<br>One image breaking out of its column<br>Offset asymmetric two-column hero<br>Rotate a single element slightly</div>\n      </div>\n      <div class=\"csm\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:12px\">When NOT to Break</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:1.9\">Feature sections with multiple cards<br>Pricing tables<br>Navigation<br>Forms and inputs<br>Data dashboards<br>Content-heavy pages (blogs, docs)</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- EXERCISE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"exercise reveal\">\n    <p class=\"eyebrow ej\">Chapter 05 \u2014 Build Exercise</p>\n    <h2 class=\"ex-title\">Build a 3-section landing page using proper layout principles.</h2>\n    <p class=\"ex-desc\">This exercise gets you building real structure. You'll describe a complete layout to Claude and see how grid, spacing, and responsive design come together in a real page.</p>\n    <div class=\"ex-steps\">\n      <div class=\"ex-step\"><div class=\"ex-n\">01</div><div class=\"ex-text\">Tell Claude: <strong>\"Build a single-file HTML landing page with a hero section (centered, full viewport height), a 3-column features grid, and a full-width CTA section.\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">02</div><div class=\"ex-text\">Add layout specs: <strong>\"Section padding should be 120px top/bottom. The grid gap should be 24px. Max content width 1160px centered.\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">03</div><div class=\"ex-text\">Make it responsive: <strong>\"On tablet (768px), the feature grid should be 2 columns. On mobile (480px), it should be 1 column. Stack the hero content vertically on mobile.\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">04</div><div class=\"ex-text\">Now request a grid break: <strong>\"Make the hero headline 120px and let it bleed to the left edge of the viewport. Create asymmetric tension between the left headline and a right-aligned subheading.\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">05</div><div class=\"ex-text\">Deploy to Vercel. Note how the grid controls the whole page's visual rhythm. Adjust one spacing value and observe the cascade effect through the whole layout.</div></div>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"ch-footer\">\n  <div class=\"ch-footer-inner\">\n    <a href=\"chapter-04.html\" class=\"ch-btn prev\"><span class=\"ch-btn-arr\">\u2190</span><div><div class=\"ch-btn-label\">Previous</div><div class=\"ch-btn-title\">Color Theory</div></div></a>\n    <div class=\"ch-center\"><div style=\"margin-bottom:6px\">Chapter 05 of 12</div><a href=\"index.html\">Design Mastery</a></div>\n    <a href=\"chapter-06.html\" class=\"ch-btn next\"><div><div class=\"ch-btn-label\">Next Chapter</div><div class=\"ch-btn-title\">Motion & Animation</div></div><span class=\"ch-btn-arr\">\u2192</span></a>\n  </div>\n</div>\n\n<script>\ngsap.registerPlugin(ScrollTrigger);\nwindow.addEventListener('scroll',()=>{const s=document.documentElement.scrollTop,h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('pb').style.width=(s/h*100)+'%'});\ngsap.utils.toArray('.reveal').forEach((el,i)=>{gsap.fromTo(el,{opacity:0,y:44},{opacity:1,y:0,duration:.85,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 84%'},delay:(i%3)*.07})});\n<\/script>\n</body>\n</html>\n"</script>
<script type="application/json" id="ch-data-5">"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ch 06 \u2014 Motion & Animation \u00b7 Design Mastery</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js\"><\/script>\n<style>\n:root{--bg:#f6f4f0;--bg2:#edeae4;--bg3:#e4e0d8;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.06);--ink:#100f0d;--ink2:#45433f;--ink3:#8c8880;--ink4:#b5b2ac;--fire:#e8500a;--amber:#d4880a;--sapphire:#2e6fd4;--jade:#1f7a5c;--glass:rgba(255,255,255,.65);--glass2:rgba(255,255,255,.42);--sh2:0 8px 32px rgba(0,0,0,.08);--sh3:0 20px 60px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.06);--sh4:0 40px 100px rgba(0,0,0,.13);--r1:8px;--r2:14px;--r3:22px;--ease-out:cubic-bezier(0.16,1,0.3,1)}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}*{scrollbar-width:none}*::-webkit-scrollbar{display:none}\nbody{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden}a{color:inherit;text-decoration:none}\nbody::after{content:'';position:fixed;inset:0;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E\");pointer-events:none;z-index:9999;opacity:.5}\n.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}\n.o1{width:600px;height:600px;background:radial-gradient(circle,rgba(232,80,10,.10),transparent 68%);top:-100px;right:-100px;animation:oA 22s ease-in-out infinite}\n.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(46,111,212,.08),transparent 68%);bottom:-80px;left:-80px;animation:oB 28s ease-in-out infinite}\n@keyframes oA{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,50px)}}\n@keyframes oB{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-40px)}}\n.progress-bar{position:fixed;top:0;left:0;height:2px;z-index:1000;background:linear-gradient(90deg,var(--fire),var(--sapphire));width:0%;transition:width .1s linear}\nnav{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:500;background:var(--glass);backdrop-filter:blur(28px);border:1px solid var(--border);border-radius:100px;padding:10px 22px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh2);opacity:0;animation:navIn .7s var(--ease-out) .4s forwards;white-space:nowrap}\n@keyframes navIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}\n.nav-home{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-right:14px;border-right:1px solid var(--border)}\n.wrap{max-width:900px;margin:0 auto;padding:0 32px}\nsection{position:relative;z-index:10;padding:100px 0}\n.hero-sec{min-height:100vh;display:flex;align-items:center;padding:80px 0}\n.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);position:relative;z-index:10}\n.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fire);display:flex;align-items:center;gap:12px;margin-bottom:18px}\n.eyebrow::before{content:'';width:28px;height:1px;background:var(--fire);flex-shrink:0}\n.es{color:var(--sapphire)}.es::before{background:var(--sapphire)}\n.ej{color:var(--jade)}.ej::before{background:var(--jade)}\n.ea{color:var(--amber)}.ea::before{background:var(--amber)}\n.display{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink)}\n.display em{font-style:normal;background:linear-gradient(135deg,var(--fire),var(--sapphire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.035em;line-height:1.1;color:var(--ink)}\n.h3{font-family:'Bricolage Grotesque',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:-.025em;color:var(--ink)}\n.lead{font-size:clamp(1rem,1.5vw,1.12rem);color:var(--ink2);line-height:1.8}\n.bt{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:20px}\n.bt:last-child{margin-bottom:0}\n.card{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh3);padding:52px;position:relative;overflow:hidden}\n.card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.csm{background:var(--glass2);backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);padding:28px;position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s,background .3s}\n.csm::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 50%);pointer-events:none;border-radius:inherit}\n.csm:hover{transform:translateY(-5px);box-shadow:var(--sh3);background:var(--glass)}\n.callout{padding:24px 28px;border-radius:var(--r2);border-left:3px solid var(--fire);background:rgba(232,80,10,.04);margin:28px 0}\n.cb{border-color:var(--sapphire);background:rgba(46,111,212,.04)}\n.cj{border-color:var(--jade);background:rgba(31,122,92,.04)}\n.ca{border-color:var(--amber);background:rgba(212,136,10,.04)}\n.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fire);margin-bottom:10px}\n.cb .callout-label{color:var(--sapphire)}.cj .callout-label{color:var(--jade)}.ca .callout-label{color:var(--amber)}\n.callout p{font-size:14px;color:var(--ink2);line-height:1.75}\n.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:28px 0}\n.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:28px 0}\n.code-block{background:var(--ink);border-radius:var(--r2);padding:24px 28px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.9;color:#d4d0c8;overflow-x:auto;position:relative;margin:20px 0}\n.kw{color:#f0a050}.str{color:#7dd3a8}.cm{color:rgba(255,255,255,.28);font-style:italic}.prop{color:#c4b5fd}.val{color:#f9a8d4}.fn{color:#c084fc}\n.code-label{position:absolute;top:12px;right:16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.2)}\n\n/* LIVE DEMOS */\n.demo-box{padding:28px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border2);margin:20px 0;overflow:hidden;min-height:100px;display:flex;align-items:center;justify-content:center}\n.demo-btn{padding:14px 28px;background:var(--ink);color:var(--bg);border-radius:100px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;transition:all .35s cubic-bezier(0.16,1,0.3,1);display:inline-flex;align-items:center;gap:10px}\n.demo-btn:hover{background:var(--fire);transform:translateY(-4px);box-shadow:0 16px 40px rgba(232,80,10,.3)}\n.demo-card-anim{padding:24px;background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r2);width:200px;cursor:pointer;transition:all .4s cubic-bezier(0.16,1,0.3,1);box-shadow:0 4px 16px rgba(0,0,0,.06)}\n.demo-card-anim:hover{transform:translateY(-12px) scale(1.02);box-shadow:0 32px 80px rgba(0,0,0,.15)}\n.demo-num{width:60px;height:60px;border-radius:50%;background:var(--fire);display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:800;color:white;margin:0 auto 12px;transition:transform .4s cubic-bezier(0.34,1.56,0.64,1)}\n.demo-card-anim:hover .demo-num{transform:scale(1.2) rotate(10deg)}\n\n/* EASING VIS */\n.easing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}\n.ease-card{padding:20px;background:var(--glass2);backdrop-filter:blur(12px);border:1px solid var(--border2);border-radius:var(--r2);cursor:pointer;transition:all var(--ease-out) .4s;position:relative;overflow:hidden}\n.ease-card:hover{background:var(--glass);box-shadow:var(--sh2)}\n.ease-name{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fire);margin-bottom:8px}\n.ease-curve{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:12px}\n.ease-value{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);background:var(--bg2);padding:4px 8px;border-radius:4px}\n.ease-feel{font-size:12px;color:var(--jade);margin-top:8px;font-style:italic}\n\n/* TIMING TABLE */\n.timing-table{width:100%;margin:20px 0;border-collapse:collapse}\n.timing-table th{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);padding:12px 16px;text-align:left;border-bottom:1px solid var(--border2)}\n.timing-table td{font-size:13px;color:var(--ink2);padding:14px 16px;border-bottom:1px solid var(--border2);vertical-align:top}\n.timing-table tr:hover td{background:rgba(255,255,255,.3)}\n.tt-type{font-weight:600;color:var(--ink)}\n.tt-range{font-family:'DM Mono',monospace;font-size:11px;color:var(--fire)}\n\n.exercise{background:linear-gradient(135deg,rgba(31,122,92,.07),rgba(255,255,255,.4));border:1px solid rgba(31,122,92,.2);border-radius:var(--r3);padding:48px;position:relative;overflow:hidden;margin:48px 0}\n.exercise::before{content:'EXERCISE';position:absolute;top:24px;right:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(31,122,92,.4)}\n.ex-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}\n.ex-desc{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:28px}\n.ex-steps{display:flex;flex-direction:column;gap:12px}\n.ex-step{display:grid;grid-template-columns:32px 1fr;gap:14px;align-items:start;padding:16px 20px;background:rgba(255,255,255,.5);border-radius:var(--r2);border:1px solid rgba(31,122,92,.1)}\n.ex-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--jade);font-weight:500}\n.ex-text{font-size:14px;color:var(--ink2);line-height:1.65}.ex-text strong{color:var(--ink)}\n.ch-footer{position:relative;z-index:10;padding:60px 0 80px;border-top:1px solid var(--border)}\n.ch-footer-inner{max-width:900px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}\n.ch-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .35s var(--ease-out);text-decoration:none;color:inherit}\n.ch-btn:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateY(-3px)}\n.ch-btn-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}\n.ch-btn-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}\n.ch-btn.next{flex-direction:row-reverse;text-align:right}\n.ch-btn-arr{font-size:20px;color:var(--ink3);transition:transform .3s}\n.ch-btn.prev:hover .ch-btn-arr{transform:translateX(-4px)}.ch-btn.next:hover .ch-btn-arr{transform:translateX(4px)}\n.ch-center{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink4);text-align:center}\n.ch-center a{color:var(--fire)}\n.reveal{opacity:0;transform:translateY(40px)}\n@keyframes fU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}\n@media(max-width:768px){.two-col,.three-col,.easing-grid{grid-template-columns:1fr 1fr}.card{padding:32px 24px}.ch-footer-inner{flex-direction:column}}\n@media(max-width:480px){nav{display:none}.easing-grid{grid-template-columns:1fr}}\n</style>\n</head>\n<body>\n\n<div class=\"orb o1\"></div><div class=\"orb o2\"></div>\n\n\n<section class=\"hero-sec\">\n<div class=\"wrap\">\n  <div style=\"opacity:0;animation:fU .7s var(--ease-out) .5s forwards\"><p class=\"eyebrow\">Chapter 06 \u2014 Intermediate</p></div>\n  <h1 class=\"display\" style=\"opacity:0;animation:fU .9s var(--ease-out) .65s forwards;margin-bottom:28px\">Motion &<br><em>animation.</em></h1>\n  <p class=\"lead\" style=\"opacity:0;animation:fU .9s var(--ease-out) .8s forwards;max-width:580px;margin-bottom:40px\">Animation is not decoration \u2014 it's communication. It directs attention, confirms actions, conveys hierarchy, and makes interfaces feel alive. Get the timing wrong and it becomes noise. Get it right and it becomes art.</p>\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fU .7s var(--ease-out) .95s forwards\">\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:var(--glass2);border:1px solid var(--border2);border-radius:100px;color:var(--ink3)\">~45 min read</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(31,122,92,.08);border:1px solid rgba(31,122,92,.18);border-radius:100px;color:var(--jade)\">1 build exercise</span>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- WHEN TO ANIMATE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">The Philosophy</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">Animate meaning, not movement.</h2>\n    <p class=\"bt\">Every animation should answer the question: what does this motion communicate? An element fading in from below tells the user \"this content is arriving.\" A button lifting on hover says \"this is interactive.\" A number counting up says \"this is real data loading in real time.\"</p>\n    <p class=\"bt\">Animation without purpose is visual noise. It fatigues the eye, slows perceived performance, and trains users to ignore it. The best animations are the ones users can't quite describe \u2014 they just know the site feels alive and responsive.</p>\n    <div class=\"two-col\" style=\"margin-top:20px\">\n      <div style=\"padding:20px;background:rgba(31,122,92,.05);border:1px solid rgba(31,122,92,.12);border-radius:var(--r2)\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:12px\">\u2713 Purposeful Animation</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:1.9\">Scroll reveals \u2014 content arrives<br>Hover feedback \u2014 confirms interactivity<br>Loading states \u2014 progress communication<br>Page transitions \u2014 spatial orientation<br>Success/error states \u2014 result confirmation<br>Micro-interactions \u2014 precision feedback</div>\n      </div>\n      <div style=\"padding:20px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.12);border-radius:var(--r2)\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ef4444;margin-bottom:12px\">\u2717 Meaningless Animation</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:1.9\">Background elements constantly moving<br>Headings that pulse for no reason<br>Cursor trails and sparkles<br>Auto-playing carousels<br>Animations longer than 600ms<br>Everything animating at once on scroll</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- CSS TRANSITIONS -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">CSS Transitions</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">The foundation of all interactive animation.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">A CSS transition says: \"when this property changes, animate the change smoothly over this duration.\" It's the single most used animation technique on the web \u2014 and it's what makes hover states feel polished instead of jarring.</p>\n\n  <div class=\"demo-box reveal\">\n    <div style=\"display:flex;gap:20px;flex-wrap:wrap;justify-content:center\">\n      <button class=\"demo-btn\">Hover Me \u2192</button>\n      <div class=\"demo-card-anim\">\n        <div class=\"demo-num\">42</div>\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-align:center;color:var(--ink3)\">HOVER CARD</div>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"code-block reveal\">\n    <span class=\"code-label\">CSS Transitions</span>\n    <span class=\"prop\">.button</span> {<br>\n    &nbsp;&nbsp;<span class=\"prop\">background</span>: <span class=\"val\">#100f0d</span>;<br>\n    &nbsp;&nbsp;<span class=\"prop\">transform</span>: <span class=\"val\">translateY(0)</span>;<br>\n    &nbsp;&nbsp;<span class=\"cm\">/* The magic line: property | duration | easing */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">transition</span>: <span class=\"val\">all 0.35s cubic-bezier(0.16, 1, 0.3, 1)</span>;<br>\n    }<br>\n    <span class=\"prop\">.button:hover</span> {<br>\n    &nbsp;&nbsp;<span class=\"prop\">background</span>: <span class=\"val\">#e8500a</span>; <span class=\"cm\">/* CSS animates the color change */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">transform</span>: <span class=\"val\">translateY(-4px)</span>; <span class=\"cm\">/* And the lift */</span><br>\n    &nbsp;&nbsp;<span class=\"prop\">box-shadow</span>: <span class=\"val\">0 16px 40px rgba(232,80,10,.3)</span>;<br>\n    }\n  </div>\n\n  <div class=\"callout ca reveal\">\n    <p class=\"callout-label\">The Golden Easing</p>\n    <p><code style=\"background:rgba(0,0,0,.06);padding:2px 5px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px\">cubic-bezier(0.16, 1, 0.3, 1)</code> \u2014 This is the \"ease out exponential\" curve. Fast start, gentle finish. Used by Apple, Stripe, Linear. It makes everything feel snappy and physical. Tell Claude to use this as the default easing on all transitions.</p>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- EASING -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal es\">Easing Curves</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">The difference between animation that feels right and animation that feels off is almost always easing.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">Easing controls acceleration. Linear motion feels robotic \u2014 nothing in nature moves at constant speed. Ease-out (fast start, slow finish) feels natural for arriving elements. Ease-in (slow start, fast finish) for leaving elements.</p>\n\n  <div class=\"easing-grid reveal\">\n    <div class=\"ease-card\">\n      <div class=\"ease-name\">Ease Out</div>\n      <div class=\"ease-curve\">Fast start, decelerates to rest. Most natural for UI \u2014 like an object sliding in and stopping.</div>\n      <div><span class=\"ease-value\">cubic-bezier(0.16,1,0.3,1)</span></div>\n      <div class=\"ease-feel\">\u2713 Use for: enters, reveals, drops</div>\n    </div>\n    <div class=\"ease-card\">\n      <div class=\"ease-name\">Ease In</div>\n      <div class=\"ease-curve\">Slow start, accelerates to end. Feels like picking up speed. Natural for exits.</div>\n      <div><span class=\"ease-value\">cubic-bezier(0.4,0,1,1)</span></div>\n      <div class=\"ease-feel\">\u2713 Use for: exits, dismissals</div>\n    </div>\n    <div class=\"ease-card\">\n      <div class=\"ease-name\">Ease In-Out</div>\n      <div class=\"ease-curve\">Slow start AND end. Smooth, organic movement. Used for page-level transitions.</div>\n      <div><span class=\"ease-value\">cubic-bezier(0.4,0,0.2,1)</span></div>\n      <div class=\"ease-feel\">\u2713 Use for: page transitions</div>\n    </div>\n    <div class=\"ease-card\">\n      <div class=\"ease-name\">Spring</div>\n      <div class=\"ease-curve\">Overshoots the target slightly before settling. Physical, bouncy. Great for interactive elements.</div>\n      <div><span class=\"ease-value\">cubic-bezier(0.34,1.56,0.64,1)</span></div>\n      <div class=\"ease-feel\">\u2713 Use for: buttons, interactive cards</div>\n    </div>\n    <div class=\"ease-card\">\n      <div class=\"ease-name\">Linear</div>\n      <div class=\"ease-curve\">Constant speed. Mechanical. Never use for UI animations \u2014 use only for looping effects.</div>\n      <div><span class=\"ease-value\">linear</span></div>\n      <div class=\"ease-feel\">\u2713 Use for: progress bars, spinners</div>\n    </div>\n    <div class=\"ease-card\">\n      <div class=\"ease-name\">CSS ease</div>\n      <div class=\"ease-curve\">Browser default. Mediocre. Adequate for minor hover states but never for hero animations.</div>\n      <div><span class=\"ease-value\">ease</span></div>\n      <div class=\"ease-feel\">\u26a0 Use for: minor details only</div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- TIMING -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow ea\">Animation Timing</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">Duration is everything. Too slow = sluggish. Too fast = jittery.</h2>\n    <table class=\"timing-table\">\n      <thead>\n        <tr>\n          <th>Type</th>\n          <th>Duration</th>\n          <th>Examples</th>\n          <th>Feel</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr><td class=\"tt-type\">Micro-interactions</td><td class=\"tt-range\">80\u2013120ms</td><td>Button press, toggle</td><td>Instant, snappy</td></tr>\n        <tr><td class=\"tt-type\">Hover states</td><td class=\"tt-range\">200\u2013350ms</td><td>Card lift, color change</td><td>Responsive</td></tr>\n        <tr><td class=\"tt-type\">Scroll reveals</td><td class=\"tt-range\">600\u2013900ms</td><td>Element appearing on scroll</td><td>Deliberate, smooth</td></tr>\n        <tr><td class=\"tt-type\">Page transitions</td><td class=\"tt-range\">400\u2013600ms</td><td>Page entering or leaving</td><td>Smooth, not jarring</td></tr>\n        <tr><td class=\"tt-type\">Ambient loops</td><td class=\"tt-range\">8\u201330s</td><td>Background orbs, floating shapes</td><td>Barely visible</td></tr>\n        <tr><td class=\"tt-type\">Never</td><td class=\"tt-range\">1000ms+</td><td>Any interactive element</td><td>User will leave</td></tr>\n      </tbody>\n    </table>\n    <div class=\"callout cb\" style=\"margin-top:20px\">\n      <p class=\"callout-label\">The Speed Test</p>\n      <p>If the user taps a button and has to wait more than 200ms to see a result, it feels broken. If an enter animation takes longer than 700ms, users are already reading content before it finishes playing. Animation should enhance experience, not make users wait for it.</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- GSAP -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">GSAP</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">The professional animation library. Used on nearly every Awwwards winner.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">GSAP (GreenSock Animation Platform) is what Claude uses for all complex scroll-driven animations. You never write this yourself \u2014 but understanding what it does makes you a much better creative director.</p>\n\n  <div class=\"code-block reveal\">\n    <span class=\"code-label\">GSAP \u2014 Scroll Reveal</span>\n    <span class=\"cm\">// This is what Claude uses to make elements appear on scroll</span><br>\n    <span class=\"fn\">gsap.registerPlugin</span>(<span class=\"str\">ScrollTrigger</span>);<br><br>\n    <span class=\"cm\">// Animate every .reveal element as it enters viewport</span><br>\n    <span class=\"fn\">gsap.utils.toArray</span>(<span class=\"str\">'.reveal'</span>).<span class=\"fn\">forEach</span>((el, i) => {<br>\n    &nbsp;&nbsp;<span class=\"fn\">gsap.fromTo</span>(el,<br>\n    &nbsp;&nbsp;&nbsp;&nbsp;{ <span class=\"prop\">opacity</span>: <span class=\"val\">0</span>, <span class=\"prop\">y</span>: <span class=\"val\">44</span> },<span class=\"cm\">   // FROM: invisible, shifted down</span><br>\n    &nbsp;&nbsp;&nbsp;&nbsp;{<br>\n    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"prop\">opacity</span>: <span class=\"val\">1</span>, <span class=\"prop\">y</span>: <span class=\"val\">0</span>,<span class=\"cm\">        // TO: visible, in position</span><br>\n    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"prop\">duration</span>: <span class=\"val\">.85</span>,<br>\n    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"prop\">ease</span>: <span class=\"str\">'power3.out'</span>,<br>\n    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"prop\">scrollTrigger</span>: { <span class=\"prop\">trigger</span>: el, <span class=\"prop\">start</span>: <span class=\"str\">'top 84%'</span> },<br>\n    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"prop\">delay</span>: (i % <span class=\"val\">3</span>) * <span class=\"val\">.07</span> <span class=\"cm\">// Stagger: each .07s later</span><br>\n    &nbsp;&nbsp;&nbsp;&nbsp;}<br>\n    &nbsp;&nbsp;);<br>\n    });\n  </div>\n\n  <div class=\"three-col reveal\">\n    <div class=\"csm\">\n      <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fire);margin-bottom:12px\">GSAP Timeline</div>\n      <p style=\"font-size:13px;color:var(--ink2);line-height:1.7\">Sequences multiple animations. Element 1 plays, then element 2 starts, then element 3. Perfect for hero entrances where logo, then headline, then subtext animate in sequence.</p>\n    </div>\n    <div class=\"csm\">\n      <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sapphire);margin-bottom:12px\">ScrollTrigger</div>\n      <p style=\"font-size:13px;color:var(--ink2);line-height:1.7\">Triggers any GSAP animation when an element enters or exits the viewport. Can pin sections, scrub animations to scroll position, or create parallax effects.</p>\n    </div>\n    <div class=\"csm\">\n      <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:12px\">GSAP Stagger</div>\n      <p style=\"font-size:13px;color:var(--ink2);line-height:1.7\">Animate multiple elements in sequence with a delay between each. Card grids, list items, navigation links \u2014 stagger makes groups feel choreographed, not simultaneous.</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- LENIS -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow ej\">Lenis Smooth Scroll</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">The one line that makes every site feel buttery.</h2>\n    <p class=\"bt\">Default browser scroll is jerky \u2014 it responds to each wheel tick with an instant jump. Lenis.js intercepts scroll events and replaces them with smooth, momentum-based inertia. The page glides. You feel it in your wrist. It's the first thing people notice on premium sites and they can't say why the site feels so smooth.</p>\n    <div class=\"code-block reveal\">\n      <span class=\"code-label\">Lenis Setup</span>\n      <span class=\"cm\">// Include via CDN in your HTML head</span><br>\n      <span class=\"kw\">&lt;script src</span>=<span class=\"str\">\"https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js\"</span><span class=\"kw\">&gt;&lt;/script&gt;</span><br><br>\n      <span class=\"cm\">// Initialize in your script</span><br>\n      <span class=\"kw\">const</span> lenis = <span class=\"kw\">new</span> <span class=\"fn\">Lenis</span>({<br>\n      &nbsp;&nbsp;<span class=\"prop\">duration</span>: <span class=\"val\">1.2</span>,<br>\n      &nbsp;&nbsp;<span class=\"prop\">easing</span>: (t) => <span class=\"fn\">Math.min</span>(<span class=\"val\">1</span>, <span class=\"val\">1.001</span> - <span class=\"fn\">Math.pow</span>(<span class=\"val\">2</span>, -<span class=\"val\">10</span> * t)),<br>\n      &nbsp;&nbsp;<span class=\"prop\">smooth</span>: <span class=\"val\">true</span>,<br>\n      });<br><br>\n      <span class=\"cm\">// Required animation frame loop</span><br>\n      <span class=\"kw\">function</span> <span class=\"fn\">raf</span>(time) {<br>\n      &nbsp;&nbsp;lenis.<span class=\"fn\">raf</span>(time);<br>\n      &nbsp;&nbsp;<span class=\"fn\">requestAnimationFrame</span>(raf);<br>\n      }<br>\n      <span class=\"fn\">requestAnimationFrame</span>(raf);\n    </div>\n    <div class=\"callout cb\" style=\"margin-top:8px\">\n      <p class=\"callout-label\">When to Use Lenis</p>\n      <p>Add it to any showcase site where the scroll experience matters \u2014 portfolios, product pages, landing pages. Skip it on apps where users expect native scroll behavior \u2014 dashboards, tools, forms. It adds ~15KB and one small script. Almost always worth it for visual sites.</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- EXERCISE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"exercise reveal\">\n    <p class=\"eyebrow ej\">Chapter 06 \u2014 Build Exercise</p>\n    <h2 class=\"ex-title\">Animate a landing page with scroll reveals and hover states.</h2>\n    <p class=\"ex-desc\">Animation is best learned by doing. Build a simple page and add a proper animation layer \u2014 you'll immediately feel the difference between a static site and an animated one.</p>\n    <div class=\"ex-steps\">\n      <div class=\"ex-step\"><div class=\"ex-n\">01</div><div class=\"ex-text\">Tell Claude: <strong>\"Build a landing page with 4 sections. Add GSAP ScrollTrigger so every element with class 'reveal' animates up from y:44 to y:0 with opacity 0\u21921 when it enters the viewport.\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">02</div><div class=\"ex-text\">Add hover states: <strong>\"All buttons should transition with cubic-bezier(0.16,1,0.3,1) over 350ms. On hover they should lift 4px and show an orange glow shadow.\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">03</div><div class=\"ex-text\">Add Lenis: <strong>\"Add Lenis smooth scroll with duration 1.2 so the page has butter-smooth scrolling.\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">04</div><div class=\"ex-text\">Add ambient orbs: <strong>\"Add two fixed, blurred circular elements (orbs) in the background that slowly drift on a 22-second and 28-second CSS animation loop. Use the brand accent color at 10% opacity.\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">05</div><div class=\"ex-text\">Compare before/after. The content is identical. The experience is completely different. Describe what changed emotionally about the page \u2014 this builds your animation vocabulary.</div></div>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"ch-footer\">\n  <div class=\"ch-footer-inner\">\n    <a href=\"chapter-05.html\" class=\"ch-btn prev\"><span class=\"ch-btn-arr\">\u2190</span><div><div class=\"ch-btn-label\">Previous</div><div class=\"ch-btn-title\">Layout & Composition</div></div></a>\n    <div class=\"ch-center\"><div style=\"margin-bottom:6px\">Chapter 06 of 12</div><a href=\"index.html\">Design Mastery</a></div>\n    <a href=\"chapter-07.html\" class=\"ch-btn next\"><div><div class=\"ch-btn-label\">Next Chapter</div><div class=\"ch-btn-title\">Reading Sites Like a Designer</div></div><span class=\"ch-btn-arr\">\u2192</span></a>\n  </div>\n</div>\n\n<script>\ngsap.registerPlugin(ScrollTrigger);\nwindow.addEventListener('scroll',()=>{const s=document.documentElement.scrollTop,h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('pb').style.width=(s/h*100)+'%'});\ngsap.utils.toArray('.reveal').forEach((el,i)=>{gsap.fromTo(el,{opacity:0,y:44},{opacity:1,y:0,duration:.85,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 84%'},delay:(i%3)*.07})});\n<\/script>\n</body>\n</html>\n"</script>
<script type="application/json" id="ch-data-6">"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ch 07 \u2014 Reading Sites Like a Designer \u00b7 Design Mastery</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js\"><\/script>\n<style>\n:root{--bg:#f6f4f0;--bg2:#edeae4;--bg3:#e4e0d8;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.06);--ink:#100f0d;--ink2:#45433f;--ink3:#8c8880;--ink4:#b5b2ac;--fire:#e8500a;--amber:#d4880a;--sapphire:#2e6fd4;--jade:#1f7a5c;--glass:rgba(255,255,255,.65);--glass2:rgba(255,255,255,.42);--sh2:0 8px 32px rgba(0,0,0,.08);--sh3:0 20px 60px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.06);--sh4:0 40px 100px rgba(0,0,0,.13);--r1:8px;--r2:14px;--r3:22px;--ease-out:cubic-bezier(0.16,1,0.3,1)}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}*{scrollbar-width:none}*::-webkit-scrollbar{display:none}\nbody{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden}a{color:inherit;text-decoration:none}\nbody::after{content:'';position:fixed;inset:0;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E\");pointer-events:none;z-index:9999;opacity:.5}\n.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}\n.o1{width:600px;height:600px;background:radial-gradient(circle,rgba(46,111,212,.10),transparent 68%);top:-100px;right:-100px;animation:oA 22s ease-in-out infinite}\n.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(31,122,92,.08),transparent 68%);bottom:-80px;left:-80px;animation:oB 28s ease-in-out infinite}\n@keyframes oA{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,50px)}}\n@keyframes oB{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-40px)}}\n.progress-bar{position:fixed;top:0;left:0;height:2px;z-index:1000;background:linear-gradient(90deg,var(--sapphire),var(--jade));width:0%;transition:width .1s linear}\nnav{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:500;background:var(--glass);backdrop-filter:blur(28px);border:1px solid var(--border);border-radius:100px;padding:10px 22px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh2);opacity:0;animation:navIn .7s var(--ease-out) .4s forwards;white-space:nowrap}\n@keyframes navIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}\n.nav-home{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-right:14px;border-right:1px solid var(--border)}\n.wrap{max-width:900px;margin:0 auto;padding:0 32px}\nsection{position:relative;z-index:10;padding:100px 0}\n.hero-sec{min-height:100vh;display:flex;align-items:center;padding:80px 0}\n.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);position:relative;z-index:10}\n.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--sapphire);display:flex;align-items:center;gap:12px;margin-bottom:18px}\n.eyebrow::before{content:'';width:28px;height:1px;background:var(--sapphire);flex-shrink:0}\n.ef{color:var(--fire)}.ef::before{background:var(--fire)}\n.ej{color:var(--jade)}.ej::before{background:var(--jade)}\n.ea{color:var(--amber)}.ea::before{background:var(--amber)}\n.display{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink)}\n.display em{font-style:normal;background:linear-gradient(135deg,var(--sapphire),var(--jade));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.035em;line-height:1.1;color:var(--ink)}\n.h3{font-family:'Bricolage Grotesque',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:-.025em;color:var(--ink)}\n.lead{font-size:clamp(1rem,1.5vw,1.12rem);color:var(--ink2);line-height:1.8}\n.bt{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:20px}\n.bt:last-child{margin-bottom:0}\n.card{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh3);padding:52px;position:relative;overflow:hidden}\n.card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.csm{background:var(--glass2);backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);padding:28px;position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s,background .3s}\n.csm::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 50%);pointer-events:none;border-radius:inherit}\n.csm:hover{transform:translateY(-5px);box-shadow:var(--sh3);background:var(--glass)}\n.callout{padding:24px 28px;border-radius:var(--r2);border-left:3px solid var(--sapphire);background:rgba(46,111,212,.04);margin:28px 0}\n.cj{border-color:var(--jade);background:rgba(31,122,92,.04)}\n.cf{border-color:var(--fire);background:rgba(232,80,10,.04)}\n.ca{border-color:var(--amber);background:rgba(212,136,10,.04)}\n.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sapphire);margin-bottom:10px}\n.cj .callout-label{color:var(--jade)}.cf .callout-label{color:var(--fire)}.ca .callout-label{color:var(--amber)}\n.callout p{font-size:14px;color:var(--ink2);line-height:1.75}\n.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:28px 0}\n\n/* STEP CARDS */\n.step-list{display:flex;flex-direction:column;gap:16px}\n.step-card{display:grid;grid-template-columns:80px 1fr;gap:24px;align-items:start;padding:28px 32px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border2);border-radius:var(--r2);transition:all .4s var(--ease-out);position:relative;overflow:hidden}\n.step-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--sapphire);transform:scaleY(0);transform-origin:bottom;transition:transform .4s var(--ease-out)}\n.step-card:hover{background:var(--glass);box-shadow:var(--sh3);transform:translateX(8px)}\n.step-card:hover::before{transform:scaleY(1)}\n.step-num{font-family:'Bricolage Grotesque',sans-serif;font-size:60px;font-weight:800;letter-spacing:-.06em;line-height:1;color:rgba(46,111,212,.15);transition:color .3s}\n.step-card:hover .step-num{color:rgba(46,111,212,.25)}\n.step-title{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.025em;color:var(--ink);margin-bottom:10px;line-height:1.2}\n.step-desc{font-size:14px;color:var(--ink2);line-height:1.75}\n.step-action{display:inline-flex;align-items:center;gap:8px;margin-top:14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sapphire)}\n\n/* DEVTOOLS PANELS */\n.dt-panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0}\n.dt-panel{padding:24px;background:var(--ink);border-radius:var(--r2);position:relative;overflow:hidden}\n.dt-panel-tab{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,.4);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:8px}\n.dt-panel-active{color:#7dd3a8}\n.dt-content{font-family:'DM Mono',monospace;font-size:11px;line-height:1.9;color:rgba(255,255,255,.5)}\n.dt-key{color:#93c5fd}.dt-val{color:#f9a8d4}.dt-tag{color:#f0a050}.dt-str{color:#7dd3a8}\n.dt-highlight{color:rgba(255,255,255,.85)}\n\n/* SWIPE FILE TEMPLATE */\n.swipe-template{padding:32px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border2);margin:20px 0}\n.swipe-row{display:grid;grid-template-columns:140px 1fr;gap:16px;padding:12px 0;border-bottom:1px solid var(--border2)}\n.swipe-row:last-child{border-bottom:none}\n.swipe-field{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}\n.swipe-value{font-size:13px;color:var(--ink2);line-height:1.6}\n\n.exercise{background:linear-gradient(135deg,rgba(31,122,92,.07),rgba(255,255,255,.4));border:1px solid rgba(31,122,92,.2);border-radius:var(--r3);padding:48px;position:relative;overflow:hidden;margin:48px 0}\n.exercise::before{content:'EXERCISE';position:absolute;top:24px;right:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(31,122,92,.4)}\n.ex-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}\n.ex-desc{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:28px}\n.ex-steps{display:flex;flex-direction:column;gap:12px}\n.ex-step{display:grid;grid-template-columns:32px 1fr;gap:14px;align-items:start;padding:16px 20px;background:rgba(255,255,255,.5);border-radius:var(--r2);border:1px solid rgba(31,122,92,.1)}\n.ex-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--jade);font-weight:500}\n.ex-text{font-size:14px;color:var(--ink2);line-height:1.65}.ex-text strong{color:var(--ink)}\n.ch-footer{position:relative;z-index:10;padding:60px 0 80px;border-top:1px solid var(--border)}\n.ch-footer-inner{max-width:900px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}\n.ch-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .35s var(--ease-out);text-decoration:none;color:inherit}\n.ch-btn:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateY(-3px)}\n.ch-btn-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}\n.ch-btn-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}\n.ch-btn.next{flex-direction:row-reverse;text-align:right}\n.ch-btn-arr{font-size:20px;color:var(--ink3);transition:transform .3s}\n.ch-btn.prev:hover .ch-btn-arr{transform:translateX(-4px)}.ch-btn.next:hover .ch-btn-arr{transform:translateX(4px)}\n.ch-center{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink4);text-align:center}\n.ch-center a{color:var(--fire)}\n.reveal{opacity:0;transform:translateY(40px)}\n@keyframes fU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}\n@media(max-width:768px){.two-col,.dt-panels{grid-template-columns:1fr}.step-card{grid-template-columns:1fr}.step-num{font-size:36px}.card{padding:32px 24px}.ch-footer-inner{flex-direction:column}}\n@media(max-width:480px){nav{display:none}.swipe-row{grid-template-columns:1fr;gap:6px}}\n</style>\n</head>\n<body>\n\n<div class=\"orb o1\"></div><div class=\"orb o2\"></div>\n\n\n<section class=\"hero-sec\">\n<div class=\"wrap\">\n  <div style=\"opacity:0;animation:fU .7s var(--ease-out) .5s forwards\"><p class=\"eyebrow\">Chapter 07 \u2014 Intermediate</p></div>\n  <h1 class=\"display\" style=\"opacity:0;animation:fU .9s var(--ease-out) .65s forwards;margin-bottom:28px\">Reading sites<br>like a <em>designer.</em></h1>\n  <p class=\"lead\" style=\"opacity:0;animation:fU .9s var(--ease-out) .8s forwards;max-width:580px;margin-bottom:40px\">The fastest way to improve as a designer is to steal like one \u2014 systematically. This chapter teaches you to extract every design decision from any site using a 6-step framework and DevTools. Nothing is a mystery anymore.</p>\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fU .7s var(--ease-out) .95s forwards\">\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:var(--glass2);border:1px solid var(--border2);border-radius:100px;color:var(--ink3)\">~40 min read</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(31,122,92,.08);border:1px solid rgba(31,122,92,.18);border-radius:100px;color:var(--jade)\">1 exercise</span>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- THE FRAMEWORK -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">The 6-Step Framework</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Run every great site through these six lenses. Your eye will be trained within a week.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:48px\">Don't look at the whole page at once \u2014 you'll overwhelm yourself with details. Go lens by lens. Each step reveals a different layer of the design's decision-making.</p>\n\n  <div class=\"step-list\">\n    <div class=\"step-card reveal\">\n      <div class=\"step-num\">01</div>\n      <div>\n        <div class=\"step-title\">What's the hierarchy? Where does the eye go first?</div>\n        <div class=\"step-desc\">Squint until the page blurs. What's left? Usually a big shape (the headline or hero image), then a medium shape (subheading or CTA), then small shapes (body text). Name the top three things your eye sees in order. That is the intended hierarchy \u2014 or the failure of hierarchy if nothing stands out.</div>\n        <div class=\"step-action\">\u2192 Ask: what is the most important message?</div>\n      </div>\n    </div>\n    <div class=\"step-card reveal\">\n      <div class=\"step-num\">02</div>\n      <div>\n        <div class=\"step-title\">What's the typographic system?</div>\n        <div class=\"step-desc\">Identify the display font (headlines), the body font, and any mono font (labels, tech text). Are they serif or sans? What weight is the headline? Is there negative letter-spacing? Inspect one heading in DevTools \u2014 look at font-family, font-weight, letter-spacing, and line-height. These four values define 80% of the typographic personality.</div>\n        <div class=\"step-action\">\u2192 Right-click headline \u2192 Inspect \u2192 Styles</div>\n      </div>\n    </div>\n    <div class=\"step-card reveal\">\n      <div class=\"step-num\">03</div>\n      <div>\n        <div class=\"step-title\">What is the color system?</div>\n        <div class=\"step-desc\">How many colors are used? Identify the background, the text color, and the accent. Look in DevTools for :root \u2014 most professional sites define their entire palette as CSS variables at the top. Paste them into a color picker to see the hex values. Note: is it pure black/white or near-black/warm-white? What's the accent and where is it used?</div>\n        <div class=\"step-action\">\u2192 DevTools: Elements \u2192 :root \u2192 CSS variables</div>\n      </div>\n    </div>\n    <div class=\"step-card reveal\">\n      <div class=\"step-num\">04</div>\n      <div>\n        <div class=\"step-title\">What is the grid structure?</div>\n        <div class=\"step-desc\">What's the max content width? How many columns? What's the gap between columns? In DevTools, inspect the main container \u2014 look for max-width, margin, padding. Look at the grid sections for grid-template-columns and gap. The spacing rhythm is usually visible once you know where to look: almost always multiples of 8.</div>\n        <div class=\"step-action\">\u2192 Inspect the main wrapper div</div>\n      </div>\n    </div>\n    <div class=\"step-card reveal\">\n      <div class=\"step-num\">05</div>\n      <div>\n        <div class=\"step-title\">What is the motion language?</div>\n        <div class=\"step-desc\">Scroll the page slowly. Do elements reveal on scroll? How fast do they move? What direction \u2014 up, fade, scale? Hover over buttons \u2014 what happens? How long does the transition take? Does it feel snappy or luxuriously slow? Look in DevTools for transition and animation properties on interactive elements. Note the cubic-bezier values \u2014 they encode the personality of the motion.</div>\n        <div class=\"step-action\">\u2192 Hover + inspect \u2192 Styles \u2192 transition</div>\n      </div>\n    </div>\n    <div class=\"step-card reveal\">\n      <div class=\"step-num\">06</div>\n      <div>\n        <div class=\"step-title\">What emotion does it evoke \u2014 and how?</div>\n        <div class=\"step-desc\">The synthesis step. After noting all the technical details, ask: what does this site make you feel, and which of the previous five steps creates that feeling? If it feels trustworthy: probably clean hierarchy, consistent system, generous space, blue palette. If it feels exciting: probably high contrast, aggressive typography, fast motion, saturated accent. Name the design-emotion connection explicitly.</div>\n        <div class=\"step-action\">\u2192 Write your conclusion in 2 sentences</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- DEVTOOLS DEEP DIVE -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal ef\">DevTools Deep Dive</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Extract any font, color, spacing value, or animation from any website in 60 seconds.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">DevTools is your most powerful learning tool. Most designers don't use it properly. Here's exactly what to look for and where.</p>\n\n  <div class=\"dt-panels reveal\">\n    <div class=\"dt-panel\">\n      <div class=\"dt-panel-tab\"><span class=\"dt-panel-active\">\u25cf</span> Elements</div>\n      <div class=\"dt-content\">\n        <span class=\"dt-tag\">&lt;div</span> <span class=\"dt-key\">class</span>=<span class=\"dt-str\">\"hero\"</span><span class=\"dt-tag\">&gt;</span><br>\n        &nbsp;<span class=\"dt-tag\">&lt;h1</span> <span class=\"dt-key\">class</span>=<span class=\"dt-str\">\"display\"</span><span class=\"dt-tag\">&gt;</span><br>\n        &nbsp;&nbsp;<span class=\"dt-highlight\">This is the heading</span><br>\n        &nbsp;<span class=\"dt-tag\">&lt;/h1&gt;</span><br>\n        &nbsp;<span class=\"dt-tag\">&lt;p</span> <span class=\"dt-key\">class</span>=<span class=\"dt-str\">\"lead\"</span><span class=\"dt-tag\">&gt;</span><br>\n        &nbsp;&nbsp;<span class=\"dt-highlight\">Supporting text here</span><br>\n        &nbsp;<span class=\"dt-tag\">&lt;/p&gt;</span><br>\n        <span class=\"dt-tag\">&lt;/div&gt;</span>\n      </div>\n    </div>\n    <div class=\"dt-panel\">\n      <div class=\"dt-panel-tab\"><span class=\"dt-panel-active\">\u25cf</span> Styles (for .display)</div>\n      <div class=\"dt-content\">\n        <span class=\"dt-key\">font-family</span>: <span class=\"dt-str\">'Bricolage Grotesque'</span>;<br>\n        <span class=\"dt-key\">font-size</span>: <span class=\"dt-val\">clamp(3rem, 7vw, 6.5rem)</span>;<br>\n        <span class=\"dt-key\">font-weight</span>: <span class=\"dt-val\">800</span>;<br>\n        <span class=\"dt-key\">letter-spacing</span>: <span class=\"dt-val\">-0.05em</span>;<br>\n        <span class=\"dt-key\">line-height</span>: <span class=\"dt-val\">0.95</span>;<br>\n        <span class=\"dt-key\">color</span>: <span class=\"dt-val\">var(--ink)</span>;<br>\n        <span class=\"dt-key\">--ink</span>: <span class=\"dt-val\">#100f0d</span>;<br>\n        <span class=\"dt-key\">transition</span>: <span class=\"dt-val\">all .35s cubic-bezier(0.16,1,0.3,1)</span>;\n      </div>\n    </div>\n  </div>\n\n  <div class=\"card reveal\" style=\"margin-top:32px\">\n    <h3 class=\"h3\" style=\"margin-bottom:20px\">The 60-second font extraction technique</h3>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px\">\n      <div>\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sapphire);margin-bottom:12px\">Method 1: DevTools</div>\n        <div style=\"font-size:14px;color:var(--ink2);line-height:1.9\">1. Right-click the headline<br>2. Click \"Inspect\"<br>3. In Styles panel, find font-family<br>4. The value is the font name<br>5. Cross-reference on fonts.google.com</div>\n      </div>\n      <div>\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:12px\">Method 2: WhatFont Extension</div>\n        <div style=\"font-size:14px;color:var(--ink2);line-height:1.9\">1. Install WhatFont (Chrome extension)<br>2. Click extension icon on any page<br>3. Hover any text<br>4. Font name pops up instantly<br>5. Click for full details</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- SWIPE FILE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow ea\">Building Your Swipe File</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">A swipe file is a curated library of great design decisions. It's your taste
