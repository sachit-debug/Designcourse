, externalised.</h2>\n    <p class=\"bt\">Every great designer has a swipe file \u2014 a collection of screenshots, color palettes, font combinations, and interaction patterns they've saved for reference. It's not plagiarism. It's research. And it trains your eye faster than any course.</p>\n    <p class=\"bt\">Template for every site you add to your swipe file:</p>\n\n    <div class=\"swipe-template\">\n      <div class=\"swipe-row\">\n        <div class=\"swipe-field\">Site Name</div>\n        <div class=\"swipe-value\">stripe.com</div>\n      </div>\n      <div class=\"swipe-row\">\n        <div class=\"swipe-field\">Display Font</div>\n        <div class=\"swipe-value\">Sohne (custom) \u2014 700w, -0.04em tracking, 1.0 line-height</div>\n      </div>\n      <div class=\"swipe-row\">\n        <div class=\"swipe-field\">Body Font</div>\n        <div class=\"swipe-value\">Sohne \u2014 400w, 1.6 line-height</div>\n      </div>\n      <div class=\"swipe-row\">\n        <div class=\"swipe-field\">Palette</div>\n        <div class=\"swipe-value\">BG: #ffffff near-pure \u00b7 Text: #0a2540 \u00b7 Accent: #635bff (purple)</div>\n      </div>\n      <div class=\"swipe-row\">\n        <div class=\"swipe-field\">Grid</div>\n        <div class=\"swipe-value\">max-width: 1080px \u00b7 12-column \u00b7 gap: 24px \u00b7 section padding: 96px</div>\n      </div>\n      <div class=\"swipe-row\">\n        <div class=\"swipe-field\">Motion</div>\n        <div class=\"swipe-value\">Subtle scroll reveals \u00b7 0.6s duration \u00b7 ease-out \u00b7 no parallax \u00b7 micro-hovers on cards</div>\n      </div>\n      <div class=\"swipe-row\">\n        <div class=\"swipe-field\">Emotion</div>\n        <div class=\"swipe-value\">Trust, precision, global scale. The purple accent adds a hint of innovation against otherwise corporate navy.</div>\n      </div>\n      <div class=\"swipe-row\">\n        <div class=\"swipe-field\">Steal This</div>\n        <div class=\"swipe-value\">The gradient mesh backgrounds on hero sections. The card grid with mix of portrait and landscape orientations.</div>\n      </div>\n    </div>\n\n    <div class=\"callout cj\">\n      <p class=\"callout-label\">Where to Build Your Swipe File</p>\n      <p>Use <strong>Notion, a Google Doc, or Figma</strong>. Screenshot \u2192 paste \u2192 add the template above. Aim for 10 entries in your first week. After 50 entries you'll have strong design taste. After 100 entries you'll have encyclopedic visual vocabulary. The sites to analyze first: stripe.com, linear.app, loom.com, vercel.com, awwwards.com winners.</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- EXERCISE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"exercise reveal\">\n    <p class=\"eyebrow ej\">Chapter 07 \u2014 Exercise</p>\n    <h2 class=\"ex-title\">Full site analysis + brief for Claude.</h2>\n    <p class=\"ex-desc\">You're going to analyze one great site using the full 6-step framework, document it in the swipe file template, then translate your findings into a prompt for Claude. The full loop: observe \u2192 extract \u2192 apply.</p>\n    <div class=\"ex-steps\">\n      <div class=\"ex-step\"><div class=\"ex-n\">01</div><div class=\"ex-text\">Pick a target site. Recommended: <strong>linear.app, loom.com, or any recent Awwwards Winner of the Day.</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">02</div><div class=\"ex-text\">Run the 6-step framework. For each step, open DevTools and find the actual CSS values \u2014 don't guess.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">03</div><div class=\"ex-text\">Fill out the swipe file template above for this site. Write the \"Emotion\" row carefully \u2014 this is the synthesis step.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">04</div><div class=\"ex-text\">Translate your findings into a Claude brief: <strong>\"Build me a site in the visual style of [site]. Use [font] for display, [font] for body. Palette: [colors]. The emotion should be [emotion]. Key design moves to steal: [list 2].\"</strong></div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">05</div><div class=\"ex-text\">Run the brief. Compare Claude's output to the original. Identify gaps and iterate with specific corrections based on your analysis.</div></div>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"ch-footer\">\n  <div class=\"ch-footer-inner\">\n    <a href=\"chapter-06.html\" class=\"ch-btn prev\"><span class=\"ch-btn-arr\">\u2190</span><div><div class=\"ch-btn-label\">Previous</div><div class=\"ch-btn-title\">Motion & Animation</div></div></a>\n    <div class=\"ch-center\"><div style=\"margin-bottom:6px\">Chapter 07 of 12</div><a href=\"index.html\">Design Mastery</a></div>\n    <a href=\"chapter-08.html\" class=\"ch-btn next\"><div><div class=\"ch-btn-label\">Next Chapter</div><div class=\"ch-btn-title\">Figma: Think Before You Build</div></div><span class=\"ch-btn-arr\">\u2192</span></a>\n  </div>\n</div>\n\n<script>\ngsap.registerPlugin(ScrollTrigger);\nwindow.addEventListener('scroll',()=>{const s=document.documentElement.scrollTop,h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('pb').style.width=(s/h*100)+'%'});\ngsap.utils.toArray('.reveal').forEach((el,i)=>{gsap.fromTo(el,{opacity:0,y:44},{opacity:1,y:0,duration:.85,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 84%'},delay:(i%3)*.07})});\n<\/script>\n</body>\n</html>\n"</script>
<script type="application/json" id="ch-data-7">"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ch 08 \u2014 Figma: Think Before You Build \u00b7 Design Mastery</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js\"><\/script>\n<style>\n:root{--bg:#f6f4f0;--bg2:#edeae4;--bg3:#e4e0d8;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.06);--ink:#100f0d;--ink2:#45433f;--ink3:#8c8880;--ink4:#b5b2ac;--fire:#e8500a;--amber:#d4880a;--sapphire:#2e6fd4;--jade:#1f7a5c;--glass:rgba(255,255,255,.65);--glass2:rgba(255,255,255,.42);--sh2:0 8px 32px rgba(0,0,0,.08);--sh3:0 20px 60px rgba(0,0,0,.10);--sh4:0 40px 100px rgba(0,0,0,.13);--r1:8px;--r2:14px;--r3:22px;--ease-out:cubic-bezier(0.16,1,0.3,1)}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}*{scrollbar-width:none}*::-webkit-scrollbar{display:none}\nbody{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden}a{color:inherit;text-decoration:none}\nbody::after{content:'';position:fixed;inset:0;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E\");pointer-events:none;z-index:9999;opacity r:var(--fire)}.ef::before{background:var(--fire)}\n.ej{color:var(--jade)}.ej::before{background:var(--jade)}\n.es{color:var(--sapphire)}.es::before{background:var(--sapphire)}\n.ea{color:var(--amber)}.ea::before{background:var(--amber)}\n.display{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink)}\n.display em{font-style:normal;background:linear-gradient(135deg,#9333ea,var(--sapphire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.035em;line-height:1.1;color:var(--ink)}\n.h3{font-family:'Bricolage Grotesque',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:-.025em;color:var(--ink)}\n.lead{font-size:clamp(1rem,1.5vw,1.12rem);color:var(--ink2);line-height:1.8}\n.bt{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:20px}\n.bt:last-child{margin-bottom:0}\n.card{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh3);padding:52px;position:relative;overflow:hidden}\n.card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.csm{background:var(--glass2);backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);padding:28px;position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s,background .3s}\n.csm::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 50%);pointer-events:none;border-radius:inherit}\n.csm:hover{transform:translateY(-5px);box-shadow:var(--sh3);background:var(--glass)}\n.callout{padding:24px 28px;border-radius:var(--r2);border-left:3px solid #9333ea;background:rgba(147,51,234,.04);margin:28px 0}\n.cb{border-color:var(--sapphire);background:rgba(46,111,212,.04)}\n.cj{border-color:var(--jade);background:rgba(31,122,92,.04)}\n.cf{border-color:var(--fire);background:rgba(232,80,10,.04)}\n.ca{border-color:var(--amber);background:rgba(212,136,10,.04)}\n.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#9333ea;margin-bottom:10px}\n.cb .callout-label{color:var(--sapphire)}.cj .callout-label{color:var(--jade)}.cf .callout-label{color:var(--fire)}.ca .callout-label{color:var(--amber)}\n.callout p{font-size:14px;color:var(--ink2);line-height:1.75}\n.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:28px 0}\n.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:28px 0}\n\n/* FIGMA CONCEPTS */\n.concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:28px 0}\n.concept-card{padding:28px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border2);border-radius:var(--r2);transition:all .4s var(--ease-out);cursor:default}\n.concept-card:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateY(-4px)}\n.concept-icon{font-size:28px;margin-bottom:14px;display:block}\n.concept-name{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.025em;color:var(--ink);margin-bottom:8px}\n.concept-desc{font-size:13px;color:var(--ink2);line-height:1.75}\n.concept-example{margin-top:12px;padding:10px 14px;background:var(--bg2);border-radius:var(--r1);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--ink3)}\n\n/* DESIGN BRIEF TEMPLATE */\n.brief-template{padding:32px;background:var(--ink);border-radius:var(--r2);margin:24px 0;color:#d4d0c8}\n.brief-section{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.08)}\n.brief-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}\n.brief-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:10px}\n.brief-content{font-size:13px;color:rgba(255,255,255,.65);line-height:1.8}\n.brief-filled{color:#7dd3a8}\n.brief-placeholder{color:rgba(255,255,255,.25);font-style:italic}\n\n/* WORKFLOW STEPS */\n.workflow{display:flex;flex-direction:column;gap:0;position:relative}\n.workflow::before{content:'';position:absolute;left:22px;top:48px;bottom:48px;width:2px;background:linear-gradient(to bottom,#9333ea,var(--sapphire))}\n.wf-step{display:grid;grid-template-columns:48px 1fr;gap:20px;padding:16px 0}\n.wf-dot-wrap{display:flex;justify-content:center;padding-top:4px;position:relative;z-index:1}\n.wf-dot{width:44px;height:44px;border-radius:50%;background:var(--glass);backdrop-filter:blur(12px);border:2px solid #9333ea;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;color:#9333ea;font-weight:500;transition:all .35s var(--ease-out)}\n.wf-step:hover .wf-dot{background:#9333ea;color:white;transform:scale(1.1)}\n.wf-content{padding:14px 24px;background:var(--glass2);backdrop-filter:blur(14px);border:1px solid var(--border2);border-radius:var(--r2);transition:all .35s var(--ease-out);margin-bottom:12px}\n.wf-step:hover .wf-content{background:var(--glass);box-shadow:var(--sh2)}\n.wf-title{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-bottom:6px}\n.wf-desc{font-size:14px;color:var(--ink2);line-height:1.7}\n\n.exercise{background:linear-gradient(135deg,rgba(31,122,92,.07),rgba(255,255,255,.4));border:1px solid rgba(31,122,92,.2);border-radius:var(--r3);padding:48px;position:relative;overflow:hidden;margin:48px 0}\n.exercise::before{content:'EXERCISE';position:absolute;top:24px;right:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(31,122,92,.4)}\n.ex-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}\n.ex-desc{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:28px}\n.ex-steps{display:flex;flex-direction:column;gap:12px}\n.ex-step{display:grid;grid-template-columns:32px 1fr;gap:14px;align-items:start;padding:16px 20px;background:rgba(255,255,255,.5);border-radius:var(--r2);border:1px solid rgba(31,122,92,.1)}\n.ex-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--jade);font-weight:500}\n.ex-text{font-size:14px;color:var(--ink2);line-height:1.65}.ex-text strong{color:var(--ink)}\n.ch-footer{position:relative;z-index:10;padding:60px 0 80px;border-top:1px solid var(--border)}\n.ch-footer-inner{max-width:900px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}\n.ch-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .35s var(--ease-out);text-decoration:none;color:inherit}\n.ch-btn:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateY(-3px)}\n.ch-btn-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}\n.ch-btn-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}\n.ch-btn.next{flex-direction:row-reverse;text-align:right}\n.ch-btn-arr{font-size:20px;color:var(--ink3);transition:transform .3s}\n.ch-btn.prev:hover .ch-btn-arr{transform:translateX(-4px)}.ch-btn.next:hover .ch-btn-arr{transform:translateX(4px)}\n.ch-center{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink4);text-align:center}\n.ch-center a{color:var(--fire)}\n.reveal{opacity:0;transform:translateY(40px)}\n@keyframes fU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}\n@media(max-width:768px){.two-col,.three-col,.concept-grid{grid-template-columns:1fr 1fr}.card{padding:32px 24px}.ch-footer-inner{flex-direction:column}}\n@media(max-width:480px){nav{display:none}.concept-grid{grid-template-columns:1fr}}\n</style>\n</head>\n<body>\n\n<div class=\"orb o1\"></div><div class=\"orb o2\"></div>\n\n\n<section class=\"hero-sec\">\n<div class=\"wrap\">\n  <div style=\"opacity:0;animation:fU .7s var(--ease-out) .5s forwards\"><p class=\"eyebrow\">Chapter 08 \u2014 Advanced</p></div>\n  <h1 class=\"display\" style=\"opacity:0;animation:fU .9s var(--ease-out) .65s forwards;margin-bottom:28px\">Figma: think<br>before you <em>build.</em></h1>\n  <p class=\"lead\" style=\"opacity:0;animation:fU .9s var(--ease-out) .8s forwards;max-width:580px;margin-bottom:40px\">Design is thinking made visible. Figma is where professionals think before they code. Learn it not as a production tool, but as a thinking tool \u2014 to clarify layout, test ideas, and create briefs that get Claude to the right output immediately.</p>\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fU .7s var(--ease-out) .95s forwards\">\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:var(--glass2);border:1px solid var(--border2);border-radius:100px;color:var(--ink3)\">~50 min read</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(31,122,92,.08);border:1px solid rgba(31,122,92,.18);border-radius:100px;color:var(--jade)\">1 build exercise</span>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- WHY FIGMA -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">Why Figma Matters for Non-Coders</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">Figma lets you think in visuals, not words. That gap from words to visuals is where most AI builds go wrong.</h2>\n    <p class=\"bt\">When you tell Claude \"build a hero section with a headline and two buttons,\" you're describing it in words. Claude imagines one version. You imagined another. The gap between your version and Claude's output is called the brief gap \u2014 and it's almost entirely avoidable with a 5-minute Figma sketch.</p>\n    <p class=\"bt\">Figma isn't just for designers who code. It's for anyone who wants to think spatially before briefing an AI. A rough Figma layout \u2014 even boxes and placeholder text \u2014 reduces revision rounds by 80%.</p>\n    <div class=\"callout ca\">\n      <p class=\"callout-label\">The Critical Insight</p>\n      <p>You don't need to design in Figma perfectly. You need to lay out boxes. A rectangle that says \"HEADLINE\" and another that says \"HERO IMAGE\" and a smaller rectangle that says \"BUTTON\" gives Claude more information than 300 words of text description. Spatial relationships can't be described efficiently in prose \u2014 they have to be drawn.</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- FIGMA CONCEPTS -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">Core Concepts</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Six concepts. That's all you need to know Figma well enough to think in it.</h2>\n  <div class=\"concept-grid reveal\">\n    <div class=\"concept-card\">\n      <span class=\"concept-icon\">\ud83d\udcd0</span>\n      <div class=\"concept-name\">Frames</div>\n      <div class=\"concept-desc\">The canvas for your layouts. A Frame is like a viewport \u2014 it has a fixed size (1440\u00d7900 for desktop, 390\u00d7844 for iPhone 14). All your layout lives inside frames. Create one frame per page section.</div>\n      <div class=\"concept-example\">Shortcut: F \u2192 drag to create frame</div>\n    </div>\n    <div class=\"concept-card\">\n      <span class=\"concept-icon\">\ud83d\udce6</span>\n      <div class=\"concept-name\">Components</div>\n      <div class=\"concept-desc\">Reusable design elements. Make a button once, use it everywhere. Change the master component and all instances update. This is how design systems work \u2014 define once, use consistently.</div>\n      <div class=\"concept-example\">Shortcut: Ctrl+Alt+K to create component</div>\n    </div>\n    <div class=\"concept-card\">\n      <span class=\"concept-icon\">\ud83d\udccf</span>\n      <div class=\"concept-name\">Auto Layout</div>\n      <div class=\"concept-desc\">Figma's most powerful feature. Makes elements stack and space automatically, like CSS Flexbox. Add padding and gaps to frames and they resize intelligently. Essential for building buttons, cards, and navigation.</div>\n      <div class=\"concept-example\">Shortcut: Shift+A on any selection</div>\n    </div>\n    <div class=\"concept-card\">\n      <span class=\"concept-icon\">\ud83c\udfa8</span>\n      <div class=\"concept-name\">Styles</div>\n      <div class=\"concept-desc\">Saved design tokens for color, typography, and effects. Define your color palette once as styles. Apply with one click, update in one place. This is the Figma equivalent of CSS custom properties.</div>\n      <div class=\"concept-example\">Create in right panel \u2192 Style icon</div>\n    </div>\n    <div class=\"concept-card\">\n      <span class=\"concept-icon\">\u25b6\ufe0f</span>\n      <div class=\"concept-name\">Prototyping</div>\n      <div class=\"concept-desc\">Link frames together to simulate page navigation. Click the hamburger \u2192 the menu opens. Click CTA \u2192 goes to pricing page. Show this to Claude and it can build the exact interaction logic you demoed.</div>\n      <div class=\"concept-example\">Prototype tab \u2192 drag connections between frames</div>\n    </div>\n    <div class=\"concept-card\">\n      <span class=\"concept-icon\">\ud83d\udd0d</span>\n      <div class=\"concept-name\">Inspect Panel</div>\n      <div class=\"concept-desc\">Click any element, go to Inspect tab, and Figma shows you the exact CSS for that element \u2014 font size, color, padding, border radius. Copy it directly into your Claude brief for pixel-perfect accuracy.</div>\n      <div class=\"concept-example\">Inspect tab \u2192 select element \u2192 copy CSS</div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- FIGMA TO CLAUDE WORKFLOW -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal es\">The Design-to-Prompt Workflow</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">From blank Figma canvas to deployed Vercel site in 3 hours.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:48px\">This is the exact sequence professionals use when they're working with an AI build assistant. Every step reduces ambiguity and compresses the revision cycle.</p>\n\n  <div class=\"workflow\">\n    <div class=\"wf-step reveal\">\n      <div class=\"wf-dot-wrap\"><div class=\"wf-dot\">01</div></div>\n      <div class=\"wf-content\">\n        <div class=\"wf-title\">Sketch the structure in Figma (15 min)</div>\n        <div class=\"wf-desc\">Create one desktop frame (1440px wide). Sketch rectangles for each section: Hero, Features, Testimonials, CTA. No design needed yet \u2014 just blocks. Label each block. This forces you to commit to the information architecture before touching any tool.</div>\n      </div>\n    </div>\n    <div class=\"wf-step reveal\">\n      <div class=\"wf-dot-wrap\"><div class=\"wf-dot\">02</div></div>\n      <div class=\"wf-content\">\n        <div class=\"wf-title\">Define the visual identity (20 min)</div>\n        <div class=\"wf-desc\">Pick your fonts from Google Fonts and import them to Figma via the Typeface plugin. Choose your 5-color palette from Chapter 4 work. Apply them as Figma Styles. Now every design decision is codified before a single prompt is written.</div>\n      </div>\n    </div>\n    <div class=\"wf-step reveal\">\n      <div class=\"wf-dot-wrap\"><div class=\"wf-dot\">03</div></div>\n      <div class=\"wf-content\">\n        <div class=\"wf-title\">Design the hero section (30 min)</div>\n        <div class=\"wf-desc\">With structure and identity defined, design just the hero. Real headline. Real subheading. One CTA button. Use Auto Layout, apply your styles. This single section gives Claude enough information to infer the rest of the design language.</div>\n      </div>\n    </div>\n    <div class=\"wf-step reveal\">\n      <div class=\"wf-dot-wrap\"><div class=\"wf-dot\">04</div></div>\n      <div class=\"wf-content\">\n        <div class=\"wf-title\">Use Inspect to extract specs (10 min)</div>\n        <div class=\"wf-desc\">Click each element in Figma's Inspect panel. Note: font-family, font-size, font-weight, letter-spacing, padding, border-radius, color values. Build a \"Design Spec Sheet\" \u2014 a list of all measurements from the Figma file.</div>\n      </div>\n    </div>\n    <div class=\"wf-step reveal\">\n      <div class=\"wf-dot-wrap\"><div class=\"wf-dot\">05</div></div>\n      <div class=\"wf-content\">\n        <div class=\"wf-title\">Write the brief for Claude (15 min)</div>\n        <div class=\"wf-desc\">Translate your Figma specs into the design brief template below. Include structure (from the sketch), typography specs (from Inspect), color system (from Styles), and animation intent (from your Chapter 6 vocabulary).</div>\n      </div>\n    </div>\n    <div class=\"wf-step reveal\">\n      <div class=\"wf-dot-wrap\"><div class=\"wf-dot\">06</div></div>\n      <div class=\"wf-content\">\n        <div class=\"wf-title\">Build and deploy with Claude (60\u201390 min)</div>\n        <div class=\"wf-desc\">Run the brief. Review the first output with your Figma design open beside it. Note gaps. Iterate with specific corrections based on exact measurements from Figma. Deploy to Vercel at first satisfactory checkpoint.</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- DESIGN BRIEF TEMPLATE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">The Master Design Brief</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">This brief template produces first-pass outputs that are 90% correct.</h2>\n    <p class=\"bt\">Fill this out from your Figma work. The more specific the values, the tighter the output. Don't use vague adjectives \u2014 use measurements. \"Large heading\" is vague. \"68px Bricolage Grotesque 800w at -0.05em tracking\" is actionable.</p>\n\n    <div class=\"brief-template\">\n      <div class=\"brief-section\">\n        <div class=\"brief-label\">Project</div>\n        <div class=\"brief-content\"><span class=\"brief-filled\">\"Build a single-file HTML landing page for [PROJECT NAME].\"</span></div>\n      </div>\n      <div class=\"brief-section\">\n        <div class=\"brief-label\">Structure</div>\n        <div class=\"brief-content\"><span class=\"brief-filled\">\"5 sections: Hero (full viewport), 3-column Features, Testimonials row, Pricing cards (3 tiers), Footer.\"</span></div>\n      </div>\n      <div class=\"brief-section\">\n        <div class=\"brief-label\">Typography</div>\n        <div class=\"brief-content\"><span class=\"brief-filled\">\"Display font: Bricolage Grotesque 800w. Hero headline: clamp(3rem,7vw,6.5rem) -0.05em tracking 0.95 line-height. Body: Plus Jakarta Sans 400w 15px 1.78 line-height. Labels: DM Mono 10px 0.12em tracking uppercase.\"</span></div>\n      </div>\n      <div class=\"brief-section\">\n        <div class=\"brief-label\">Color System</div>\n        <div class=\"brief-content\"><span class=\"brief-filled\">\"--bg: #f6f4f0 \u00b7 --ink: #100f0d \u00b7 --ink2: #45433f \u00b7 --ink3: #8c8880 \u00b7 --fire: #e8500a \u00b7 --sapphire: #2e6fd4 \u00b7 --glass: rgba(255,255,255,0.65)\"</span></div>\n      </div>\n      <div class=\"brief-section\">\n        <div class=\"brief-label\">Animation</div>\n        <div class=\"brief-content\"><span class=\"brief-filled\">\"GSAP ScrollTrigger reveals on all .reveal elements (y:44\u21920, opacity 0\u21921, 0.85s power3.out). Hover transitions: cubic-bezier(0.16,1,0.3,1) 350ms. Two ambient orbs in background (blur:90px, animation 22s and 28s).\"</span></div>\n      </div>\n      <div class=\"brief-section\">\n        <div class=\"brief-label\">Cards</div>\n        <div class=\"brief-content\"><span class=\"brief-filled\">\"Glassmorphism: background rgba(255,255,255,0.65) backdrop-filter blur(24px) border 1px solid rgba(0,0,0,0.09) border-radius 22px shadow 0 20px 60px rgba(0,0,0,0.10).\"</span></div>\n      </div>\n      <div class=\"brief-section\">\n        <div class=\"brief-label\">Emotion</div>\n        <div class=\"brief-content\"><span class=\"brief-filled\">\"Should feel: premium, trustworthy, sophisticated \u2014 not startup-scrappy. Think Stripe x Notion.\"</span></div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- EXERCISE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"exercise reveal\">\n    <p class=\"eyebrow ej\">Chapter 08 \u2014 Build Exercise</p>\n    <h2 class=\"ex-title\">Design a page in Figma, then brief Claude to build it exactly.</h2>\n    <p class=\"ex-desc\">This exercise closes the gap between your imagination and Claude's output. You're going to prove to yourself that a good brief produces a great result \u2014 without back-and-forth.</p>\n    <div class=\"ex-steps\">\n      <div class=\"ex-step\"><div class=\"ex-n\">01</div><div class=\"ex-text\">Open Figma (free at figma.com). Create a new file. Add a Frame at 1440\u00d7900. This is your desktop canvas.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">02</div><div class=\"ex-text\">Sketch 3 rectangles \u2014 a hero block (full width, 600px tall), a features block (3 columns), and a CTA block. Label each. This takes 5 minutes.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">03</div><div class=\"ex-text\">Design just the hero: <strong>Real headline text, subheading, one button</strong>. Apply real fonts and colors. Use Inspect to note every value.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">04</div><div class=\"ex-text\">Fill out the Master Brief template above with your Figma values. Be precise \u2014 use actual hex codes, pixel values, and CSS measurements from Inspect.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">05</div><div class=\"ex-text\">Run the brief with Claude. Compare the output to your Figma. How close is it? What's different? Use the gap to refine your brief vocabulary for next time.</div></div>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"ch-footer\">\n  <div class=\"ch-footer-inner\">\n    <a href=\"chapter-07.html\" class=\"ch-btn prev\"><span class=\"ch-btn-arr\">\u2190</span><div><div class=\"ch-btn-label\">Previous</div><div class=\"ch-btn-title\">Reading Sites</div></div></a>\n    <div class=\"ch-center\"><div style=\"margin-bottom:6px\">Chapter 08 of 12</div><a href=\"index.html\">Design Mastery</a></div>\n    <a href=\"chapter-09.html\" class=\"ch-btn next\"><div><div class=\"ch-btn-label\">Next Chapter</div><div class=\"ch-btn-title\">The AI Build Workflow</div></div><span class=\"ch-btn-arr\">\u2192</span></a>\n  </div>\n</div>\n\n<script>\ngsap.registerPlugin(ScrollTrigger);\nwindow.addEventListener('scroll',()=>{const s=document.documentElement.scrollTop,h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('pb').style.width=(s/h*100)+'%'});\ngsap.utils.toArray('.reveal').forEach((el,i)=>{gsap.fromTo(el,{opacity:0,y:44},{opacity:1,y:0,duration:.85,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 84%'},delay:(i%3)*.07})});\n<\/script>\n</body>\n</html>\n"</script>
<script type="application/json" id="ch-data-8">"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ch 09 \u2014 The AI Build Workflow \u00b7 Design Mastery</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js\"><\/script>\n<style>\n:root{--bg:#f6f4f0;--bg2:#edeae4;--bg3:#e4e0d8;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.06);--ink:#100f0d;--ink2:#45433f;--ink3:#8c8880;--ink4:#b5b2ac;--fire:#e8500a;--amber:#d4880a;--sapphire:#2e6fd4;--jade:#1f7a5c;--glass:rgba(255,255,255,.65);--glass2:rgba(255,255,255,.42);--sh2:0 8px 32px rgba(0,0,0,.08);--sh3:0 20px 60px rgba(0,0,0,.10);--sh4:0 40px 100px rgba(0,0,0,.13);--r1:8px;--r2:14px;--r3:22px;--ease-out:cubic-bezier(0.16,1,0.3,1)}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}*{scrollbar-width:none}*::-webkit-scrollbar{display:none}\nbody{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden}a{color:inherit;text-decoration:none}\nbody::after{content:'';position:fixed;inset:0;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E\");pointer-events:none;z-index:9999;opacity:.5}\n.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}\n.o1{width:600px;height:600px;background:radial-gradient(circle,rgba(31,122,92,.10),transparent 68%);top:-100px;right:-100px;animation:oA 22s ease-in-out infinite}\n.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(232,80,10,.08),transparent 68%);bottom:-80px;left:-80px;animation:oB 28s ease-in-out infinite}\n@keyframes oA{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,50px)}}\n@keyframes oB{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-40px)}}\n.progress-bar{position:fixed;top:0;left:0;height:2px;z-index:1000;background:linear-gradient(90deg,var(--jade),var(--fire));width:0%;transition:width .1s linear}\nnav{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:500;background:var(--glass);backdrop-filter:blur(28px);border:1px solid var(--border);border-radius:100px;padding:10px 22px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh2);opacity:0;animation:navIn .7s var(--ease-out) .4s forwards;white-space:nowrap}\n@keyframes navIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}\n.nav-home{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-right:14px;border-right:1px solid var(--border)}\n.wrap{max-width:900px;margin:0 auto;padding:0 32px}\nsection{position:relative;z-index:10;padding:100px 0}\n.hero-sec{min-height:100vh;display:flex;align-items:center;padding:80px 0}\n.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);position:relative;z-index:10}\n.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--jade);display:flex;align-items:center;gap:12px;margin-bottom:18px}\n.eyebrow::before{content:'';width:28px;height:1px;background:var(--jade);flex-shrink:0}\n.ef{color:var(--fire)}.ef::before{background:var(--fire)}\n.es{color:var(--sapphire)}.es::before{background:var(--sapphire)}\n.ea{color:var(--amber)}.ea::before{background:var(--amber)}\n.ej2{color:var(--jade)}.ej2::before{background:var(--jade)}\n.display{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink)}\n.display em{font-style:normal;background:linear-gradient(135deg,var(--jade),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.035em;line-height:1.1;color:var(--ink)}\n.h3{font-family:'Bricolage Grotesque',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:-.025em;color:var(--ink)}\n.lead{font-size:clamp(1rem,1.5vw,1.12rem);color:var(--ink2);line-height:1.8}\n.bt{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:20px}\n.bt:last-child{margin-bottom:0}\n.card{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh3);padding:52px;position:relative;overflow:hidden}\n.card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.csm{background:var(--glass2);backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);padding:28px;position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s,background .3s}\n.csm::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 50%);pointer-events:none;border-radius:inherit}\n.csm:hover{transform:translateY(-5px);box-shadow:var(--sh3);background:var(--glass)}\n.callout{padding:24px 28px;border-radius:var(--r2);border-left:3px solid var(--jade);background:rgba(31,122,92,.04);margin:28px 0}\n.cb{border-color:var(--sapphire);background:rgba(46,111,212,.04)}\n.cf{border-color:var(--fire);background:rgba(232,80,10,.04)}\n.ca{border-color:var(--amber);background:rgba(212,136,10,.04)}\n.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--jade);margin-bottom:10px}\n.cb .callout-label{color:var(--sapphire)}.cf .callout-label{color:var(--fire)}.ca .callout-label{color:var(--amber)}\n.callout p{font-size:14px;color:var(--ink2);line-height:1.75}\n.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:28px 0}\n.code-block{background:var(--ink);border-radius:var(--r2);padding:24px 28px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.9;color:#d4d0c8;overflow-x:auto;position:relative;margin:20px 0}\n.kw{color:#f0a050}.str{color:#7dd3a8}.cm{color:rgba(255,255,255,.28);font-style:italic}\n.code-label{position:absolute;top:12px;right:16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.2)}\n\n/* PROMPT TEMPLATES */\n.prompt-grid{display:flex;flex-direction:column;gap:16px}\n.prompt-card{background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border2);border-radius:var(--r2);overflow:hidden;transition:all .4s var(--ease-out)}\n.prompt-card:hover{background:var(--glass);box-shadow:var(--sh3)}\n.prompt-header{padding:16px 24px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid transparent;transition:border-color .3s}\n.prompt-card.open .prompt-header{border-bottom-color:var(--border2)}\n.prompt-category{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:100px;background:var(--bg2);color:var(--ink3)}\n.prompt-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink);flex:1}\n.prompt-toggle{font-size:18px;color:var(--ink3);transition:transform .3s}\n.prompt-card.open .prompt-toggle{transform:rotate(45deg)}\n.prompt-body{display:none;padding:20px 24px}\n.prompt-card.open .prompt-body{display:block}\n.prompt-text{background:var(--ink);border-radius:var(--r1);padding:18px 22px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.85;color:#d4d0c8;position:relative}\n.prompt-copy{position:absolute;top:10px;right:12px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);cursor:pointer;padding:4px 8px;background:rgba(255,255,255,.06);border-radius:4px;border:none;transition:all .2s}\n.prompt-copy:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.6)}\n.prompt-note{font-size:13px;color:var(--ink2);line-height:1.7;margin-top:14px}\n\n/* ITERATION VOCABULARY */\n.vocab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:24px 0}\n.vocab-card{padding:16px 18px;background:var(--glass2);backdrop-filter:blur(12px);border:1px solid var(--border2);border-radius:var(--r2);transition:all .3s var(--ease-out)}\n.vocab-card:hover{background:var(--glass);box-shadow:var(--sh2)}\n.vocab-before{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--ink4);margin-bottom:4px;text-decoration:line-through}\n.vocab-after{font-size:13px;color:var(--ink);font-weight:500;line-height:1.4}\n.vocab-effect{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--jade);margin-top:8px}\n\n.exercise{background:linear-gradient(135deg,rgba(31,122,92,.07),rgba(255,255,255,.4));border:1px solid rgba(31,122,92,.2);border-radius:var(--r3);padding:48px;position:relative;overflow:hidden;margin:48px 0}\n.exercise::before{content:'EXERCISE';position:absolute;top:24px;right:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(31,122,92,.4)}\n.ex-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}\n.ex-desc{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:28px}\n.ex-steps{display:flex;flex-direction:column;gap:12px}\n.ex-step{display:grid;grid-template-columns:32px 1fr;gap:14px;align-items:start;padding:16px 20px;background:rgba(255,255,255,.5);border-radius:var(--r2);border:1px solid rgba(31,122,92,.1)}\n.ex-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--jade);font-weight:500}\n.ex-text{font-size:14px;color:var(--ink2);line-height:1.65}.ex-text strong{color:var(--ink)}\n.ch-footer{position:relative;z-index:10;padding:60px 0 80px;border-top:1px solid var(--border)}\n.ch-footer-inner{max-width:900px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}\n.ch-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .35s var(--ease-out);text-decoration:none;color:inherit}\n.ch-btn:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateY(-3px)}\n.ch-btn-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}\n.ch-btn-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}\n.ch-btn.next{flex-direction:row-reverse;text-align:right}\n.ch-btn-arr{font-size:20px;color:var(--ink3);transition:transform .3s}\n.ch-btn.prev:hover .ch-btn-arr{transform:translateX(-4px)}.ch-btn.next:hover .ch-btn-arr{transform:translateX(4px)}\n.ch-center{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink4);text-align:center}\n.ch-center a{color:var(--fire)}\n.reveal{opacity:0;transform:translateY(40px)}\n@keyframes fU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}\n@media(max-width:768px){.two-col,.vocab-grid{grid-template-columns:1fr 1fr}.card{padding:32px 24px}.ch-footer-inner{flex-direction:column}}\n@media(max-width:480px){nav{display:none}.vocab-grid{grid-template-columns:1fr}}\n</style>\n</head>\n<body>\n\n<div class=\"orb o1\"></div><div class=\"orb o2\"></div>\n\n\n<section class=\"hero-sec\">\n<div class=\"wrap\">\n  <div style=\"opacity:0;animation:fU .7s var(--ease-out) .5s forwards\"><p class=\"eyebrow\">Chapter 09 \u2014 Advanced</p></div>\n  <h1 class=\"display\" style=\"opacity:0;animation:fU .9s var(--ease-out) .65s forwards;margin-bottom:28px\">The AI<br>build <em>workflow.</em></h1>\n  <p class=\"lead\" style=\"opacity:0;animation:fU .9s var(--ease-out) .8s forwards;max-width:580px;margin-bottom:40px\">The exact system for going from blank page to deployed Vercel site using Claude. Prompt templates, iteration language, creative direction vocabulary, and version control \u2014 everything you need to work with AI like a senior creative director.</p>\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fU .7s var(--ease-out) .95s forwards\">\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:var(--glass2);border:1px solid var(--border2);border-radius:100px;color:var(--ink3)\">~45 min read</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(31,122,92,.08);border:1px solid rgba(31,122,92,.18);border-radius:100px;color:var(--jade)\">40+ prompt templates</span>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- THE ROLE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">Your Role in the Collaboration</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">You are the creative director. Claude is the senior developer. Don't switch roles.</h2>\n    <p class=\"bt\">The biggest mistake people make with AI builds is trying to think like a coder. They describe what CSS to use instead of describing what they want to feel. They second-guess the technology instead of directing the outcome. That's the wrong mental model.</p>\n    <p class=\"bt\">Your job is taste and direction. Claude's job is execution. You describe the experience you want \u2014 the emotion, the hierarchy, the interactions. Claude figures out the code. When you start talking about specific CSS properties you don't understand, you're stepping into Claude's lane and creating friction.</p>\n    <div class=\"two-col\" style=\"margin-top:20px\">\n      <div style=\"padding:20px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.12);border-radius:var(--r2)\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ef4444;margin-bottom:12px\">\u2717 Trying to code-direct</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:1.85\">\"Can you change the z-index to 10?\"<br>\"Add display:flex to that div\"<br>\"Make the margin-top bigger\"<br>\"Use rgba(255,255,255,0.5) for that\"<br>\"Why is the position:absolute wrong?\"</div>\n      </div>\n      <div style=\"padding:20px;background:rgba(31,122,92,.05);border:1px solid rgba(31,122,92,.12);border-radius:var(--r2)\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:12px\">\u2713 Creative director language</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:1.85\">\"The nav should float above the content\"<br>\"These cards need to line up side by side\"<br>\"There's too much space above the heading\"<br>\"The modal card should be frosted glass\"<br>\"The nav is going behind the cards\"</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- PROMPT TEMPLATES -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">40+ Prompt Templates</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Copy-paste prompts for every situation. Expand each category.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:40px\">Click each category to expand. These are battle-tested prompts that consistently produce great outputs. Adapt them to your project, don't rewrite them from scratch.</p>\n\n  <div class=\"prompt-grid reveal\">\n\n    <div class=\"prompt-card\" id=\"pc1\">\n      <div class=\"prompt-header\" onclick=\"togglePrompt('pc1')\">\n        <span class=\"prompt-category\">Initial Build</span>\n        <span class=\"prompt-title\">Hero Section Starter</span>\n        <span class=\"prompt-toggle\">+</span>\n      </div>\n      <div class=\"prompt-body\">\n        <div class=\"prompt-text\">Build a full-viewport hero section as a single-file HTML page. Use Bricolage Grotesque 800w for the headline at clamp(3.5rem,8vw,7rem) with -0.05em letter-spacing and 0.95 line-height. Body font Plus Jakarta Sans 15px/1.78. Background #f6f4f0, text #100f0d, accent #e8500a. Add two blurred ambient orbs (fire and sapphire) in the background. Animate the headline, subtext, and CTA in sequence using GSAP with 0.6s delays. The CTA button should lift 4px and glow orange on hover using cubic-bezier(0.16,1,0.3,1).<div class=\"prompt-copy\" onclick=\"copyPrompt(this)\">copy</div></div>\n        <div class=\"prompt-note\">Use this when starting a new site from scratch. Adjust the colors and content to match your project.</div>\n      </div>\n    </div>\n\n    <div class=\"prompt-card\" id=\"pc2\">\n      <div class=\"prompt-header\" onclick=\"togglePrompt('pc2')\">\n        <span class=\"prompt-category\">Initial Build</span>\n        <span class=\"prompt-title\">Full Landing Page</span>\n        <span class=\"prompt-toggle\">+</span>\n      </div>\n      <div class=\"prompt-body\">\n        <div class=\"prompt-text\">Build a complete single-file HTML landing page with 5 sections: (1) Full-viewport hero with headline + sub + CTA, (2) 3-column feature cards with icons, (3) Full-width testimonial quote with large quotation mark, (4) 3-tier pricing cards with highlighted middle tier, (5) Footer with links. Design system: --bg #f6f4f0, --ink #100f0d, --fire #e8500a, --glass rgba(255,255,255,0.65). All cards use glassmorphism (backdrop-filter blur 24px). Section padding 120px. GSAP ScrollTrigger reveals on all .reveal elements. Responsive: 2-col at 768px, 1-col at 480px.<div class=\"prompt-copy\" onclick=\"copyPrompt(this)\">copy</div></div>\n        <div class=\"prompt-note\">The complete brief for a standard SaaS landing page. Swap in your actual content for the placeholder text.</div>\n      </div>\n    </div>\n\n    <div class=\"prompt-card\" id=\"pc3\">\n      <div class=\"prompt-header\" onclick=\"togglePrompt('pc3')\">\n        <span class=\"prompt-category\">Iteration</span>\n        <span class=\"prompt-title\">Typography Refinement</span>\n        <span class=\"prompt-toggle\">+</span>\n      </div>\n      <div class=\"prompt-body\">\n        <div class=\"prompt-text\">The typography needs refinement: (1) Increase the hero headline letter-spacing to -0.055em \u2014 it should feel tighter and more premium, (2) The body text feels too large \u2014 reduce to 14px for most body copy, (3) Add a DM Mono uppercase label above each section heading as an eyebrow \u2014 10px, 0.16em letter-spacing, in the fire accent color, (4) The headline line-height should be 0.95 not 1.0 \u2014 it should look like a tight editorial headline, not a web heading.<div class=\"prompt-copy\" onclick=\"copyPrompt(this)\">copy</div></div>\n        <div class=\"prompt-note\">Use this when the build looks right but the type needs polish. Be specific about values.</div>\n      </div>\n    </div>\n\n    <div class=\"prompt-card\" id=\"pc4\">\n      <div class=\"prompt-header\" onclick=\"togglePrompt('pc4')\">\n        <span class=\"prompt-category\">Iteration</span>\n        <span class=\"prompt-title\">Spacing and Breathing Room</span>\n        <span class=\"prompt-toggle\">+</span>\n      </div>\n      <div class=\"prompt-body\">\n        <div class=\"prompt-text\">The design feels too cramped \u2014 it needs more breathing room: (1) Increase section padding to 140px top and bottom, (2) Increase the gap between card grid items to 28px, (3) Add more space between the eyebrow label and the section headline \u2014 at least 16px, (4) The paragraph text within cards needs more padding \u2014 48px inside each card rather than 32px, (5) Hero text and CTA should have 48px between subheading and button, not the current ~16px.<div class=\"prompt-copy\" onclick=\"copyPrompt(this)\">copy</div></div>\n        <div class=\"prompt-note\">The most common first iteration \u2014 almost every first build needs this treatment.</div>\n      </div>\n    </div>\n\n    <div class=\"prompt-card\" id=\"pc5\">\n      <div class=\"prompt-header\" onclick=\"togglePrompt('pc5')\">\n        <span class=\"prompt-category\">Animation</span>\n        <span class=\"prompt-title\">Scroll Reveal System</span>\n        <span class=\"prompt-toggle\">+</span>\n      </div>\n      <div class=\"prompt-body\">\n        <div class=\"prompt-text\">Add a complete scroll reveal animation system using GSAP ScrollTrigger: (1) Every element with class 'reveal' should animate from opacity 0 and y:44 to opacity 1 and y:0, duration 0.85s, ease power3.out, starting when the top of the element hits 84% of viewport height, (2) Use a stagger: delay each element by (index % 3) * 0.07 seconds so groups of elements cascade, (3) Add a .reveal-left and .reveal-right class for elements that slide in from the sides (x:-40 and x:40 respectively), (4) The hero elements should use a CSS animation sequence instead \u2014 headline at 0.65s, subtext 0.8s, CTA 0.95s, all using the same keyframe that goes from y:28 opacity:0 to y:0 opacity:1.<div class=\"prompt-copy\" onclick=\"copyPrompt(this)\">copy</div></div>\n        <div class=\"prompt-note\">Drop this on any existing build to add a professional animation system.</div>\n      </div>\n    </div>\n\n    <div class=\"prompt-card\" id=\"pc6\">\n      <div class=\"prompt-header\" onclick=\"togglePrompt('pc6')\">\n        <span class=\"prompt-category\">Layout</span>\n        <span class=\"prompt-title\">Asymmetric Hero</span>\n        <span class=\"prompt-toggle\">+</span>\n      </div>\n      <div class=\"prompt-body\">\n        <div class=\"prompt-text\">Redesign the hero section to be asymmetric and editorial: The headline should be massive \u2014 clamp(4rem,10vw,9rem) \u2014 and left-aligned, bleeding close to the left edge of the viewport. The subheading and CTA should be placed in a narrow right-aligned column (max-width 340px) that's vertically centered at the midpoint of the headline height. This creates a tension between the dominant left type and the subordinate right content. Add a large ghost number (01) behind the headline at 200px, weight 800, opacity 0.04, as a depth layer.<div class=\"prompt-copy\" onclick=\"copyPrompt(this)\">copy</div></div>\n        <div class=\"prompt-note\">The Awwwards-style asymmetric layout. Dramatic impact, editorial feel.</div>\n      </div>\n    </div>\n\n    <div class=\"prompt-card\" id=\"pc7\">\n      <div class=\"prompt-header\" onclick=\"togglePrompt('pc7')\">\n        <span class=\"prompt-category\">Polish</span>\n        <span class=\"prompt-title\">Glassmorphism Cards</span>\n        <span class=\"prompt-toggle\">+</span>\n      </div>\n      <div class=\"prompt-body\">\n        <div class=\"prompt-text\">Apply glassmorphism to all cards: background rgba(255,255,255,0.65), backdrop-filter blur(24px) -webkit-backdrop-filter blur(24px), border 1px solid rgba(0,0,0,0.09), border-radius 22px, box-shadow 0 20px 60px rgba(0,0,0,0.10) 0 4px 16px rgba(0,0,0,0.06). Add a top-left light refraction gradient using ::before: background linear-gradient(140deg,rgba(255,255,255,0.55) 0%,transparent 55%) position absolute inset 0. Ensure the background has colored ambient orbs so the blur has something interesting behind it to render.<div class=\"prompt-copy\" onclick=\"copyPrompt(this)\">copy</div></div>\n        <div class=\"prompt-note\">The exact glassmorphism recipe used throughout this course.</div>\n      </div>\n    </div>\n\n    <div class=\"prompt-card\" id=\"pc8\">\n      <div class=\"prompt-header\" onclick=\"togglePrompt('pc8')\">\n        <span class=\"prompt-category\">Debug</span>\n        <span class=\"prompt-title\">Mobile Responsive Fix</span>\n        <span class=\"prompt-toggle\">+</span>\n      </div>\n      <div class=\"prompt-body\">\n        <div class=\"prompt-text\">The site needs mobile responsiveness fixes: (1) At 768px: all 3-column grids become 2-column, cards get reduced padding from 52px to 32px, navigation hides the section labels (pip-style nav only), (2) At 480px: all multi-column layouts become single column, the hero headline uses clamp(2.2rem,7vw,3.5rem) to fit smaller screens, the floating nav disappears entirely (too small), section padding reduces from 120px to 80px, (3) No content should overflow horizontally on any screen. Test this on iPhone SE (375px) viewport.<div class=\"prompt-copy\" onclick=\"copyPrompt(this)\">copy</div></div>\n        <div class=\"prompt-note\">The standard mobile fix request. Run this when the site doesn't work on phone.</div>\n      </div>\n    </div>\n\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- ITERATION VOCABULARY -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal es\">Iteration Vocabulary</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">Replace vague feedback with precise design language. These swaps instantly improve your output quality.</h2>\n  <div class=\"vocab-grid reveal\">\n    <div class=\"vocab-card\"><div class=\"vocab-before\">\"Make it better\"</div><div class=\"vocab-after\">\"The hierarchy is unclear \u2014 make the headline 2x the size of the subheading\"</div><div class=\"vocab-effect\">Targets hierarchy</div></div>\n    <div class=\"vocab-card\"><div class=\"vocab-before\">\"It looks cheap\"</div><div class=\"vocab-after\">\"Triple the section padding and increase card border-radius to 22px\"</div><div class=\"vocab-effect\">Targets space + radius</div></div>\n    <div class=\"vocab-card\"><div class=\"vocab-before\">\"Make it more premium\"</div><div class=\"vocab-after\">\"Increase letter-spacing to -0.04em on all headlines and add a subtle noise texture overlay\"</div><div class=\"vocab-effect\">Targets typography</div></div>\n    <div class=\"vocab-card\"><div class=\"vocab-before\">\"It's too busy\"</div><div class=\"vocab-after\">\"Remove everything below the fold from the hero section \u2014 hero should be headline, subtext, one CTA only\"</div><div class=\"vocab-effect\">Targets simplicity</div></div>\n    <div class=\"vocab-card\"><div class=\"vocab-before\">\"The animation is off\"</div><div class=\"vocab-after\">\"The hover transition is too fast \u2014 change from 0.2s to 0.35s and switch easing to cubic-bezier(0.16,1,0.3,1)\"</div><div class=\"vocab-effect\">Targets timing</div></div>\n    <div class=\"vocab-card\"><div class=\"vocab-before\">\"Move that thing\"</div><div class=\"vocab-after\">\"The eyebrow label should be above the headline with 16px gap, not below it\"</div><div class=\"vocab-effect\">Targets proximity</div></div>\n    <div class=\"vocab-card\"><div class=\"vocab-before\">\"Different colors\"</div><div class=\"vocab-after\">\"Change the accent from orange to sapphire (#2e6fd4) and update all fire references in the CSS variables\"</div><div class=\"vocab-effect\">Targets color system</div></div>\n    <div class=\"vocab-card\"><div class=\"vocab-before\">\"It's boring\"</div><div class=\"vocab-after\">\"Add a 120px ghost number (section count) behind each section heading at opacity 0.04\"</div><div class=\"vocab-effect\">Targets visual depth</div></div>\n    <div class=\"vocab-card\"><div class=\"vocab-before\">\"Fix the mobile\"</div><div class=\"vocab-after\">\"On 480px breakpoint the 3-column grid becomes 1-column and headline reduces to 2.5rem\"</div><div class=\"vocab-effect\">Targets responsive</div></div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- EXERCISE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"exercise reveal\">\n    <p class=\"eyebrow ej2\">Chapter 09 \u2014 Full Build Exercise</p>\n    <h2 class=\"ex-title\">Go from brief to deployed site in one session.</h2>\n    <p class=\"ex-desc\">This is the full AI workflow compressed into a single exercise. You'll use the brief template, prompt templates, and iteration vocabulary to build and deploy a complete site end-to-end without looking at any code.</p>\n    <div class=\"ex-steps\">\n      <div class=\"ex-step\"><div class=\"ex-n\">01</div><div class=\"ex-text\">Choose a target: <strong>your own personal portfolio, a fictional product page, or a landing page for Scaler.</strong> Give it a clear purpose and target audience.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">02</div><div class=\"ex-text\">Fill out the Master Brief from Chapter 08 for your target. Be specific on all 7 fields. Don't rush this \u2014 a 15-minute brief saves 60 minutes of iterations.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">03</div><div class=\"ex-text\">Run the brief with Claude. <strong>Don't iterate yet.</strong> Just get the first output and review it fully against your brief. Note every gap.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">04</div><div class=\"ex-text\">Write your iteration messages using the vocabulary swaps above. Send all corrections in one message \u2014 not one at a time. Claude can apply 10 changes in one pass.</div></div>\n      <div class=\"ex-step\"><div class=\"ex-n\">05</div><div class=\"ex-text\">Deploy the result to Vercel. Share the URL. <strong>The site is live.</strong> Note the total time from blank page to live URL. This is your baseline \u2014 improve it with every build.</div></div>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"ch-footer\">\n  <div class=\"ch-footer-inner\">\n    <a href=\"chapter-08.html\" class=\"ch-btn prev\"><span class=\"ch-btn-arr\">\u2190</span><div><div class=\"ch-btn-label\">Previous</div><div class=\"ch-btn-title\">Figma</div></div></a>\n    <div class=\"ch-center\"><div style=\"margin-bottom:6px\">Chapter 09 of 12</div><a href=\"index.html\">Design Mastery</a></div>\n    <a href=\"chapter-10.html\" class=\"ch-btn next\"><div><div class=\"ch-btn-label\">Next Chapter</div><div class=\"ch-btn-title\">Aesthetic Systems</div></div><span class=\"ch-btn-arr\">\u2192</span></a>\n  </div>\n</div>\n\n<script>\ngsap.registerPlugin(ScrollTrigger);\nwindow.addEventListener('scroll',()=>{const s=document.documentElement.scrollTop,h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('pb').style.width=(s/h*100)+'%'});\ngsap.utils.toArray('.reveal').forEach((el,i)=>{gsap.fromTo(el,{opacity:0,y:44},{opacity:1,y:0,duration:.85,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 84%'},delay:(i%3)*.07})});\nfunction togglePrompt(id){const c=document.getElementById(id);c.classList.toggle('open')}\nfunction copyPrompt(btn){const t=btn.parentElement.textContent.replace('copy','').trim();navigator.clipboard.writeText(t).then(()=>{btn.textContent='copied!';setTimeout(()=>btn.textContent='copy',2000)})}\n<\/script>\n</body>\n</html>\n"</script>
<script type="application/json" id="ch-data-9">"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ch 10 \u2014 Aesthetic Systems \u00b7 Design Mastery</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js\"><\/script>\n<style>\n:root{--bg:#f6f4f0;--bg2:#edeae4;--bg3:#e4e0d8;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.06);--ink:#100f0d;--ink2:#45433f;--ink3:#8c8880;--ink4:#b5b2ac;--fire:#e8500a;--amber:#d4880a;--sapphire:#2e6fd4;--jade:#1f7a5c;--glass:rgba(255,255,255,.65);--glass2:rgba(255,255,255,.42);--sh2:0 8px 32px rgba(0,0,0,.08);--sh3:0 20px 60px rgba(0,0,0,.10);--sh4:0 40px 100px rgba(0,0,0,.13);--r1:8px;--r2:14px;--r3:22px;--ease-out:cubic-bezier(0.16,1,0.3,1)}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}*{scrollbar-width:none}*::-webkit-scrollbar{display:none}\nbody{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden}a{color:inherit;text-decoration:none}\nbody::after{content:'';position:fixed;inset:0;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E\");pointer-events:none;z-index:9999;opacity:.5}\n.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}\n.o1{width:600px;height:600px;background:radial-gradient(circle,rgba(232,80,10,.10),transparent 68%);top:-100px;right:-100px;animation:oA 22s ease-in-out infinite}\n.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(147,51,234,.08),transparent 68%);bottom:-80px;left:-80px;animation:oB 28s ease-in-out infinite}\n@keyframes oA{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,50px)}}\n@keyframes oB{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-40px)}}\n.progress-bar{position:fixed;top:0;left:0;height:2px;z-index:1000;background:linear-gradient(90deg,var(--fire),#9333ea);width:0%;transition:width .1s linear}\nnav{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:500;background:var(--glass);backdrop-filter:blur(28px);border:1px solid var(--border);border-radius:100px;padding:10px 22px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh2);opacity:0;animation:navIn .7s var(--ease-out) .4s forwards;white-space:nowrap}\n@keyframes navIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}\n.nav-home{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-right:14px;border-right:1px solid var(--border)}\n.wrap{max-width:900px;margin:0 auto;padding:0 32px}\nsection{position:relative;z-index:10;padding:100px 0}\n.hero-sec{min-height:100vh;display:flex;align-items:center;padding:80px 0}\n.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);position:relative;z-index:10}\n.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fire);display:flex;align-items:center;gap:12px;margin-bottom:18px}\n.eyebrow::before{content:'';width:28px;height:1px;background:var(--fire);flex-shrink:0}\n.ep{color:#9333ea}.ep::before{background:#9333ea}\n.ej{color:var(--jade)}.ej::before{background:var(--jade)}\n.ea{color:var(--amber)}.ea::before{background:var(--amber)}\n.display{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink)}\n.display em{font-style:normal;background:linear-gradient(135deg,var(--fire),#9333ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.035em;line-height:1.1;color:var(--ink)}\n.h3{font-family:'Bricolage Grotesque',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:-.025em;color:var(--ink)}\n.lead{font-size:clamp(1rem,1.5vw,1.12rem);color:var(--ink2);line-height:1.8}\n.bt{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:20px}\n.bt:last-child{margin-bottom:0}\n.card{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh3);padding:52px;position:relative;overflow:hidden}\n.card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.csm{background:var(--glass2);backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);padding:28px;position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s,background .3s}\n.csm::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 50%);pointer-events:none;border-radius:inherit}\n.csm:hover{transform:translateY(-5px);box-shadow:var(--sh3);background:var(--glass)}\n.callout{padding:24px 28px;border-radius:var(--r2);border-left:3px solid var(--fire);background:rgba(232,80,10,.04);margin:28px 0}\n.cj{border-color:var(--jade);background:rgba(31,122,92,.04)}\n.cb{border-color:var(--sapphire);background:rgba(46,111,212,.04)}\n.ca{border-color:var(--amber);background:rgba(212,136,10,.04)}\n.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fire);margin-bottom:10px}\n.cj .callout-label{color:var(--jade)}.cb .callout-label{color:var(--sapphire)}.ca .callout-label{color:var(--amber)}\n.callout p{font-size:14px;color:var(--ink2);line-height:1.75}\n.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:28px 0}\n.code-block{background:var(--ink);border-radius:var(--r2);padding:20px 24px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.85;color:#d4d0c8;overflow-x:auto;position:relative;margin:12px 0}\n.kw{color:#f0a050}.str{color:#7dd3a8}.cm{color:rgba(255,255,255,.28);font-style:italic}.prop{color:#c4b5fd}.val{color:#f9a8d4}\n\n/* AESTHETIC CARDS */\n.aesthetic-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:28px 0}\n.aes-card{border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh3);position:relative;min-height:280px;cursor:default;transition:transform .4s var(--ease-out),box-shadow .4s}\n.aes-card:hover{transform:translateY(-8px);box-shadow:var(--sh4)}\n.aes-preview{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:28px}\n.aes-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:4px 10px;border-radius:100px;display:inline-block;width:fit-content;margin-bottom:14px}\n.aes-name{font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:8px}\n.aes-desc{font-size:12px;line-height:1.6;opacity:.8}\n.aes-prompt{margin-top:12px;padding:10px 14px;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);border-radius:var(--r1);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;line-height:1.6;color:rgba(255,255,255,.65)}\n\n/* DARK EDITORIAL */\n.aes-dark-editorial .aes-preview{background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,.92) 60%);background-color:#0a0a0f}\n.aes-dark-editorial{background:#0a0a0f}\n.aes-dark-editorial .aes-badge{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5)}\n.aes-dark-editorial .aes-name{color:#f4f4f5}\n.aes-dark-editorial .aes-desc{color:rgba(255,255,255,.55)}\n.de-graphic{position:absolute;top:16px;left:20px;font-family:'Bricolage Grotesque',sans-serif;font-size:100px;font-weight:800;letter-spacing:-.06em;color:rgba(255,255,255,.03);line-height:1;user-select:none}\n\n/* GLASS */\n.aes-glass{background:linear-gradient(135deg,#a8c8f8,#c8b8f8,#f8c8e8)}\n.aes-glass .aes-preview{background:rgba(0,0,0,0)}\n.aes-glass .aes-badge{background:rgba(255,255,255,.3);backdrop-filter:blur(8px);color:rgba(0,0,0,.6)}\n.aes-glass .aes-name{color:rgba(0,0,0,.85)}\n.aes-glass .aes-desc{color:rgba(0,0,0,.6)}\n.glass-card-demo{position:absolute;top:24px;right:20px;width:100px;padding:14px;background:rgba(255,255,255,.55);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.1)}\n.glass-card-demo .gcb{height:8px;background:rgba(0,0,0,.12);border-radius:3px;margin-bottom:6px}\n.glass-card-demo .gcb.w70{width:70%}\n\n/* BRUTALIST */\n.aes-brutalist{background:#f5f5f0}\n.aes-brutalist .aes-preview{background:rgba(0,0,0,0)}\n.aes-brutalist .aes-badge{background:#000;color:#f5f5f0;border-radius:0}\n.aes-brutalist .aes-name{color:#000;font-size:30px;text-transform:uppercase;letter-spacing:-.02em}\n.aes-brutalist .aes-desc{color:#333}\n.brut-line{position:absolute;top:0;left:0;right:0;height:6px;background:#000}\n.brut-num{position:absolute;top:30px;right:20px;font-family:'DM Mono',monospace;font-size:60px;font-weight:500;color:rgba(0,0,0,.07);line-height:1}\n\n/* CINEMATIC */\n.aes-cinematic{background:#0c0a08}\n.aes-cinematic .aes-preview{background:linear-gradient(180deg,rgba(12,10,8,0) 30%,rgba(12,10,8,.95) 80%)}\n.aes-cinematic .aes-badge{background:rgba(212,136,10,.15);color:var(--amber);border:1px solid rgba(212,136,10,.2)}\n.aes-cinematic .aes-name{color:#f5f0e8}\n.aes-cinematic .aes-desc{color:rgba(245,240,232,.6)}\n.cin-bars{position:absolute;top:0;left:0;right:0;height:28px;background:rgba(0,0,0,.85)}\n.cin-bars2{position:absolute;bottom:80px;left:0;right:0;height:28px;background:rgba(0,0,0,.85)}\n.cin-graphic{position:absolute;top:40px;left:0;right:0;height:40px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(212,136,10,.5)}\n\n/* LIGHT MINIMAL */\n.aes-minimal{background:#fafaf8}\n.aes-minimal .aes-preview{background:rgba(0,0,0,0)}\n.aes-minimal .aes-badge{background:rgba(0,0,0,.05);color:rgba(0,0,0,.4)}\n.aes-minimal .aes-name{color:#0a0a0a}\n.aes-minimal .aes-desc{color:rgba(0,0,0,.45)}\n.min-line{position:absolute;bottom:0;left:0;width:100%;height:1px;background:rgba(0,0,0,.08)}\n.min-accent{position:absolute;top:32px;right:28px;width:32px;height:32px;border-radius:50%;background:#0a0a0a}\n\n/* NEON DARK */\n.aes-neon{background:#06060e}\n.aes-neon .aes-preview{background:linear-gradient(180deg,rgba(6,6,14,0) 20%,rgba(6,6,14,.96) 70%)}\n.aes-neon .aes-badge{background:rgba(0,255,170,.1);color:#00ffaa;border:1px solid rgba(0,255,170,.2)}\n.aes-neon .aes-name{color:#fff}\n.aes-neon .aes-desc{color:rgba(255,255,255,.5)}\n.neon-glow{position:absolute;top:32px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:40px;font-weight:500;letter-spacing:.06em;color:#00ffaa;text-shadow:0 0 40px rgba(0,255,170,.6),0 0 80px rgba(0,255,170,.3);user-select:none}\n\n/* SOFT PASTEL */\n.aes-pastel{background:#fdf6f0}\n.aes-pastel .aes-preview{background:rgba(0,0,0,0)}\n.aes-pastel .aes-badge{background:rgba(232,80,10,.08);color:var(--fire)}\n.aes-pastel .aes-name{color:#2d1b0e}\n.aes-pastel .aes-desc{color:rgba(45,27,14,.6)}\n.pastel-blob{position:absolute;top:-20px;right:-20px;width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,rgba(232,80,10,.15),rgba(212,136,10,.1));filter:blur(20px)}\n.pastel-blob2{position:absolute;bottom:-10px;left:-10px;width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,rgba(46,111,212,.1),rgba(31,122,92,.1));filter:blur(16px)}\n\n/* SWISS GRID */\n.aes-swiss{background:#f2f0ed}\n.aes-swiss .aes-preview{background:rgba(0,0,0,0)}\n.aes-swiss .aes-badge{background:#e63946;color:#fff;border-radius:2px}\n.aes-swiss .aes-name{color:#1a1a1a;font-size:22px}\n.aes-swiss .aes-desc{color:rgba(26,26,26,.6)}\n.swiss-grid-lines{position:absolute;inset:0;overflow:hidden;opacity:.05}\n.swiss-grid-lines::before{content:'';position:absolute;top:0;bottom:0;left:33.3%;width:1px;background:#000}\n.swiss-grid-lines::after{content:'';position:absolute;top:0;bottom:0;left:66.6%;width:1px;background:#000}\n.swiss-h{position:absolute;top:28px;left:0;right:0;height:1px;background:rgba(0,0,0,.08)}\n.swiss-accent{position:absolute;top:20px;right:20px;width:60px;height:60px;background:#e63946}\n\n/* PROMPT BLOCKS */\n.prompt-block{background:var(--ink);border-radius:var(--r2);padding:20px 24px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.85;color:#d4d0c8;margin-top:12px;position:relative}\n.pb-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:10px}\n.pb-text{color:#7dd3a8}\n\n.exercise{background:linear-gradient(135deg,rgba(31,122,92,.07),rgba(255,255,255,.4));border:1px solid rgba(31,122,92,.2);border-radius:var(--r3);padding:48px;position:relative;overflow:hidden;margin:48px 0}\n.exercise::before{content:'EXERCISE';position:absolute;top:24px;right:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(31,122,92,.4)}\n.ex-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}\n.ex-desc{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:28px}\n.ex-steps{display:flex;flex-direction:column;gap:12px}\n.ex-step{display:grid;grid-template-columns:32px 1fr;gap:14px;align-items:start;padding:16px 20px;background:rgba(255,255,255,.5);border-radius:var(--r2);border:1px solid rgba(31,122,92,.1)}\n.ex-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--jade);font-weight:500}\n.ex-text{font-size:14px;color:var(--ink2);line-height:1.65}.ex-text strong{color:var(--ink)}\n.ch-footer{position:relative;z-index:10;padding:60px 0 80px;border-top:1px solid var(--border)}\n.ch-footer-inner{max-width:900px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}\n.ch-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .35s var(--ease-out);text-decoration:none;color:inherit}\n.ch-btn:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateY(-3px)}\n.ch-btn-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}\n.ch-btn-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}\n.ch-btn.next{flex-direction:row-reverse;text-align:right}\n.ch-btn-arr{font-size:20px;color:var(--ink3);transition:transform .3s}\n.ch-btn.prev:hover .ch-btn-arr{transform:translateX(-4px)}.ch-btn.next:hover .ch-btn-arr{transform:translateX(4px)}\n.ch-center{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink4);text-align:center}\n.ch-center a{color:var(--fire)}\n.reveal{opacity:0;transform:translateY(40px)}\n@keyframes fU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}\n@media(max-width:768px){.two-col,.aesthetic-grid{grid-template-colum
