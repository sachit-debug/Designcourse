       <div class=\"callout-label ej\">Creative director note</div>\n          <p>Pick your stack before you write the brief. Tell Claude which combination you want. \"Build this page using the Dark Editorial stack\" is a more powerful instruction than listing individual effects. Your prompt shapes the result.</p>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- PERFORMANCE -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"reveal-block\">\n      <div class=\"eyebrow ef\">Performance</div>\n      <h2 class=\"h2\" style=\"margin-bottom:20px\">Don't Let Techniques Slow You Down</h2>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px\">\n        <div class=\"csm\">\n          <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--jade);margin-bottom:14px\">GPU-friendly (fast)</div>\n          <ul style=\"list-style:none;display:flex;flex-direction:column;gap:8px\">\n            <li style=\"font-size:13px;color:var(--ink2);display:flex;gap:8px\"><span style=\"color:var(--jade)\">\u2713</span>transform: translate/scale/rotate</li>\n            <li style=\"font-size:13px;color:var(--ink2);display:flex;gap:8px\"><span style=\"color:var(--jade)\">\u2713</span>opacity changes</li>\n            <li style=\"font-size:13px;color:var(--ink2);display:flex;gap:8px\"><span style=\"color:var(--jade)\">\u2713</span>CSS animations on will-change elements</li>\n            <li style=\"font-size:13px;color:var(--ink2);display:flex;gap:8px\"><span style=\"color:var(--jade)\">\u2713</span>SVG noise texture (tiny file)</li>\n            <li style=\"font-size:13px;color:var(--ink2);display:flex;gap:8px\"><span style=\"color:var(--jade)\">\u2713</span>CSS marquee via translate</li>\n          </ul>\n        </div>\n        <div class=\"csm\">\n          <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fire);margin-bottom:14px\">Layout-triggering (slow)</div>\n          <ul style=\"list-style:none;display:flex;flex-direction:column;gap:8px\">\n            <li style=\"font-size:13px;color:var(--ink2);display:flex;gap:8px\"><span style=\"color:var(--fire)\">\u2717</span>Animating width/height/top/left</li>\n            <li style=\"font-size:13px;color:var(--ink2);display:flex;gap:8px\"><span style=\"color:var(--fire)\">\u2717</span>Changing font-size on scroll</li>\n            <li style=\"font-size:13px;color:var(--ink2);display:flex;gap:8px\"><span style=\"color:var(--fire)\">\u2717</span>backdrop-filter on many elements</li>\n            <li style=\"font-size:13px;color:var(--ink2);display:flex;gap:8px\"><span style=\"color:var(--fire)\">\u2717</span>Uncompressed video files</li>\n            <li style=\"font-size:13px;color:var(--ink2);display:flex;gap:8px\"><span style=\"color:var(--fire)\">\u2717</span>box-shadow on animated elements</li>\n          </ul>\n        </div>\n      </div>\n      <div class=\"callout\">\n        <div class=\"callout-label\">The rule of thumb</div>\n        <p>Only transform and opacity are guaranteed to be GPU-accelerated. Everything else might cause a browser repaint or reflow. When in doubt, animate transform and leave everything else alone.</p>\n      </div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- EXERCISE -->\n<section style=\"background:rgba(46,111,212,.03)\">\n  <div class=\"wrap\">\n    <div class=\"reveal-block\">\n      <div class=\"eyebrow ej\">Chapter Exercise</div>\n      <h2 class=\"h2\" style=\"margin-bottom:8px\">Build: The Technique Demo Page</h2>\n      <p class=\"bt\" style=\"margin-bottom:32px\">Apply at least three techniques to build one cohesive page that feels Awwwards-ready.</p>\n      <div class=\"card\" style=\"background:rgba(46,111,212,.04);border-color:rgba(46,111,212,.15)\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sapphire);margin-bottom:20px\">The Brief</div>\n        <p class=\"bt\" style=\"margin-bottom:20px\">Build a single-page showcase site for a fictional creative studio called \"Vessel.\" The brand is dark, editorial, and cinematic. The site should feel like it belongs on Awwwards.</p>\n        <ol class=\"num-list\">\n          <li>Choose your technique stack from the three stacks in this chapter. Write your choice down before coding.</li>\n          <li>Write a brief for Claude that explicitly names each technique and how it should behave in the context of Vessel's brand.</li>\n          <li>Build the hero section first. The headline should use text masking, the background should be dark with noise grain, and scroll should trigger the first reveal animation.</li>\n          <li>Add a marquee strip of Vessel's services or clients. Keep it subtle: low opacity, slow speed.</li>\n          <li>Add micro-interactions to every clickable element. Hover, active, and focus states \u2014 all three.</li>\n          <li>Test on mobile. Most Awwwards techniques look broken on iPhone if you haven't tested. Fix everything that breaks.</li>\n          <li>Open the live site and time how long each technique takes to respond. If anything feels sluggish, simplify it.</li>\n        </ol>\n        <div class=\"callout cj\" style=\"margin-top:24px;margin-bottom:0\">\n          <div class=\"callout-label ej\">The creative director test</div>\n          <p>Show the finished page to someone who hasn't seen it. Ask: \"What one word would you use to describe this site?\" If the answer isn't close to what you intended (cinematic, premium, editorial), your techniques are fighting your content instead of serving it.</p>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- CHAPTER FOOTER -->\n\n\n<script>\n// Progress bar\nwindow.addEventListener('scroll',()=>{\n  const h=document.documentElement;\n  const pct=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100;\n  document.getElementById('pb').style.width=pct+'%';\n});\n\n// Hero animations\ngsap.registerPlugin(ScrollTrigger);\ngsap.to('#h-ey',{opacity:1,y:0,duration:.7,ease:'power3.out',delay:.3,from:{y:20}});\ngsap.from('#h-ey',{opacity:0,y:20,duration:.7,ease:'power3.out',delay:.3});\ngsap.from('#h-hed',{opacity:0,y:30,duration:.9,ease:'power3.out',delay:.5});\ngsap.from('#h-lead',{opacity:0,y:20,duration:.8,ease:'power3.out',delay:.7});\ngsap.from('#h-stats',{opacity:0,y:20,duration:.8,ease:'power3.out',delay:.85});\n\n// Scroll reveals\ngsap.utils.toArray('.reveal-block').forEach(el=>{\n  gsap.from(el,{opacity:0,y:40,duration:.9,ease:'power3.out',\n    scrollTrigger:{trigger:el,start:'top 85%',toggleActions:'play none none none'}\n  });\n});\n\n// Custom cursor demo\nconst cursorDemo = document.getElementById('cursorDemo');\nconst blob = document.getElementById('cBlob');\nconst dot = document.getElementById('cDot');\nlet bx=50,by=50,tx=50,ty=50;\n\ncursorDemo.addEventListener('mousemove',e=>{\n  const r=cursorDemo.getBoundingClientRect();\n  tx=((e.clientX-r.left)/r.width)*100;\n  ty=((e.clientY-r.top)/r.height)*100;\n  dot.style.left=tx+'%';\n  dot.style.top=ty+'%';\n});\n\n(function animBlob(){\n  bx+=(tx-bx)*.08;\n  by+=(ty-by)*.08;\n  blob.style.left=bx+'%';\n  blob.style.top=by+'%';\n  requestAnimationFrame(animBlob);\n})();\n\n// Story lines animation\nconst lines=document.querySelectorAll('.story-line');\nlet li=0;\nsetInterval(()=>{\n  lines.forEach(l=>l.classList.remove('active'));\n  lines[li%lines.length].classList.add('active');\n  li++;\n},600);\n<\/script>\n</body>\n</html>\n"</script>
<script type="application/json" id="ch-data-11">"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ch 12 \u2014 Capstone: Your Portfolio \u00b7 Design Mastery</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js\"><\/script>\n<style>\n:root{--bg:#f6f4f0;--bg2:#edeae4;--bg3:#e4e0d8;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.06);--ink:#100f0d;--ink2:#45433f;--ink3:#8c8880;--ink4:#b5b2ac;--fire:#e8500a;--amber:#d4880a;--sapphire:#2e6fd4;--jade:#1f7a5c;--glass:rgba(255,255,255,.65);--glass2:rgba(255,255,255,.42);--sh2:0 8px 32px rgba(0,0,0,.08);--sh3:0 20px 60px rgba(0,0,0,.10);--sh4:0 40px 100px rgba(0,0,0,.13);--r1:8px;--r2:14px;--r3:22px;--ease-out:cubic-bezier(0.16,1,0.3,1)}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}*{scrollbar-width:none}*::-webkit-scrollbar{display:none}\nbody{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden}a{color:inherit;text-decoration:none}\nbody::after{content:'';position:fixed;inset:0;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E\");pointer-events:none;z-index:9999;opacity:.5}\n.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}\n.o1{width:600px;height:600px;background:radial-gradient(circle,rgba(31,122,92,.12),transparent 68%);top:-100px;right:-100px;animation:oA 22s ease-in-out infinite}\n.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(212,136,10,.10),transparent 68%);bottom:-80px;left:-80px;animation:oB 28s ease-in-out infinite}\n@keyframes oA{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,50px)}}\n@keyframes oB{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-40px)}}\n.progress-bar{position:fixed;top:0;left:0;height:2px;z-index:1000;background:linear-gradient(90deg,var(--jade),var(--amber));width:0%;transition:width .1s linear}\nnav{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:500;background:var(--glass);backdrop-filter:blur(28px);border:1px solid var(--border);border-radius:100px;padding:10px 22px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh2);opacity:0;animation:navIn .7s var(--ease-out) .4s forwards;white-space:nowrap}\n@keyframes navIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}\n.nav-home{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-right:14px;border-right:1px solid var(--border)}\n.wrap{max-width:900px;margin:0 auto;padding:0 32px}\nsection{position:relative;z-index:10;padding:100px 0}\n.hero-sec{min-height:100vh;display:flex;align-items:center;padding:80px 0}\n.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);position:relative;z-index:10}\n.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--jade);display:flex;align-items:center;gap:12px;margin-bottom:18px}\n.eyebrow::before{content:'';width:28px;height:1px;background:var(--jade);flex-shrink:0}\n.ea{color:var(--amber)}.ea::before{background:var(--amber)}\n.ef{color:var(--fire)}.ef::before{background:var(--fire)}\n.es{color:var(--sapphire)}.es::before{background:var(--sapphire)}\n.display{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink)}\n.display em{font-style:normal;background:linear-gradient(135deg,var(--jade),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.035em;line-height:1.1;color:var(--ink)}\n.h3{font-family:'Bricolage Grotesque',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:-.025em;color:var(--ink)}\n.lead{font-size:clamp(1rem,1.5vw,1.12rem);color:var(--ink2);line-height:1.8}\n.bt{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:20px}\n.bt:last-child{margin-bottom:0}\n.card{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh3);padding:52px;position:relative;overflow:hidden}\n.card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.csm{background:var(--glass2);backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);padding:28px;position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s,background .3s}\n.csm::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 50%);pointer-events:none;border-radius:inherit}\n.csm:hover{transform:translateY(-5px);box-shadow:var(--sh3);background:var(--glass)}\n.callout{padding:24px 28px;border-radius:var(--r2);border-left:3px solid var(--jade);background:rgba(31,122,92,.04);margin:28px 0}\n.ca{border-color:var(--amber);background:rgba(212,136,10,.04)}\n.cf{border-color:var(--fire);background:rgba(232,80,10,.04)}\n.cs{border-color:var(--sapphire);background:rgba(46,111,212,.04)}\n.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--jade);margin-bottom:10px}\n.ca .callout-label{color:var(--amber)}.cf .callout-label{color:var(--fire)}.cs .callout-label{color:var(--sapphire)}\n.callout p{font-size:14px;color:var(--ink2);line-height:1.75}\n.code-block{background:var(--ink);border-radius:var(--r2);padding:20px 24px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.85;color:#d4d0c8;overflow-x:auto;position:relative;margin:12px 0}\n.kw{color:#f0a050}.str{color:#7dd3a8}.cm{color:rgba(255,255,255,.28);font-style:italic}.prop{color:#c4b5fd}.val{color:#f9a8d4}\n\n/* STEP TRACKER */\n.step-list{display:flex;flex-direction:column;gap:0;position:relative;margin:28px 0}\n.step-list::before{content:'';position:absolute;left:22px;top:22px;bottom:22px;width:1px;background:linear-gradient(180deg,var(--jade),var(--amber));opacity:.3}\n.step-item{display:grid;grid-template-columns:44px 1fr;gap:24px;padding:24px 0;align-items:start}\n.step-num{width:44px;height:44px;border-radius:50%;background:var(--glass);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--jade);flex-shrink:0;box-shadow:var(--sh2);position:relative;z-index:2;backdrop-filter:blur(12px)}\n.step-content{}\n.step-title{font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-bottom:6px}\n.step-desc{font-size:14px;color:var(--ink2);line-height:1.75}\n\n/* PORTFOLIO SECTIONS */\n.section-preview{border-radius:var(--r2);overflow:hidden;margin:16px 0;position:relative}\n.preview-header{background:var(--ink);padding:10px 16px;display:flex;align-items:center;gap:8px}\n.dot-row{display:flex;gap:5px}\n.dot{width:10px;height:10px;border-radius:50%}\n.preview-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-left:8px}\n\n/* BRIEF TEMPLATE */\n.brief-field{margin-bottom:24px}\n.brief-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--jade);margin-bottom:8px}\n.brief-input{width:100%;padding:14px 18px;border-radius:var(--r1);border:1px solid var(--border);background:var(--glass2);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--ink);resize:none;line-height:1.6;backdrop-filter:blur(12px);transition:border-color .2s,box-shadow .2s}\n.brief-input:focus{outline:none;border-color:var(--jade);box-shadow:0 0 0 3px rgba(31,122,92,.12)}\n.brief-input::placeholder{color:var(--ink4)}\n\n/* VERCEL STEPS */\n.deploy-step{display:grid;grid-template-columns:32px 1fr;gap:16px;padding:16px 0;border-bottom:1px solid var(--border2);align-items:start}\n.deploy-step:last-child{border-bottom:none}\n.deploy-num{width:32px;height:32px;border-radius:50%;background:rgba(31,122,92,.1);border:1px solid rgba(31,122,92,.2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;color:var(--jade);flex-shrink:0}\n.deploy-text{}\n.deploy-title{font-weight:600;font-size:14px;color:var(--ink);margin-bottom:4px}\n.deploy-desc{font-size:13px;color:var(--ink3);line-height:1.65}\n\n/* NUM LIST */\n.num-list{counter-reset:nl;list-style:none;display:flex;flex-direction:column;gap:12px;margin:20px 0}\n.num-list li{counter-increment:nl;display:flex;gap:14px;align-items:flex-start;font-size:14px;color:var(--ink2);line-height:1.7}\n.num-list li::before{content:counter(nl,decimal-leading-zero);font-family:'DM Mono',monospace;font-size:10px;color:var(--jade);background:rgba(31,122,92,.08);border:1px solid rgba(31,122,92,.18);border-radius:6px;padding:3px 8px;flex-shrink:0;margin-top:2px;letter-spacing:.04em}\n\n/* CELEBRATION CARD */\n.celebrate{background:linear-gradient(135deg,rgba(31,122,92,.08),rgba(212,136,10,.06));border:1px solid rgba(31,122,92,.18);border-radius:var(--r3);padding:52px;text-align:center;position:relative;overflow:hidden}\n.celebrate::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.4),transparent);pointer-events:none}\n.confetti-ring{position:absolute;border-radius:50%;border:1px solid;opacity:.12;pointer-events:none}\n.r1{width:300px;height:300px;top:-100px;right:-80px;border-color:var(--jade);animation:spin 20s linear infinite}\n.r2{width:200px;height:200px;bottom:-60px;left:-60px;border-color:var(--amber);animation:spin 14s linear infinite reverse}\n@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}\n\n/* CHAPTER FOOTER */\n.chapter-footer{background:var(--glass);backdrop-filter:blur(24px);border-top:1px solid var(--border);padding:48px 0;position:relative;z-index:10}\n.footer-nav{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px;margin:0 auto;padding:0 32px}\n.fn-card{background:var(--glass2);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;display:flex;flex-direction:column;gap:6px;transition:transform .3s var(--ease-out),box-shadow .3s}\n.fn-card:hover{transform:translateY(-3px);box-shadow:var(--sh2)}\n.fn-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink4)}\n.fn-title{font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:-.02em;color:var(--ink)}\n.fn-arrow{font-size:18px;color:var(--ink3);margin-top:4px}\n</style>\n</head>\n<body>\n\n<div class=\"orb o1\"></div>\n<div class=\"orb o2\"></div>\n\n\n\n<!-- HERO -->\n<section class=\"hero-sec\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" style=\"opacity:0\" id=\"h-ey\">Chapter 12 \u2014 Capstone</div>\n    <h1 class=\"display\" style=\"opacity:0;margin-bottom:28px\" id=\"h-hed\">\n      Build Your<br><em>Portfolio</em>\n    </h1>\n    <p class=\"lead\" style=\"max-width:580px;opacity:0\" id=\"h-lead\">\n      You've studied 11 chapters of visual design, typography, color, layout, motion, and advanced techniques. Now you ship the thing that proves it. This chapter walks you from blank canvas to live URL, step by step.\n    </p>\n    <div style=\"display:flex;gap:16px;margin-top:40px;flex-wrap:wrap;opacity:0\" id=\"h-chips\">\n      <div style=\"padding:10px 20px;border-radius:100px;background:rgba(31,122,92,.08);border:1px solid rgba(31,122,92,.18);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--jade)\">Full brief template</div>\n      <div style=\"padding:10px 20px;border-radius:100px;background:rgba(212,136,10,.08);border:1px solid rgba(212,136,10,.18);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber)\">Vercel deployment</div>\n      <div style=\"padding:10px 20px;border-radius:100px;background:rgba(46,111,212,.08);border:1px solid rgba(46,111,212,.18);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--sapphire)\">Custom domain</div>\n      <div style=\"padding:10px 20px;border-radius:100px;background:rgba(232,80,10,.08);border:1px solid rgba(232,80,10,.18);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fire)\">Checklist included</div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- WHAT YOU'RE BUILDING -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"reveal-block\">\n      <div class=\"eyebrow\">The Brief</div>\n      <h2 class=\"h2\" style=\"margin-bottom:20px\">What You're Building</h2>\n      <div class=\"card\">\n        <p class=\"bt\">A portfolio site is not just a gallery. It's a piece of work in itself. Every designer who ever got hired for a great job got that job because their portfolio communicated something specific about how they think.</p>\n        <p class=\"bt\">Your portfolio needs to answer three questions in the first five seconds:</p>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:28px 0\">\n          <div style=\"padding:24px;background:rgba(31,122,92,.05);border-radius:var(--r2);border:1px solid rgba(31,122,92,.12);text-align:center\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:2.2rem;font-weight:800;color:var(--jade);margin-bottom:8px\">Who</div>\n            <div style=\"font-size:13px;color:var(--ink2);line-height:1.6\">are you and what do you make?</div>\n          </div>\n          <div style=\"padding:24px;background:rgba(212,136,10,.05);border-radius:var(--r2);border:1px solid rgba(212,136,10,.12);text-align:center\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:2.2rem;font-weight:800;color:var(--amber);margin-bottom:8px\">Why</div>\n            <div style=\"font-size:13px;color:var(--ink2);line-height:1.6\">should anyone care about your work?</div>\n          </div>\n          <div style=\"padding:24px;background:rgba(46,111,212,.05);border-radius:var(--r2);border:1px solid rgba(46,111,212,.12);text-align:center\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:2.2rem;font-weight:800;color:var(--sapphire);margin-bottom:8px\">How</div>\n            <div style=\"font-size:13px;color:var(--ink2);line-height:1.6\">can someone work with you?</div>\n          </div>\n        </div>\n        <div class=\"callout\" style=\"margin-bottom:0\">\n          <div class=\"callout-label\">The structure</div>\n          <p>Hero (who you are) \u2192 Work (proof) \u2192 Process or About (how you think) \u2192 Contact (next step). That's it. Every award-winning portfolio follows this sequence. The visual treatment is where you differentiate, not the structure.</p>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- PHASE 1: FOUNDATION -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"reveal-block\">\n      <div class=\"eyebrow es\">Phase 1 of 4</div>\n      <h2 class=\"h2\" style=\"margin-bottom:8px\">Foundation: Decisions Before Code</h2>\n      <p class=\"bt\" style=\"margin-bottom:32px\">Everything you've learned in this course feeds into the decisions you make before writing a single word of the brief. Do not skip this phase.</p>\n\n      <div class=\"step-list\">\n        <div class=\"step-item\">\n          <div class=\"step-num\">01</div>\n          <div class=\"step-content\">\n            <div class=\"step-title\">Choose your aesthetic</div>\n            <div class=\"step-desc\">From Chapter 10: which of the 8 aesthetics fits your work and your audience? Dark editorial if you're targeting creative agencies. Light minimal if you're targeting tech companies. Glassmorphism if your work is digital product design. Write this down. It drives every other decision.</div>\n          </div>\n        </div>\n        <div class=\"step-item\">\n          <div class=\"step-num\">02</div>\n          <div class=\"step-content\">\n            <div class=\"step-title\">Pick your technique stack</div>\n            <div class=\"step-desc\">From Chapter 11: choose maximum three techniques. Write them down. \"My portfolio will use scroll reveals + noise grain + micro-interactions.\" This single sentence will keep your brief focused.</div>\n          </div>\n        </div>\n        <div class=\"step-item\">\n          <div class=\"step-num\">03</div>\n          <div class=\"step-content\">\n            <div class=\"step-title\">Define your color system</div>\n            <div class=\"step-desc\">From Chapter 4: one background, one ink, one accent. Only add a second accent if your work genuinely requires it. Write the hex values. If you can't decide, start with the palette from Chapter 4's personal exercise.</div>\n          </div>\n        </div>\n        <div class=\"step-item\">\n          <div class=\"step-num\">04</div>\n          <div class=\"step-content\">\n            <div class=\"step-title\">Choose your font pairing</div>\n            <div class=\"step-desc\">From Chapter 3: one display font for headlines, one body font for text. That's it. Add a mono font for labels and code if your work includes any. Three fonts maximum, ever.</div>\n          </div>\n        </div>\n        <div class=\"step-item\">\n          <div class=\"step-num\">05</div>\n          <div class=\"step-content\">\n            <div class=\"step-title\">Select your 3 best pieces of work</div>\n            <div class=\"step-desc\">Not your newest. Your best. Three strong pieces beat ten mediocre ones every time. For each piece, write one sentence about the problem you solved, not just what it looks like.</div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"callout ca\" style=\"margin-top:0\">\n        <div class=\"callout-label ea\">Time this phase should take</div>\n        <p>30 minutes. No more. If you spend longer, you're procrastinating by calling it planning. The decisions are simple. Write them down and move.</p>\n      </div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- PHASE 2: THE BRIEF -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"reveal-block\">\n      <div class=\"eyebrow ea\">Phase 2 of 4</div>\n      <h2 class=\"h2\" style=\"margin-bottom:8px\">Writing the Master Brief</h2>\n      <p class=\"bt\" style=\"margin-bottom:32px\">This is the most important prompt you'll write in this entire course. Fill in the template below with your Phase 1 decisions, then paste the entire thing to Claude.</p>\n\n      <div class=\"card\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:28px\">\n          <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber)\">Master Brief Template</div>\n          <div style=\"flex:1;height:1px;background:var(--border)\"></div>\n          <div style=\"font-family:'DM Mono',monospace;font-size:9px;color:var(--ink4);letter-spacing:.08em\">Fill in all [brackets]</div>\n        </div>\n\n        <div class=\"code-block\" style=\"font-size:12px;line-height:2\">\n<span class=\"cm\">You are helping me build my personal portfolio website. Here is the complete spec:</span>\n\n<span class=\"kw\">ABOUT ME</span>\nI am [your name]. I am a [your role/craft, e.g. \"product designer, front-end developer, illustrator\"].\nMy audience is [who you're targeting, e.g. \"tech startups and SaaS companies\"].\nMy tone is [2-3 adjectives, e.g. \"precise, warm, quietly confident\"].\n\n<span class=\"kw\">AESTHETIC</span>\nThe aesthetic is [aesthetic name from Ch 10].\nReference sites that feel right: [1-3 URLs or site names].\nThe vibe in one sentence: [your sentence].\n\n<span class=\"kw\">DESIGN SYSTEM</span>\nBackground: [hex]\nPrimary text: [hex]\nAccent color: [hex] \u2014 use sparingly for key moments only\nDisplay font: [font name] \u2014 headlines and hero text\nBody font: [font name] \u2014 all paragraph text\nMono font: [font name] \u2014 labels, tags, code\nSpacing: 8pt grid. Section padding: 100px vertical.\n\n<span class=\"kw\">TECHNIQUES</span>\nUse these from Chapter 11 and no others:\n1. [technique 1] \u2014 [how it should behave specifically]\n2. [technique 2] \u2014 [how it should behave specifically]\n3. [technique 3] \u2014 [how it should behave specifically]\n\n<span class=\"kw\">PAGE STRUCTURE</span>\n1. HERO: Full viewport. My name large. My title small. One-line tagline. No CTA yet.\n2. WORK: Three project cards. Each has: title, one-line description, year, image placeholder.\n3. ABOUT: Two-column. Left: a short bio (I'll fill this in). Right: skills/tools list.\n4. CONTACT: Centered. Email link. Optional: social links.\n\n<span class=\"kw\">TECHNICAL</span>\nSingle HTML file. All CSS inline. No frameworks.\nMust work perfectly on mobile (375px+).\nGSAP and ScrollTrigger from CDN are allowed.\nFonts from Google Fonts.\nDeploy target: Vercel.\n\n<span class=\"kw\">IMPORTANT</span>\n- Do not add any technique, color, or font I haven't listed above.\n- If you're unsure about something, choose the simpler option.\n- Optimize for elegance and restraint, not impressiveness.\n        </div>\n\n        <div class=\"callout cf\" style=\"margin-bottom:0\">\n          <div class=\"callout-label ef\">Why this works</div>\n          <p>Most prompts fail because they're vague. This brief leaves Claude no room to improvise in the wrong direction. Every visual decision is pre-made. Claude's only job is execution. That's how you get the output you imagined.</p>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- PHASE 3: THE BUILD -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"reveal-block\">\n      <div class=\"eyebrow\">Phase 3 of 4</div>\n      <h2 class=\"h2\" style=\"margin-bottom:8px\">The Build: Iteration Protocol</h2>\n      <p class=\"bt\" style=\"margin-bottom:32px\">You won't get a finished portfolio in one prompt. Here's exactly how the conversation should go.</p>\n\n      <div style=\"display:flex;flex-direction:column;gap:16px;margin-bottom:28px\">\n\n        <div class=\"csm reveal-block\">\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start\">\n            <div style=\"width:36px;height:36px;border-radius:50%;background:rgba(31,122,92,.1);border:1px solid rgba(31,122,92,.18);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--jade);flex-shrink:0\">1</div>\n            <div>\n              <div style=\"font-weight:600;font-size:15px;color:var(--ink);margin-bottom:6px\">Send the master brief. Review the full output.</div>\n              <div style=\"font-size:13px;color:var(--ink2);line-height:1.7\">Don't start iterating yet. Read through the entire file first. Make a mental list of what needs changing. Don't comment on individual pixels \u2014 look at the whole.</div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"csm reveal-block\">\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start\">\n            <div style=\"width:36px;height:36px;border-radius:50%;background:rgba(212,136,10,.1);border:1px solid rgba(212,136,10,.18);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--amber);flex-shrink:0\">2</div>\n            <div>\n              <div style=\"font-weight:600;font-size:15px;color:var(--ink);margin-bottom:6px\">Send one structural note per iteration.</div>\n              <div style=\"font-size:13px;color:var(--ink2);line-height:1.7\">Don't bundle 12 fixes into one message. Lead with the highest-impact change first. \"The hero spacing is too tight \u2014 increase the padding to match what we did in Chapter 5's 8pt grid\" is a great note. \"Change everything\" is not.</div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"csm reveal-block\">\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start\">\n            <div style=\"width:36px;height:36px;border-radius:50%;background:rgba(46,111,212,.1);border:1px solid rgba(46,111,212,.18);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--sapphire);flex-shrink:0\">3</div>\n            <div>\n              <div style=\"font-weight:600;font-size:15px;color:var(--ink);margin-bottom:6px\">Use the vocabulary from this course.</div>\n              <div style=\"font-size:13px;color:var(--ink2);line-height:1.7\">\"The visual hierarchy in the project cards is weak \u2014 the title and description have the same visual weight, making the headline hard to scan\" is a precise note. \"Make it look better\" sends you back to square one.</div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"csm reveal-block\">\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start\">\n            <div style=\"width:36px;height:36px;border-radius:50%;background:rgba(232,80,10,.1);border:1px solid rgba(232,80,10,.18);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--fire);flex-shrink:0\">4</div>\n            <div>\n              <div style=\"font-weight:600;font-size:15px;color:var(--ink);margin-bottom:6px\">Test on real mobile before anything else ships.</div>\n              <div style=\"font-size:13px;color:var(--ink2);line-height:1.7\">Open the file on your phone. Every single time. Not Chrome DevTools. Your actual phone. Half of all portfolio viewers are on mobile. A broken mobile layout is a broken portfolio, full stop.</div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"csm reveal-block\">\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start\">\n            <div style=\"width:36px;height:36px;border-radius:50%;background:rgba(140,136,128,.12);border:1px solid rgba(140,136,128,.2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--ink2);flex-shrink:0\">5</div>\n            <div>\n              <div style=\"font-weight:600;font-size:15px;color:var(--ink);margin-bottom:6px\">Know when to stop iterating.</div>\n              <div style=\"font-size:13px;color:var(--ink2);line-height:1.7\">The last 10% of polish takes 90% of the time. When the portfolio looks good enough to ship, ship it. Perfect portfolios that never go live help no one. You can always come back and refine after it's live.</div>\n            </div>\n          </div>\n        </div>\n\n      </div>\n\n      <div class=\"callout\">\n        <div class=\"callout-label\">Prompt reference card</div>\n        <p>From Chapter 9, here are the iteration phrases worth keeping open while you build: \"The [element] needs more visual weight\", \"Add 50% more breathing room in [section]\", \"The [element] isn't earning its place \u2014 remove it\", \"Make [element] feel more [adjective] \u2014 reduce scale/opacity\", \"The [section] breaks on mobile \u2014 fix without changing desktop\".</p>\n      </div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- PORTFOLIO SECTIONS BREAKDOWN -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"reveal-block\">\n      <div class=\"eyebrow\">Section by Section</div>\n      <h2 class=\"h2\" style=\"margin-bottom:8px\">What to Put in Each Section</h2>\n      <p class=\"bt\" style=\"margin-bottom:32px\">The brief gives you the structure. Here's what actually goes in each section and why.</p>\n\n      <div style=\"display:flex;flex-direction:column;gap:24px\">\n\n        <div class=\"card reveal-block\" style=\"padding:36px\">\n          <div style=\"display:grid;grid-template-columns:140px 1fr;gap:32px;align-items:start\">\n            <div>\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:2.4rem;font-weight:800;color:var(--jade);line-height:1;margin-bottom:6px\">Hero</div>\n              <div style=\"font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)\">Section 01</div>\n            </div>\n            <div>\n              <p class=\"bt\" style=\"margin-bottom:16px\">Your name needs to be the biggest thing on the page. Not your logo, not your tagline \u2014 your name. Then your title in a smaller, lighter weight. Then a single line about what you make that's specific enough to be memorable.</p>\n              <div style=\"background:rgba(31,122,92,.05);border-radius:var(--r1);padding:16px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.8;color:var(--ink2)\">\n                <span style=\"color:var(--jade)\">Good:</span> \"Karan Singh. Product designer making interfaces that feel obvious.\"<br>\n                <span style=\"color:var(--fire)\">Weak:</span> \"Welcome to my portfolio. I am a creative professional with 5 years of experience.\"\n              </div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"card reveal-block\" style=\"padding:36px\">\n          <div style=\"display:grid;grid-template-columns:140px 1fr;gap:32px;align-items:start\">\n            <div>\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:2.4rem;font-weight:800;color:var(--amber);line-height:1;margin-bottom:6px\">Work</div>\n              <div style=\"font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)\">Section 02</div>\n            </div>\n            <div>\n              <p class=\"bt\" style=\"margin-bottom:16px\">Three cards, each with a thumbnail, a title, a one-line problem statement, and a year. That's the entire card. No client names unless you have permission. No lengthy descriptions. The image does the work \u2014 the text does the context.</p>\n              <div style=\"background:rgba(212,136,10,.05);border-radius:var(--r1);padding:16px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.8;color:var(--ink2)\">\n                <span style=\"color:var(--amber)\">Card format:</span><br>\n                [Image/mockup \u2014 16:10 ratio works well]<br>\n                <span style=\"font-weight:600\">Project Title</span> \u2014 Problem in one sentence. \u2014 2024\n              </div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"card reveal-block\" style=\"padding:36px\">\n          <div style=\"display:grid;grid-template-columns:140px 1fr;gap:32px;align-items:start\">\n            <div>\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:2.4rem;font-weight:800;color:var(--sapphire);line-height:1;margin-bottom:6px\">About</div>\n              <div style=\"font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)\">Section 03</div>\n            </div>\n            <div>\n              <p class=\"bt\" style=\"margin-bottom:16px\">Two to three sentences max. Not your r\u00e9sum\u00e9. Something specific that tells me what you believe about design, not just what you've done. Then a tools/skills list. Keep it to 8 items \u2014 if it's a skill worth listing, it's worth having limited company.</p>\n              <div style=\"background:rgba(46,111,212,.05);border-radius:var(--r1);padding:16px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.8;color:var(--ink2)\">\n                <span style=\"color:var(--sapphire)\">Good bio:</span><br>\n                \"I believe the best interfaces are the ones users never notice. I design the invisible. Currently at [Company]. Previously at [Company].\"\n              </div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"card reveal-block\" style=\"padding:36px\">\n          <div style=\"display:grid;grid-template-columns:140px 1fr;gap:32px;align-items:start\">\n            <div>\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:2.4rem;font-weight:800;color:var(--fire);line-height:1;margin-bottom:6px\">Contact</div>\n              <div style=\"font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)\">Section 04</div>\n            </div>\n            <div>\n              <p class=\"bt\" style=\"margin-bottom:16px\">One email address, styled as a large clickable link. Optionally, one to two social links. Nothing else. No form \u2014 forms have submission anxiety. A direct email link removes all friction. Make the email the most prominent element in the section.</p>\n              <div style=\"background:rgba(232,80,10,.05);border-radius:var(--r1);padding:16px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.8;color:var(--ink2)\">\n                <span style=\"color:var(--fire)\">The contact section should say exactly one thing:</span><br>\n                \"Want to work together? \u2192 your@email.com\"\n              </div>\n            </div>\n          </div>\n        </div>\n\n      </div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- PHASE 4: DEPLOY -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"reveal-block\">\n      <div class=\"eyebrow ea\">Phase 4 of 4</div>\n      <h2 class=\"h2\" style=\"margin-bottom:8px\">Deploy to Vercel</h2>\n      <p class=\"bt\" style=\"margin-bottom:32px\">You have a single HTML file. Getting it live takes under five minutes. Here's every step.</p>\n\n      <div class=\"card\">\n        <div class=\"deploy-step\">\n          <div class=\"deploy-num\">1</div>\n          <div class=\"deploy-text\">\n            <div class=\"deploy-title\">Create a GitHub account if you don't have one</div>\n            <div class=\"deploy-desc\">Go to github.com and sign up. Free tier is all you need. This is where your code lives.</div>\n          </div>\n        </div>\n        <div class=\"deploy-step\">\n          <div class=\"deploy-num\">2</div>\n          <div class=\"deploy-text\">\n            <div class=\"deploy-title\">Create a new repository</div>\n            <div class=\"deploy-desc\">Click the \"+\" in the top right \u2192 New repository. Name it \"portfolio\" or your name. Set it to Public. Don't initialize with a README.</div>\n          </div>\n        </div>\n        <div class=\"deploy-step\">\n          <div class=\"deploy-num\">3</div>\n          <div class=\"deploy-text\">\n            <div class=\"deploy-title\">Upload your index.html</div>\n            <div class=\"deploy-desc\">On the repository page, click \"Add file\" \u2192 \"Upload files\". Drag your HTML file in. Make sure it's named exactly \"index.html\". Commit the change.</div>\n          </div>\n        </div>\n        <div class=\"deploy-step\">\n          <div class=\"deploy-num\">4</div>\n          <div class=\"deploy-text\">\n            <div class=\"deploy-title\">Connect to Vercel</div>\n            <div class=\"deploy-desc\">Go to vercel.com. Sign in with GitHub. Click \"New Project\". Find your portfolio repository. Click Deploy. Do not change any settings \u2014 the defaults are correct.</div>\n          </div>\n        </div>\n        <div class=\"deploy-step\">\n          <div class=\"deploy-num\">5</div>\n          <div class=\"deploy-text\">\n            <div class=\"deploy-title\">Your site is live</div>\n            <div class=\"deploy-desc\">Vercel gives you a URL like yourname.vercel.app. Test it on your phone immediately. Share this URL anywhere. Every time you update index.html in GitHub, Vercel automatically redeploys in 30 seconds.</div>\n          </div>\n        </div>\n        <div class=\"deploy-step\">\n          <div class=\"deploy-num\">6</div>\n          <div class=\"deploy-text\">\n            <div class=\"deploy-title\">Add a custom domain (optional)</div>\n            <div class=\"deploy-desc\">In Vercel, go to your project \u2192 Settings \u2192 Domains. Add yourname.com or whatever domain you own. Vercel handles the SSL certificate automatically. Point your domain's DNS to Vercel following their instructions \u2014 takes about 24 hours to propagate.</div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"callout ca\" style=\"margin-top:28px\">\n        <div class=\"callout-label ea\">For future updates</div>\n        <p>Every change is just: update index.html \u2192 upload to GitHub \u2192 Vercel redeploys automatically. You never need to touch Vercel again after initial setup. That's the whole workflow.</p>\n      </div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- FINAL CHECKLIST -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"reveal-block\">\n      <div class=\"eyebrow ef\">Before You Share</div>\n      <h2 class=\"h2\" style=\"margin-bottom:8px\">The Pre-Launch Checklist</h2>\n      <p class=\"bt\" style=\"margin-bottom:32px\">Run through every item before sending the URL to anyone.</p>\n      <div class=\"card\" id=\"checklistCard\">\n        <div style=\"display:flex;flex-direction:column;gap:0\" id=\"checklist\">\n          <!-- checklist items rendered by JS -->\n        </div>\n        <div style=\"margin-top:24px;padding-top:24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between\">\n          <div style=\"font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);letter-spacing:.06em\"><span id=\"doneCount\">0</span> / 14 complete</div>\n          <div style=\"width:160px;height:4px;border-radius:100px;background:var(--bg3);overflow:hidden\">\n            <div id=\"checkProgress\" style=\"height:100%;background:linear-gradient(90deg,var(--jade),var(--amber));border-radius:100px;width:0%;transition:width .4s var(--ease-out)\"></div>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- WHAT COMES NEXT -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"reveal-block\">\n      <div class=\"eyebrow\">After Launch</div>\n      <h2 class=\"h2\" style=\"margin-bottom:20px\">Where to Take This Further</h2>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px\">\n        <div class=\"csm\">\n          <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--jade);margin-bottom:12px\">Build more pages</div>\n          <p style=\"font-size:13px;color:var(--ink2);line-height:1.7\">Add individual case study pages for each project. Use the same brief framework \u2014 define the aesthetic, techniques, and content before writing to Claude.</p>\n        </div>\n        <div class=\"csm\">\n          <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:12px\">Study real portfolios</div>\n          <p style=\"font-size:13px;color:var(--ink2);line-height:1.7\">Use the 6-step analysis framework from Chapter 7 on portfolios you admire. Learn to reverse-engineer what makes them work. Build a swipe file of portfolio techniques.</p>\n        </div>\n        <div class=\"csm\">\n          <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sapphire);margin-bottom:12px\">Try different aesthetics</div>\n          <p style=\"font-size:13px;color:var(--ink2);line-height:1.7\">Build a second version of your portfolio in a completely different aesthetic. Dark editorial if your first was light minimal. Glassmorphism if your first was brutalist. You learn 10x faster by contrast.</p>\n        </div>\n        <div class=\"csm\">\n          <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fire);margin-bottom:12px\">Build for others</div>\n          <p style=\"font-size:13px;color:var(--ink2);line-height:1.7\">Offer to build a free portfolio for a friend. Client constraints teach you things self-directed projects never will. Constraints are the mother of creative direction.</p>\n        </div>\n      </div>\n      <div class=\"callout\">\n        <div class=\"callout-label\">The creative director's path</div>\n        <p>Creative direction is a muscle. It strengthens through repetition. Every project \u2014 your portfolio, a friend's site, a speculative rebrand \u2014 is a rep. Each one sharpens your taste, your vocabulary, and your ability to translate vision into brief into result. The gap between \"I have taste\" and \"I can execute taste\" closes one project at a time.</p>\n      </div>\n    </div>\n  </div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- CELEBRATION -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"reveal-block celebrate\">\n      <div class=\"confetti-ring r1\"></div>\n      <div class=\"confetti-ring r2\"></div>\n      <div style=\"position:relative;z-index:2\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--jade);margin-bottom:20px\">Course Complete</div>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink);margin-bottom:24px\">\n          You're a designer now.\n        </h2>\n        <p style=\"font-size:clamp(.95rem,1.4vw,1.08rem);color:var(--ink2);line-height:1.8;max-width:560px;margin:0 auto 32px\">\n          You understand visual hierarchy, typography, color theory, layout systems, motion, aesthetics, and the AI workflow that lets you build anything you can imagine. That's the complete toolkit.\n        </p>\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:32px\">\n          <div class=\"csm\" style=\"padding:16px 24px;text-align:center;min-width:100px\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1.8rem;font-weight:800;color:var(--jade)\">12</div>\n            <div style=\"font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4);margin-top:4px\">Chapters</div>\n          </div>\n          <div class=\"csm\" style=\"padding:16px 24px;text-align:center;min-width:100px\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1.8rem;font-weight:800;color:var(--amber)\">40+</div>\n            <div style=\"font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4);margin-top:4px\">Prompts</div>\n          </div>\n          <div class=\"csm\" style=\"padding:16px 24px;text-align:center;min-width:100px\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1.8rem;font-weight:800;color:var(--sapphire)\">6</div>\n            <div style=\"font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4);margin-top:4px\">Builds</div>\n          </div>\n          <div class=\"csm\" style=\"padding:16px 24px;text-align:center;min-width:100px\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1.8rem;font-weight:800;color:var(--fire)\">1</div>\n            <div style=\"font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4);margin-top:4px\">Live Site</div>\n          </div>\n        </div>\n        <a href=\"index.html\" style=\"display:inline-flex;align-items:center;gap:10px;padding:16px 32px;border-radius:100px;background:var(--ink);color:#f6f4f0;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:transform .3s var(--ease-out),box-shadow .3s;box-shadow:var(--sh3)\" onmouseover=\"this.style.transform='translateY(-3px)';this.style.boxShadow='0 24px 48px rgba(0,0,0,.2)'\" onmouseout=\"this.style.transform='';this.style.boxShadow='var(--sh3)'\">\n          Back to course index \u2192\n        </a>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- CHAPTER FOOTER -->\n\n\n<script>\n// Progress bar\nwindow.addEventListener('scroll',()=>{\n  const h=document.documentElement;\n  const pct=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100;\n  document.getElementById('pb').style.width=pct+'%';\n});\n\n// Hero animations\ngsap.registerPlugin(ScrollTrigger);\ngsap.from('#h-ey',{opacity:0,y:20,duration:.7,ease:'power3.out',delay:.3});\ngsap.from('#h-hed',{opacity:0,y:30,duration:.9,ease:'power3.out',delay:.5});\ngsap.from('#h-lead',{opacity:0,y:20,duration:.8,ease:'power3.out',delay:.7});\ngsap.from('#h-chips',{opacity:0,y:20,duration:.8,ease:'power3.out',delay:.85});\n\n// Scroll reveals\ngsap.utils.toArray('.reveal-block').forEach(el=>{\n  gsap.from(el,{opacity:0,y:40,duration:.9,ease:'power3.out',\n    scrollTrigger:{trigger:el,start:'top 85%',toggleActions:'play none none none'}\n  });\n});\n\n// Checklist\nconst items = [\n  {cat:'Content', text:'Your real name is in the hero \u2014 not a placeholder'},\n  {cat:'Content', text:'Your title/role is specific, not generic'},\n  {cat:'Content', text:'The tagline says something memorable'},\n  {cat:'Work', text:'Three real projects shown (or honest placeholders)'},\n  {cat:'Work', text:'Each card has a title, description, and year'},\n  {cat:'Design', text:'Font sizes follow a clear hierarchy'},\n  {cat:'Design', text:'Color system is consistent across all sections'},\n  {cat:'Design', text:'Spacing feels consistent (8pt grid)'},\n  {cat:'Motion', text:'Scroll reveals are subtle, not theatrical'},\n  {cat:'Motion', text:'All animations respect prefers-reduced-motion'},\n  {cat:'Technical', text:'Site loads in under 3 seconds on mobile'},\n  {cat:'Technical', text:'Tested on real iPhone AND Android'},\n  {cat:'Technical', text:'No broken links or placeholder text visible'},\n  {cat:'Technical', text:'Email link in contact section actually works'},\n];\n\nconst catColors = {\n  Content: 'var(--jade)',\n  Work: 'var(--amber)',\n  Design: 'var(--sapphire)',\n  Motion: '#9333ea',\n  Technical: 'var(--fire)',\n};\n\nconst checklistEl = document.getElementById('checklist');\nlet checked = 0;\n\nitems.forEach((item, i) => {\n  const div = document.createElement('div');\n  div.style.cssText = 'display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(0,0,0,.06);cursor:pointer;transition:background .2s;border-radius:var(--r1)';\n  div.innerHTML = `\n    <div id=\"chk-${i}\" style=\"width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);background:var(--glass2);display:flex;align-items:center;justify-content:center;transition:all .25s var(--ease-out);flex-shrink:0\"></div>\n    <div id=\"lbl-${i}\" style=\"font-size:14px;color:var(--ink2);line-height:1.5\">${item.text}</div>\n    <span style=\"font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:${catColors[item.cat]};background:${catColors[item.cat]}18;padding:2px 8px;border-radius:100px;border:1px solid ${catColors[item.cat]}28;white-space:nowrap\">${item.cat}</span>\n  `;\n  div.addEventListener('click', () => {\n    const box = document.getElementById('chk-'+i);\n    const lbl = document.getElementById('lbl-'+i);\n    if(box.dataset.done === '1'){\n      box.dataset.done = '';\n      box.style.background = 'var(--glass2)';\n      box.style.borderColor = 'var(--border)';\n      box.innerHTML = '';\n      lbl.style.opacity = '1';\n      lbl.style.textDecoration = 'none';\n      checked--;\n    } else {\n      box.dataset.done = '1';\n      box.style.background = 'var(--jade)';\n      box.style.borderColor = 'var(--jade)';\n      box.innerHTML = '<svg width=\"12\" height=\"10\" viewBox=\"0 0 12 10\"><path d=\"M1 5l3 3 7-7\" stroke=\"#fff\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>';\n      lbl.style.opacity = '.5';\n      lbl.style.textDecoration = 'line-through';\n      checked++;\n    }\n    document.getElementById('doneCount').textContent = checked;\n    document.getElementById('checkProgress').style.width = (checked/items.length*100)+'%';\n  });\n  checklistEl.appendChild(div);\n});\n<\/script>\n</body>\n</html>\n"</script>

</head>
<body>

<div class="shell" id="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="16" height="14" viewBox="0 0 16 14" fill="none">
          <rect width="6" height="1.6" rx=".8" fill="currentColor"/>
          <rect y="6.2" width="6" height="1.6" rx=".8" fill="currentColor"/>
          <rect y="12.4" width="6" height="1.6" rx=".8" fill="currentColor"/>
          <rect x="9" width="7" height="1.6" rx=".8" fill="currentColor" opacity=".4"/>
          <rect x="9" y="6.2" width="7" height="1.6" rx=".8" fill="currentColor" opacity=".4"/>
          <rect x="9" y="12.4" width="7" height="1.6" rx=".8" fill="currentColor" opacity=".4"/>
        </svg>
      </button>
      <span class="topbar-ch" id="topCh">Ch 01</span>
      <div class="topbar-sep"></div>
      <span class="topbar-title" id="topTitle">How the Web Works</span>
    </div>
    <div class="topbar-right">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Prev</button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next →</button>
    </div>
  </header>

  <!-- READ BAR -->
  <div class="read-bar"><div class="read-fill" id="readFill"></div></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Design Mastery</div>
      <div class="sidebar-sub">Zero → Awwwards · 12 Chapters</div>
    </div>
    <nav class="sidebar-nav">
      <button class="ch-btn" onclick="loadChapter(0)">
        <span class="ch-num">Ch 01</span>
        <span class="ch-title">How the Web Works</span>
      </button>
      <button class="ch-btn" onclick="loadChapter(1)">
        <span class="ch-num">Ch 02</span>
        <span class="ch-title">Laws of Visual Design</span>
      </button>
      <button class="ch-btn" onclick="loadChapter(2)">
        <span class="ch-num">Ch 03</span>
        <span class="ch-title">Typography</span>
      </button>
      <button class="ch-btn" onclick="loadChapter(3)">
        <span class="ch-num">Ch 04</span>
        <span class="ch-title">Color Theory</span>
      </button>
      <button class="ch-btn" onclick="loadChapter(4)">
        <span class="ch-num">Ch 05</span>
        <span class="ch-title">Layout & Composition</span>
      </button>
      <button class="ch-btn" onclick="loadChapter(5)">
        <span class="ch-num">Ch 06</span>
        <span class="ch-title">Motion & Animation</span>
      </button>
      <button class="ch-btn" onclick="loadChapter(6)">
        <span class="ch-num">Ch 07</span>
        <span class="ch-title">Reading Sites</span>
      </button>
      <button class="ch-btn" onclick="loadChapter(7)">
        <span class="ch-num">Ch 08</span>
        <span class="ch-title">Figma Workflow</span>
      </button>
      <button class="ch-btn" onclick="loadChapter(8)">
        <span class="ch-num">Ch 09</span>
        <span class="ch-title">AI Build Workflow</span>
      </button>
      <button class="ch-btn" onclick="loadChapter(9)">
        <span class="ch-num">Ch 10</span>
        <span class="ch-title">Aesthetic Systems</span>
      </button>
      <button class="ch-btn" onclick="loadChapter(10)">
        <span class="ch-num">Ch 11</span>
        <span class="ch-title">Awwwards Techniques</span>
      </button>
      <button class="ch-btn" onclick="loadChapter(11)">
        <span class="ch-num">Ch 12</span>
        <span class="ch-title">Build Your Portfolio</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="prog-row">
        <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
        <div class="prog-label" id="progLabel">1 / 12</div>
      </div>
    </div>
  </aside>

  <!-- CONTENT -->
  <div class="content-area">
    <div class="loader" id="loader">
      <div class="loader-dot"></div>
      <div class="loader-txt">Loading chapter</div>
    </div>
    <iframe class="ch-frame" id="chFrame" title="Chapter content"></iframe>
  </div>

</div>

<!-- MOBILE: Bottom nav -->
<nav class="bottom-nav" id="bottomNav">
  <button class="bottom-nav-btn" id="mobPrev" onclick="navigate(-1)" disabled>
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <div class="bottom-nav-ch">
    <div class="bottom-nav-label" id="mobChLabel">Ch 01 · 1 of 12</div>
    <div class="bottom-nav-title" id="mobChTitle">How the Web Works</div>
  </div>
  <button class="bottom-nav-chapters" id="sheetBtn" onclick="toggleSheet()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <rect x="1" y="1" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
      <rect x="8" y="1" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
      <rect x="1" y="8" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
      <rect x="8" y="8" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
    </svg>
  </button>
  <button class="bottom-nav-btn" id="mobNext" onclick="navigate(1)">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</nav>

<!-- MOBILE: Chapter sheet -->
<div class="ch-sheet-mask" id="sheetMask" onclick="toggleSheet()"></div>
<div class="ch-sheet" id="chSheet">
  <div class="ch-sheet-handle"></div>
  <div class="ch-sheet-header">
    <span class="ch-sheet-title">All Chapters</span>
    <button class="ch-sheet-close" onclick="toggleSheet()">✕</button>
  </div>
  <nav class="ch-sheet-nav" id="sheetNav"></nav>
</div>

<script>
const NUMS   = ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12"];
const TITLES = ["How the Web Works", "Laws of Visual Design", "Typography", "Color Theory", "Layout & Composition", "Motion & Animation", "Reading Sites", "Figma Workflow", "AI Build Workflow", "Aesthetic Systems", "Awwwards Techniques", "Build Your Portfolio"];
let current  = 0;
let blobUrl  = null;
let sidebarCollapsed = false;

// Populate mobile sheet nav (clone of sidebar items)
(function() {
  const nav = document.getElementById('sheetNav');
  NUMS.forEach((num, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn';
    btn.id = 'sheet-btn-' + i;
    btn.innerHTML = '<span class="ch-num">Ch ' + num + '</span><span class="ch-title">' + TITLES[i] + '</span>';
    btn.onclick = () => { loadChapter(i); toggleSheet(); };
    nav.appendChild(btn);
  });
})();

function getChHTML(idx) {
  return JSON.parse(document.getElementById('ch-data-' + idx).textContent);
}

function loadChapter(idx) {
  current = idx;
  const loader = document.getElementById('loader');
  const frame  = document.getElementById('chFrame');
  loader.classList.remove('gone');
  frame.classList.remove('vis');

  if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }

  const html = getChHTML(idx);
  const blob = new Blob([html], {type: 'text/html; charset=utf-8'});
  blobUrl = URL.createObjectURL(blob);
  frame.src = blobUrl;

  // Update sidebar + sheet active states
  document.querySelectorAll('.ch-btn').forEach((b, i) => b.classList.toggle('active', i === idx));

  // Topbar
  document.getElementById('topCh').textContent    = 'Ch ' + NUMS[idx];
  document.getElementById('topTitle').textContent  = TITLES[idx];

  // Mobile bottom nav
  document.getElementById('mobChLabel').textContent  = 'Ch ' + NUMS[idx] + ' · ' + (idx+1) + ' of 12';
  document.getElementById('mobChTitle').textContent  = TITLES[idx];

  // Progress
  document.getElementById('progFill').style.width  = Math.round((idx+1)/12*100) + '%';
  document.getElementById('progLabel').textContent = (idx+1) + ' / 12';

  // Nav buttons — desktop
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === 11;
  // Mobile
  document.getElementById('mobPrev').disabled = idx === 0;
  document.getElementById('mobNext').disabled = idx === 11;

  // Reset read bar
  document.getElementById('readFill').style.width = '0%';
}

function navigate(dir) {
  const n = current + dir;
  if (n >= 0 && n < 12) loadChapter(n);
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('shell').classList.toggle('collapsed', sidebarCollapsed);
}

function toggleSheet() {
  const sheet = document.getElementById('chSheet');
  const mask  = document.getElementById('sheetMask');
  const btn   = document.getElementById('sheetBtn');
  const open  = sheet.classList.toggle('open');
  mask.classList.toggle('open', open);
  btn.classList.toggle('active-sheet', open);
}

// iframe load
document.getElementById('chFrame').addEventListener('load', function() {
  document.getElementById('loader').classList.add('gone');
  this.classList.add('vis');
  try {
    const win = this.contentWindow;
    const doc = this.contentDocument || win.document;
    const el  = doc.scrollingElement || doc.documentElement;
    win.addEventListener('scroll', function() {
      const pct = el.scrollTop / (el.scrollHeight - el.clientHeight) * 100;
      document.getElementById('readFill').style.width = Math.min(pct, 100) + '%';
    }, {passive: true});
  } catch(e) {}
});

loadChapter(0);
</script>
</body>
</html>
