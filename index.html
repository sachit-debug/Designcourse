<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Mastery — Complete Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f4f0;--bg2:#edeae4;--bg3:#e4e0d8;
  --border:rgba(0,0,0,.09);--border-solid:#dedad4;
  --ink:#100f0d;--ink2:#45433f;--ink3:#8c8880;--ink4:#b5b2ac;
  --fire:#e8500a;--amber:#d4880a;--sapphire:#2e6fd4;--jade:#1f7a5c;
  --glass:rgba(246,244,240,.94);
  --r1:8px;--r2:14px;
  --ease:cubic-bezier(0.16,1,0.3,1);
  --sidebar-w:272px;
  --topbar-h:48px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink)}
*{scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.1) transparent}
*::-webkit-scrollbar{width:4px}
*::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:100px}

/* ─── LAYOUT SHELL ─── */
.shell{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  grid-template-rows:var(--topbar-h) 2px 1fr;
  width:100vw;height:100vh;overflow:hidden;
  transition:grid-template-columns .3s var(--ease);
}
.shell.collapsed{
  grid-template-columns:0px 1fr;
}

/* ─── TOPBAR ─── */
.topbar{
  grid-column:1/-1;grid-row:1;
  background:var(--glass);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px 0 12px;
  position:relative;z-index:50;
}
.topbar-left{display:flex;align-items:center;gap:0}
/* Toggle button inside topbar */
.toggle-btn{
  width:32px;height:32px;border-radius:var(--r1);
  border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--ink3);transition:background .18s,color .18s;
  flex-shrink:0;margin-right:10px;
}
.toggle-btn:hover{background:rgba(0,0,0,.05);color:var(--ink)}
.toggle-btn svg{transition:transform .3s var(--ease)}
.shell.collapsed .toggle-btn svg{transform:scaleX(-1)}
.topbar-ch{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);
  white-space:nowrap;
}
.topbar-sep{width:1px;height:13px;background:var(--border);margin:0 10px;flex-shrink:0}
.topbar-title{
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:.88rem;font-weight:700;letter-spacing:-.02em;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:12px}
.nav-btn{
  padding:5px 13px;border-radius:100px;
  border:1px solid var(--border);background:rgba(255,255,255,.5);
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;color:var(--ink2);
  white-space:nowrap;transition:all .18s var(--ease);
}
.nav-btn:hover:not(:disabled){background:var(--ink);color:#fff;border-color:transparent}
.nav-btn:disabled{opacity:.22;cursor:not-allowed}

/* ─── READ PROGRESS ─── */
.read-bar{
  grid-column:1/-1;grid-row:2;
  background:var(--bg3);position:relative;z-index:49;
}
.read-fill{
  position:absolute;left:0;top:0;bottom:0;width:0%;
  background:linear-gradient(90deg,var(--sapphire),var(--jade));
  transition:width .08s linear;
}

/* ─── SIDEBAR ─── */
.sidebar{
  grid-column:1;grid-row:3;
  display:flex;flex-direction:column;overflow:hidden;
  background:var(--glass);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-right:1px solid var(--border);
  transition:opacity .25s var(--ease);
}
.shell.collapsed .sidebar{
  opacity:0;pointer-events:none;
}
.sidebar-header{
  padding:16px 14px 12px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.sidebar-logo{
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:.9rem;font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:1px;
}
.sidebar-sub{
  font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ink4);
}
.sidebar-nav{
  flex:1;overflow-y:auto;padding:6px;
  display:flex;flex-direction:column;gap:1px;
}
.ch-btn{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border:none;background:transparent;cursor:pointer;
  border-radius:var(--r1);transition:all .16s var(--ease);
  text-align:left;width:100%;
}
.ch-btn:hover{background:rgba(255,255,255,.85)}
.ch-btn.active{background:var(--ink)}
.ch-btn.active .ch-num{color:rgba(255,255,255,.28)}
.ch-btn.active .ch-title{color:#f6f4f0}
.ch-num{
  font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink4);flex-shrink:0;width:30px;
}
.ch-title{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:11.5px;
  font-weight:500;color:var(--ink2);line-height:1.3;text-align:left;
}
.sidebar-footer{
  padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;
}
.prog-row{display:flex;align-items:center;gap:8px}
.prog-track{flex:1;height:2px;background:var(--bg3);border-radius:100px;overflow:hidden}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--fire),var(--amber));
  border-radius:100px;transition:width .4s var(--ease);width:8.33%;
}
.prog-label{font-family:'DM Mono',monospace;font-size:7.5px;color:var(--ink4);flex-shrink:0}

/* ─── CONTENT ─── */
.content-area{
  grid-column:2;grid-row:3;
  overflow:hidden;position:relative;
}
.ch-frame{
  width:100%;height:100%;border:none;display:block;
  opacity:0;transition:opacity .28s var(--ease);
}
.ch-frame.vis{opacity:1}
.loader{
  position:absolute;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;
  transition:opacity .2s;pointer-events:none;
}
.loader.gone{opacity:0}
.loader-dot{
  width:7px;height:7px;border-radius:50%;background:var(--fire);
  animation:ldot .7s ease-in-out infinite;
}
@keyframes ldot{0%,100%{transform:scale(.5);opacity:.3}50%{transform:scale(1.3);opacity:1}}
.loader-txt{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink4);
}

/* ─── BOTTOM NAV (mobile) ─── */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--glass);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding:8px 12px calc(8px + env(safe-area-inset-bottom));
  gap:8px;align-items:center;
}
.bottom-nav-ch{
  flex:1;
  display:flex;flex-direction:column;gap:2px;
}
.bottom-nav-label{
  font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ink4);
}
.bottom-nav-title{
  font-family:'Bricolage Grotesque',sans-serif;font-size:.78rem;
  font-weight:700;letter-spacing:-.02em;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.bottom-nav-btn{
  width:38px;height:38px;border-radius:50%;
  border:1px solid var(--border);background:rgba(255,255,255,.6);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--ink2);transition:all .18s var(--ease);flex-shrink:0;
}
.bottom-nav-btn:hover:not(:disabled){background:var(--ink);color:#fff;border-color:transparent}
.bottom-nav-btn:disabled{opacity:.22;cursor:not-allowed}
.bottom-nav-chapters{
  width:38px;height:38px;border-radius:50%;
  border:1px solid var(--border);background:rgba(255,255,255,.6);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--ink2);transition:all .18s var(--ease);flex-shrink:0;
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.06em;
}
.bottom-nav-chapters.active-sheet{background:var(--ink);color:#fff;border-color:transparent}

/* ─── CHAPTER SHEET (mobile slide-up) ─── */
.ch-sheet{
  display:none;position:fixed;left:0;right:0;bottom:0;z-index:400;
  background:var(--bg);
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);
  transform:translateY(100%);
  transition:transform .35s var(--ease);
  max-height:75vh;overflow:hidden;
  flex-direction:column;
}
.ch-sheet.open{transform:translateY(0)}
.ch-sheet-handle{
  width:36px;height:4px;border-radius:100px;
  background:rgba(0,0,0,.12);
  margin:12px auto 0;flex-shrink:0;
}
.ch-sheet-header{
  padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.ch-sheet-title{
  font-family:'Bricolage Grotesque',sans-serif;font-size:.9rem;
  font-weight:800;letter-spacing:-.02em;color:var(--ink);
}
.ch-sheet-close{
  width:28px;height:28px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--ink3);
}
.ch-sheet-nav{
  flex:1;overflow-y:auto;padding:8px;
  display:flex;flex-direction:column;gap:1px;
}
.ch-sheet-mask{
  display:none;position:fixed;inset:0;z-index:399;
  background:rgba(0,0,0,.25);backdrop-filter:blur(2px);
}
.ch-sheet-mask.open{display:block}

/* ─── MOBILE BREAKPOINT ─── */
@media(max-width:768px){
  :root{--sidebar-w:0px;--topbar-h:44px}
  
  /* Force sidebar hidden on mobile — use sheet instead */
  .shell{grid-template-columns:0px 1fr!important}
  .sidebar{opacity:0!important;pointer-events:none!important}
  .toggle-btn{display:none}
  .topbar-title{max-width:160px}
  
  /* Show bottom nav */
  .bottom-nav{display:flex}
  .ch-sheet{display:flex}
  
  /* Content area needs bottom padding for bottom nav */
  .content-area{padding-bottom:calc(58px + env(safe-area-inset-bottom))}
  
  /* Hide desktop prev/next in topbar */
  .topbar-right{display:none}
}
</style>

ercase;color:var(--fire);font-weight:500}\n.nav-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:var(--ink2)}\n.wrap{max-width:900px;margin:0 auto;padding:0 32px}\n.wrap-wide{max-width:1100px;margin:0 auto;padding:0 32px}\nsection{position:relative;z-index:10;padding:100px 0}\nsection.hero-sec{min-height:100vh;display:flex;align-items:center;padding:80px 0}\n.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);position:relative;z-index:10}\n/* TYPOGRAPHY */\n.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fire);display:flex;align-items:center;gap:12px;margin-bottom:18px}\n.eyebrow::before{content:'';width:28px;height:1px;background:var(--fire);flex-shrink:0}\n.display{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink)}\n.display em{font-style:normal;background:linear-gradient(135deg,var(--fire),var(--amber2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.035em;line-height:1.1;color:var(--ink)}\n.h3{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.1rem,2vw,1.5rem);font-weight:700;letter-spacing:-.025em;line-height:1.2;color:var(--ink)}\n.lead{font-size:clamp(1rem,1.5vw,1.12rem);color:var(--ink2);line-height:1.8}\n.body-text{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:20px}\n.body-text:last-child{margin-bottom:0}\n/* CARDS */\n.card{background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh3);padding:52px;position:relative;overflow:hidden}\n.card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.card-sm{background:var(--glass2);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);padding:32px;position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s var(--ease-out),background .3s}\n.card-sm::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.55) 0%,transparent 50%);pointer-events:none;border-radius:inherit}\n.card-sm:hover{transform:translateY(-6px);box-shadow:var(--sh3);background:var(--glass)}\n/* CALLOUTS */\n.callout{padding:24px 28px;border-radius:var(--r2);border-left:3px solid var(--fire);background:rgba(232,80,10,.04);margin:28px 0}\n.callout-blue{border-color:var(--sapphire);background:rgba(46,111,212,.04)}\n.callout-amber{border-color:var(--amber);background:rgba(212,136,10,.04)}\n.callout-jade{border-color:var(--jade);background:rgba(31,122,92,.04)}\n.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fire);margin-bottom:10px}\n.callout-blue .callout-label{color:var(--sapphire)}\n.callout-amber .callout-label{color:var(--amber)}\n.callout-jade .callout-label{color:var(--jade)}\n.callout p{font-size:14px;color:var(--ink2);line-height:1.75}\n/* CODE */\n.code-block{background:var(--ink);border-radius:var(--r2);padding:24px 28px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.9;color:#d4d0c8;overflow-x:auto;position:relative;margin:20px 0}\n.code-block .kw{color:#f0a050}.code-block .str{color:#7dd3a8}.code-block .cm{color:rgba(255,255,255,.28);font-style:italic}.code-block .sel{color:#93c5fd}.code-block .val{color:#f9a8d4}.code-block .tag{color:#f0a050}.code-block .attr{color:#93c5fd}.code-block .prop{color:#c4b5fd}\n.code-label{position:absolute;top:12px;right:16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.2)}\n/* LAYER VISUAL */\n.layer-stack{display:flex;flex-direction:column;gap:12px;margin:40px 0}\n.layer{padding:24px 32px;border-radius:var(--r2);display:grid;grid-template-columns:56px 1fr auto;gap:20px;align-items:center;transition:all .35s var(--ease-out);cursor:default;position:relative;overflow:hidden}\n.layer:hover{transform:translateX(6px)}\n.layer-html{background:linear-gradient(135deg,rgba(232,80,10,.1),rgba(255,255,255,.5));border:1px solid rgba(232,80,10,.15)}\n.layer-css {background:linear-gradient(135deg,rgba(46,111,212,.1),rgba(255,255,255,.5));border:1px solid rgba(46,111,212,.15)}\n.layer-js  {background:linear-gradient(135deg,rgba(212,136,10,.1),rgba(255,255,255,.5));border:1px solid rgba(212,136,10,.15)}\n.layer-icon{font-size:28px;display:flex;align-items:center;justify-content:center}\n.layer-title{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.025em;color:var(--ink);margin-bottom:4px}\n.layer-desc{font-size:13px;color:var(--ink2);line-height:1.6}\n.layer-tag-wrap{text-align:right}\n.layer-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:100px;display:inline-block}\n.layer-html .layer-tag{background:rgba(232,80,10,.1);color:var(--fire)}\n.layer-css  .layer-tag{background:rgba(46,111,212,.1);color:var(--sapphire)}\n.layer-js   .layer-tag{background:rgba(212,136,10,.1);color:var(--amber)}\n/* BROWSER VISUAL */\n.browser-mock{background:var(--ink);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh4);margin:32px 0}\n.browser-bar{background:rgba(255,255,255,.06);padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}\n.browser-dots{display:flex;gap:6px}\n.browser-dot{width:10px;height:10px;border-radius:50%}\n.bd-red{background:#ff5f57}.bd-yellow{background:#febc2e}.bd-green{background:#28c840}\n.browser-url{flex:1;background:rgba(255,255,255,.06);border-radius:6px;padding:5px 14px;font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);margin-left:10px}\n.browser-body{padding:28px;min-height:200px}\n.browser-html{padding:20px;background:rgba(255,255,255,.03);border-radius:var(--r1)}\n.browser-html .ht{color:#f0a050;font-family:'DM Mono',monospace;font-size:12px;line-height:2}\n.browser-html .hv{color:#7dd3a8;font-family:'DM Mono',monospace;font-size:12px}\n.browser-html .hc{color:rgba(255,255,255,.3);font-family:'DM Mono',monospace;font-size:12px}\n/* GRID FOR CONTENT */\n.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:32px 0}\n.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:32px 0}\n/* NUMBERED LIST */\n.num-list{display:flex;flex-direction:column;gap:16px;margin:28px 0}\n.num-item{display:grid;grid-template-columns:44px 1fr;gap:16px;align-items:start;padding:20px 24px;background:var(--glass2);backdrop-filter:blur(12px);border:1px solid var(--border2);border-radius:var(--r2);transition:all .3s var(--ease-io);position:relative;overflow:hidden}\n.num-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fire);transform:scaleY(0);transform-origin:bottom;transition:transform .35s var(--ease-out)}\n.num-item:hover::before{transform:scaleY(1)}\n.num-item:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateX(4px)}\n.num{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:rgba(232,80,10,.3);padding-top:2px;transition:color .3s}\n.num-item:hover .num{color:var(--fire)}\n.num-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-bottom:6px}\n.num-desc{font-size:13px;color:var(--ink2);line-height:1.7}\n/* EXERCISE */\n.exercise{background:linear-gradient(135deg,rgba(31,122,92,.07),rgba(255,255,255,.4));border:1px solid rgba(31,122,92,.2);border-radius:var(--r3);padding:48px;position:relative;overflow:hidden;margin:48px 0}\n.exercise::before{content:'EXERCISE';position:absolute;top:24px;right:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(31,122,92,.4)}\n.ex-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}\n.ex-desc{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:28px}\n.ex-steps{display:flex;flex-direction:column;gap:12px}\n.ex-step{display:grid;grid-template-columns:32px 1fr;gap:14px;align-items:start;padding:16px 20px;background:rgba(255,255,255,.5);border-radius:var(--r2);border:1px solid rgba(31,122,92,.1)}\n.ex-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--jade);font-weight:500}\n.ex-text{font-size:14px;color:var(--ink2);line-height:1.65}\n.ex-text strong{color:var(--ink)}\n/* CHAPTER FOOTER */\n.ch-footer{position:relative;z-index:10;padding:60px 0 80px;border-top:1px solid var(--border)}\n.ch-footer-inner{max-width:900px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}\n.ch-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .35s var(--ease-out);text-decoration:none;color:inherit}\n.ch-btn:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateY(-3px)}\n.ch-btn-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}\n.ch-btn-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}\n.ch-btn.next{flex-direction:row-reverse;text-align:right}\n.ch-btn-arr{font-size:20px;color:var(--ink3);transition:transform .3s}\n.ch-btn.prev:hover .ch-btn-arr{transform:translateX(-4px)}\n.ch-btn.next:hover .ch-btn-arr{transform:translateX(4px)}\n.ch-center{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink4);text-align:center}\n.ch-center a{color:var(--fire)}\n/* ANIMATIONS */\n.reveal{opacity:0;transform:translateY(40px)}\n@media(max-width:768px){.two-col,.three-col{grid-template-columns:1fr}.card{padding:32px 24px}.ch-footer-inner{flex-direction:column}}\n@media(max-width:480px){nav{display:none}}\n</style>\n</head>\n<body>\n\n<div class=\"orb o1\"></div><div class=\"orb o2\"></div>\n\n\n\n<!-- HERO -->\n<section class=\"hero-sec\">\n<div class=\"wrap\">\n  <div style=\"opacity:0;animation:fU .7s cubic-bezier(0.16,1,0.3,1) .5s forwards\">\n    <p class=\"eyebrow\">Chapter 01 \u2014 Foundation</p>\n  </div>\n  <h1 class=\"display\" style=\"opacity:0;animation:fU .9s cubic-bezier(0.16,1,0.3,1) .65s forwards;margin-bottom:28px\">How the<br>web <em>actually</em><br>works.</h1>\n  <p class=\"lead\" style=\"opacity:0;animation:fU .9s cubic-bezier(0.16,1,0.3,1) .8s forwards;max-width:580px;margin-bottom:40px\">Before you design anything, you need to understand what you're designing. This chapter builds the mental model that makes everything else make sense.</p>\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fU .7s cubic-bezier(0.16,1,0.3,1) .95s forwards\">\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:var(--glass2);border:1px solid var(--border2);border-radius:100px;color:var(--ink3)\">~25 min read</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(31,122,92,.08);border:1px solid rgba(31,122,92,.18);border-radius:100px;color:var(--jade)\">1 exercise</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(232,80,10,.08);border:1px solid rgba(232,80,10,.18);border-radius:100px;color:var(--fire)\">Foundation</span>\n  </div>\n</div>\n</section>\n<style>@keyframes fU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}</style>\n\n<div class=\"divider\"></div>\n\n<!-- SECTION: THE BIG PICTURE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">The Big Picture</p>\n    <h2 class=\"h2\" style=\"margin-bottom:24px\">Every website ever built is the same three files.</h2>\n    <p class=\"body-text\">Doesn't matter if it's Google, Apple, or your Swiggy dashboard \u2014 every single website is just three types of files talking to each other. HTML tells the browser what exists. CSS tells it what it looks like. JavaScript tells it what it does when you interact with it.</p>\n    <p class=\"body-text\">That's it. That's the whole secret. The complexity you see on great sites isn't because they have more tools \u2014 it's because they've mastered those three layers to an extraordinary degree.</p>\n\n    <div class=\"layer-stack\">\n      <div class=\"layer layer-html reveal\">\n        <div class=\"layer-icon\">\ud83c\udfd7\ufe0f</div>\n        <div>\n          <div class=\"layer-title\">HTML \u2014 The Skeleton</div>\n          <div class=\"layer-desc\">HyperText Markup Language. Raw structure and content. Headings, paragraphs, buttons, images, links. If you stripped all design from any site, this is what remains. Ugly, but load-bearing.</div>\n        </div>\n        <div class=\"layer-tag-wrap\"><span class=\"layer-tag\">Structure</span></div>\n      </div>\n      <div class=\"layer layer-css reveal\">\n        <div class=\"layer-icon\">\ud83c\udfa8</div>\n        <div>\n          <div class=\"layer-title\">CSS \u2014 The Skin &amp; Personality</div>\n          <div class=\"layer-desc\">Cascading Style Sheets. Every single visual decision \u2014 colors, fonts, spacing, shadows, animations, layout \u2014 lives here. This is the design layer. The gap between a bad site and an Awwwards winner is almost entirely CSS.</div>\n        </div>\n        <div class=\"layer-tag-wrap\"><span class=\"layer-tag\">Visuals</span></div>\n      </div>\n      <div class=\"layer layer-js reveal\">\n        <div class=\"layer-icon\">\u26a1</div>\n        <div>\n          <div class=\"layer-title\">JavaScript \u2014 The Behaviour</div>\n          <div class=\"layer-desc\">Interactivity and logic. When you click a button and something happens, JavaScript did it. Scroll animations, form submissions, live data updates, menus opening \u2014 all JavaScript. Without it, sites are static brochures.</div>\n        </div>\n        <div class=\"layer-tag-wrap\"><span class=\"layer-tag\">Behaviour</span></div>\n      </div>\n    </div>\n\n    <div class=\"callout-jade callout\">\n      <p class=\"callout-label\">The Design Insight</p>\n      <p>As a non-coder using AI, you'll never write HTML or JavaScript. But you need to understand what each layer is so you can describe what you want precisely. When you tell Claude \"I want a glowing animation when I hover the button\" \u2014 that's CSS. When you say \"I want the number to count up when I scroll to it\" \u2014 that's JavaScript. Knowing the difference makes your prompts 10x better.</p>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"divider\"></div>\n\n<!-- SECTION: WHAT HAPPENS WHEN YOU VISIT A WEBSITE -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">Behind the Scenes</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">What happens in the 200ms between you typing a URL and seeing a page.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:48px\">This sounds technical. It's not. It's just a delivery system \u2014 and understanding it changes how you think about design performance.</p>\n\n  <div class=\"num-list\">\n    <div class=\"num-item reveal\">\n      <div class=\"num\">01</div>\n      <div>\n        <div class=\"num-title\">You type a URL \u2014 like sachit.vercel.app</div>\n        <div class=\"num-desc\">A URL is just a human-readable address. Under the hood it maps to a number called an IP address \u2014 think of it like a physical street address for a computer somewhere in the world.</div>\n      </div>\n    </div>\n    <div class=\"num-item reveal\">\n      <div class=\"num\">02</div>\n      <div>\n        <div class=\"num-title\">Your browser asks a DNS server \"where is this?\"</div>\n        <div class=\"num-desc\">DNS (Domain Name System) is the internet's phone book. It converts \"sachit.vercel.app\" into an IP address like 76.76.21.21. This happens in milliseconds, invisibly.</div>\n      </div>\n    </div>\n    <div class=\"num-item reveal\">\n      <div class=\"num\">03</div>\n      <div>\n        <div class=\"num-title\">A server sends your browser the files</div>\n        <div class=\"num-desc\">Vercel's server receives the request and sends back the HTML, CSS, and JavaScript files. These travel over the internet as data packets \u2014 millions of tiny pieces that reassemble in your browser.</div>\n      </div>\n    </div>\n    <div class=\"num-item reveal\">\n      <div class=\"num\">04</div>\n      <div>\n        <div class=\"num-title\">Your browser parses and renders</div>\n        <div class=\"num-desc\">The browser reads the HTML top to bottom, builds a visual model of the page (called the DOM), applies the CSS styles, runs the JavaScript, and paints the final result on your screen. This is called rendering.</div>\n      </div>\n    </div>\n    <div class=\"num-item reveal\">\n      <div class=\"num\">05</div>\n      <div>\n        <div class=\"num-title\">You see the page</div>\n        <div class=\"num-desc\">Everything above happens in under half a second on a good connection. Fast pages feel premium. Slow pages feel broken, regardless of how beautiful they look \u2014 performance is a design decision.</div>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"callout reveal\">\n    <p class=\"callout-label\">Why This Matters for Design</p>\n    <p>Every image, font, and animation you add to a page is a file the browser has to download. Heavy pages load slowly. This is why premium sites often look clean and minimal \u2014 it's not just aesthetic, it's also performance. When Claude builds your sites, single-file HTML is fast because the browser only needs to fetch one thing.</p>\n  </div>\n</div>\n</section>\n\n<div class=\"divider\"></div>\n\n<!-- SECTION: HTML IN DEPTH -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">Layer 1 \u2014 HTML</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">HTML is not scary. It's just labelled boxes.</h2>\n    <p class=\"body-text\">HTML uses \"tags\" \u2014 labels wrapped in angle brackets \u2014 to define what each piece of content is. A heading is a heading. A paragraph is a paragraph. A button is a button. The browser reads these labels and knows how to present them.</p>\n\n    <div class=\"browser-mock reveal\">\n      <div class=\"browser-bar\">\n        <div class=\"browser-dots\"><div class=\"browser-dot bd-red\"></div><div class=\"browser-dot bd-yellow\"></div><div class=\"browser-dot bd-green\"></div></div>\n        <div class=\"browser-url\">index.html</div>\n      </div>\n      <div class=\"browser-body\">\n        <div class=\"code-block\" style=\"margin:0\">\n          <span class=\"cm\">&lt;!-- This is what a basic HTML page looks like --&gt;</span><br>\n          <span class=\"kw\">&lt;h1&gt;</span><span class=\"str\">This is a big heading</span><span class=\"kw\">&lt;/h1&gt;</span><br>\n          <span class=\"kw\">&lt;p&gt;</span><span class=\"str\">This is a paragraph of text that explains things.</span><span class=\"kw\">&lt;/p&gt;</span><br>\n          <span class=\"kw\">&lt;button&gt;</span><span class=\"str\">Click me</span><span class=\"kw\">&lt;/button&gt;</span><br>\n          <span class=\"kw\">&lt;img</span> <span class=\"attr\">src</span>=<span class=\"str\">\"photo.jpg\"</span> <span class=\"attr\">alt</span>=<span class=\"str\">\"A photo\"</span><span class=\"kw\">&gt;</span><br>\n          <span class=\"kw\">&lt;a</span> <span class=\"attr\">href</span>=<span class=\"str\">\"https://sachit.vercel.app\"</span><span class=\"kw\">&gt;</span><span class=\"str\">Visit my site</span><span class=\"kw\">&lt;/a&gt;</span>\n        </div>\n      </div>\n    </div>\n\n    <p class=\"body-text\">Every tag has an opening <code style=\"background:var(--bg2);padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px\">&lt;tag&gt;</code> and a closing <code style=\"background:var(--bg2);padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px\">&lt;/tag&gt;</code>. Content lives between them. That's the whole syntax. You never need to write this yourself \u2014 but understanding it means when Claude shows you the code, you can read it.</p>\n\n    <div class=\"two-col\" style=\"margin-top:32px\">\n      <div class=\"card-sm\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fire);margin-bottom:12px\">Common HTML Tags</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:2\">\n          <code style=\"background:var(--bg2);padding:1px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px\">&lt;h1&gt; - &lt;h6&gt;</code> \u2014 Headings (h1 is biggest)<br>\n          <code style=\"background:var(--bg2);padding:1px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px\">&lt;p&gt;</code> \u2014 Paragraph<br>\n          <code style=\"background:var(--bg2);padding:1px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px\">&lt;div&gt;</code> \u2014 Container box<br>\n          <code style=\"background:var(--bg2);padding:1px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px\">&lt;button&gt;</code> \u2014 Clickable button<br>\n          <code style=\"background:var(--bg2);padding:1px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px\">&lt;img&gt;</code> \u2014 Image<br>\n          <code style=\"background:var(--bg2);padding:1px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px\">&lt;a&gt;</code> \u2014 Link<br>\n          <code style=\"background:var(--bg2);padding:1px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px\">&lt;nav&gt;</code> \u2014 Navigation area<br>\n          <code style=\"background:var(--bg2);padding:1px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px\">&lt;section&gt;</code> \u2014 Page section\n        </div>\n      </div>\n      <div class=\"card-sm\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sapphire);margin-bottom:12px\">What HTML Does NOT Control</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:2\">\n          \u2717 Colors<br>\n          \u2717 Fonts<br>\n          \u2717 Spacing<br>\n          \u2717 Shadows<br>\n          \u2717 Animations<br>\n          \u2717 Layout (columns, grids)<br>\n          \u2717 Rounded corners<br>\n          \u2717 Any visual decision\n        </div>\n        <div style=\"font-size:12px;color:var(--ink3);margin-top:14px;font-style:italic\">Those all belong to CSS.</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"divider\"></div>\n\n<!-- SECTION: CSS IN DEPTH -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">Layer 2 \u2014 CSS</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">CSS is where design lives. Every visual decision in every site you've ever loved is CSS.</h2>\n    <p class=\"body-text\">CSS works by targeting HTML elements and applying rules to them. \"The h1 heading should be this font, this size, this color.\" \"The button should have these rounded corners, this background, and this animation when hovered.\" Simple concept \u2014 infinite power in skilled hands.</p>\n\n    <div class=\"browser-mock reveal\">\n      <div class=\"browser-bar\">\n        <div class=\"browser-dots\"><div class=\"browser-dot bd-red\"></div><div class=\"browser-dot bd-yellow\"></div><div class=\"browser-dot bd-green\"></div></div>\n        <div class=\"browser-url\">styles.css (or inside your HTML's &lt;style&gt; tag)</div>\n      </div>\n      <div class=\"browser-body\">\n        <div class=\"code-block\" style=\"margin:0\">\n          <span class=\"cm\">/* Target the h1 element */</span><br>\n          <span class=\"sel\">h1</span> {<br>\n          &nbsp;&nbsp;<span class=\"prop\">font-family</span>: <span class=\"str\">'Bricolage Grotesque', sans-serif</span>;<br>\n          &nbsp;&nbsp;<span class=\"prop\">font-size</span>: <span class=\"val\">72px</span>;<br>\n          &nbsp;&nbsp;<span class=\"prop\">color</span>: <span class=\"val\">#100f0d</span>;<br>\n          &nbsp;&nbsp;<span class=\"prop\">letter-spacing</span>: <span class=\"val\">-0.04em</span>; <span class=\"cm\">/* That premium tight tracking */</span><br>\n          }<br><br>\n          <span class=\"cm\">/* Target all buttons */</span><br>\n          <span class=\"sel\">button</span> {<br>\n          &nbsp;&nbsp;<span class=\"prop\">background</span>: <span class=\"val\">#e8500a</span>;<br>\n          &nbsp;&nbsp;<span class=\"prop\">border-radius</span>: <span class=\"val\">100px</span>; <span class=\"cm\">/* Pill shape */</span><br>\n          &nbsp;&nbsp;<span class=\"prop\">transition</span>: <span class=\"str\">all 0.3s ease</span>; <span class=\"cm\">/* Smooth hover */</span><br>\n          }<br>\n          <span class=\"sel\">button:hover</span> {<br>\n          &nbsp;&nbsp;<span class=\"prop\">transform</span>: <span class=\"val\">translateY(-3px)</span>; <span class=\"cm\">/* Lifts on hover */</span><br>\n          }\n        </div>\n      </div>\n    </div>\n\n    <h3 class=\"h3\" style=\"margin:36px 0 16px\">The most powerful CSS concept: Custom Properties</h3>\n    <p class=\"body-text\">Great sites define their entire design system as CSS variables at the top of the file \u2014 like a brand book translated into code. Change one value and it updates everywhere. This is what makes sites feel consistent.</p>\n\n    <div class=\"code-block reveal\">\n      <span class=\"code-label\">Design System</span>\n      <span class=\"sel\">:root</span> {<br>\n      &nbsp;&nbsp;<span class=\"cm\">/* Your entire color palette in one place */</span><br>\n      &nbsp;&nbsp;<span class=\"prop\">--bg</span>: <span class=\"val\">#f6f4f0</span>;    <span class=\"cm\">/* Background \u2014 never pure white */</span><br>\n      &nbsp;&nbsp;<span class=\"prop\">--ink</span>: <span class=\"val\">#100f0d</span>;   <span class=\"cm\">/* Text \u2014 never pure black */</span><br>\n      &nbsp;&nbsp;<span class=\"prop\">--fire</span>: <span class=\"val\">#e8500a</span>;  <span class=\"cm\">/* Your accent color */</span><br><br>\n      &nbsp;&nbsp;<span class=\"cm\">/* Typography */</span><br>\n      &nbsp;&nbsp;<span class=\"prop\">--font-display</span>: <span class=\"str\">'Bricolage Grotesque'</span>;<br>\n      &nbsp;&nbsp;<span class=\"prop\">--font-body</span>: <span class=\"str\">'Plus Jakarta Sans'</span>;<br><br>\n      &nbsp;&nbsp;<span class=\"cm\">/* Shadows, radii, spacing */</span><br>\n      &nbsp;&nbsp;<span class=\"prop\">--sh2</span>: <span class=\"val\">0 8px 32px rgba(0,0,0,.08)</span>;<br>\n      &nbsp;&nbsp;<span class=\"prop\">--radius</span>: <span class=\"val\">14px</span>;<br>\n      }\n    </div>\n\n    <div class=\"callout-blue callout reveal\">\n      <p class=\"callout-label\">This Is What Claude Manages For You</p>\n      <p>When you tell Claude \"make the button more rounded\" or \"the accent color should be more orange,\" it's editing CSS. When you say \"everything feels too small on mobile,\" Claude adjusts CSS breakpoints. You don't write any of this \u2014 but knowing it's CSS means you describe changes accurately and get results immediately.</p>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"divider\"></div>\n\n<!-- SECTION: JAVASCRIPT -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">Layer 3</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">JavaScript: making things happen.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:48px\">You'll interact with JavaScript the least directly. But you need to know what it does so you can ask for it correctly.</p>\n\n  <div class=\"three-col\">\n    <div class=\"card-sm reveal\">\n      <div style=\"font-size:28px;margin-bottom:16px\">\ud83d\uddb1\ufe0f</div>\n      <div class=\"h3\" style=\"margin-bottom:10px\">User Interactions</div>\n      <p class=\"body-text\" style=\"font-size:13px\">Click a button \u2192 something changes. Type in a search box \u2192 results appear. Submit a form \u2192 data is sent. All of this is JavaScript responding to events.</p>\n    </div>\n    <div class=\"card-sm reveal\">\n      <div style=\"font-size:28px;margin-bottom:16px\">\ud83c\udfac</div>\n      <div class=\"h3\" style=\"margin-bottom:10px\">Scroll Animations</div>\n      <p class=\"body-text\" style=\"font-size:13px\">When elements animate as you scroll, that's JavaScript watching your scroll position and triggering CSS changes at the right moment. GSAP ScrollTrigger (which Claude uses) handles this elegantly.</p>\n    </div>\n    <div class=\"card-sm reveal\">\n      <div style=\"font-size:28px;margin-bottom:16px\">\ud83d\udcca</div>\n      <div class=\"h3\" style=\"margin-bottom:10px\">Live Data</div>\n      <p class=\"body-text\" style=\"font-size:13px\">Your sales dashboard shows live numbers \u2014 that's JavaScript fetching data from a Google Sheet and updating the page. Without JS, a page can't talk to external data sources.</p>\n    </div>\n  </div>\n\n  <div class=\"callout-amber callout reveal\" style=\"margin-top:16px\">\n    <p class=\"callout-label\">Libraries You'll Encounter</p>\n    <p><strong style=\"color:var(--ink)\">GSAP</strong> \u2014 The professional animation library. Makes scroll-driven animations, complex timelines, and smooth transitions easy. Used on most Awwwards sites. Claude knows it well.<br><br>\n    <strong style=\"color:var(--ink)\">Lenis.js</strong> \u2014 Smooth scroll inertia. Makes the page glide instead of jump when you scroll. That buttery feeling on premium sites? Usually Lenis.<br><br>\n    <strong style=\"color:var(--ink)\">Chart.js</strong> \u2014 Data visualisation. Used in your sales dashboard. Turns raw numbers into animated charts.</p>\n  </div>\n</div>\n</section>\n\n<div class=\"divider\"></div>\n\n<!-- SECTION: VERCEL AND DEPLOYMENT -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">The Final Piece</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">Hosting: giving your files a URL the world can visit.</h2>\n    <p class=\"body-text\">You've built a beautiful site. It's a file sitting on your computer. Right now, nobody else can see it. Hosting puts it on a server \u2014 a computer that's always on, always connected to the internet \u2014 and assigns it a URL.</p>\n    <p class=\"body-text\">You already use Vercel. Here's what actually happens when you drag a file in:</p>\n\n    <div class=\"num-list\" style=\"margin:32px 0\">\n      <div class=\"num-item reveal\">\n        <div class=\"num\">01</div>\n        <div>\n          <div class=\"num-title\">You upload your index.html file</div>\n          <div class=\"num-desc\">Vercel receives your file and stores it on their global network of servers \u2014 called a CDN (Content Delivery Network). This means your site is physically close to every user in the world, making it fast everywhere.</div>\n        </div>\n      </div>\n      <div class=\"num-item reveal\">\n        <div class=\"num\">02</div>\n        <div>\n          <div class=\"num-title\">Vercel assigns a URL</div>\n          <div class=\"num-desc\">Automatically, you get yourproject.vercel.app. This is a real URL on the internet. Anyone with it can visit your site. You can also connect a custom domain \u2014 like sachit.design \u2014 for a professional address.</div>\n        </div>\n      </div>\n      <div class=\"num-item reveal\">\n        <div class=\"num\">03</div>\n        <div>\n          <div class=\"num-title\">HTTPS is automatic</div>\n          <div class=\"num-desc\">The padlock icon in browsers (meaning the connection is secure and encrypted) is called HTTPS. Vercel sets this up automatically. Professional sites always have it \u2014 it's a trust signal and affects Google rankings.</div>\n        </div>\n      </div>\n      <div class=\"num-item reveal\">\n        <div class=\"num\">04</div>\n        <div>\n          <div class=\"num-title\">Updates deploy instantly</div>\n          <div class=\"num-desc\">Drag in a new version of the file. Vercel deploys it in seconds. No downtime, no waiting, no technical setup. This is why Vercel changed web development \u2014 iteration speed is now a design advantage.</div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"two-col\" style=\"margin-top:0\">\n      <div class=\"card-sm\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:14px\">Vercel vs GitHub Pages vs Netlify</div>\n        <p class=\"body-text\" style=\"font-size:13px\"><strong>Vercel</strong> \u2014 Best developer experience. Fastest deploys. Best analytics. Your default.<br><br>\n        <strong>Netlify</strong> \u2014 Similar to Vercel. Slightly simpler for beginners. Good for forms.<br><br>\n        <strong>GitHub Pages</strong> \u2014 Free, but requires a GitHub account. Slower workflow. Skip this for now.</p>\n      </div>\n      <div class=\"card-sm\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:14px\">Custom Domains</div>\n        <p class=\"body-text\" style=\"font-size:13px\">Buy a domain from Namecheap or Cloudflare (~\u20b9800/year for a .com). Connect it to Vercel in their dashboard under \"Domains.\" Point two DNS records as instructed. Done in 5 minutes, live in under an hour. Worth doing for any serious project.</p>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"divider\"></div>\n\n<!-- SECTION: DEV TOOLS INTRO -->\n<section>\n<div class=\"wrap\">\n  <p class=\"eyebrow reveal\">Your Secret Weapon</p>\n  <h2 class=\"h2 reveal\" style=\"margin-bottom:16px\">DevTools: x-ray vision for any website.</h2>\n  <p class=\"lead reveal\" style=\"margin-bottom:48px\">Right-click on any website. Click \"Inspect.\" You now have complete access to every design decision that site has ever made. Colors. Fonts. Spacing. Animations. All exposed.</p>\n\n  <div class=\"card reveal\">\n    <h3 class=\"h3\" style=\"margin-bottom:24px\">The four DevTools panels you need to know</h3>\n    <div class=\"num-list\">\n      <div class=\"num-item\">\n        <div class=\"num\">01</div>\n        <div>\n          <div class=\"num-title\">Elements \u2014 The HTML tree</div>\n          <div class=\"num-desc\">Left panel. Shows the full HTML structure of the page. Hover over any element to see it highlighted on screen. Click it to inspect its CSS in the right panel. This is how you find exactly which part of the code controls what you're looking at.</div>\n        </div>\n      </div>\n      <div class=\"num-item\">\n        <div class=\"num\">02</div>\n        <div>\n          <div class=\"num-title\">Styles \u2014 Live CSS editing</div>\n          <div class=\"num-desc\">Right panel when an element is selected. Shows all CSS applied to that element. Click any value and type a new one \u2014 the page updates live. Want to know what font a site uses? Hover the text, inspect it, look for font-family. It's right there.</div>\n        </div>\n      </div>\n      <div class=\"num-item\">\n        <div class=\"num\">03</div>\n        <div>\n          <div class=\"num-title\">Network \u2014 What files load and how fast</div>\n          <div class=\"num-desc\">Shows every file the page downloads: images, fonts, scripts. Reveals performance issues. If a site feels slow, the Network tab tells you why \u2014 usually huge images or too many JavaScript files. This is also where you can see API calls.</div>\n        </div>\n      </div>\n      <div class=\"num-item\">\n        <div class=\"num\">04</div>\n        <div>\n          <div class=\"num-title\">Console \u2014 JavaScript errors and logs</div>\n          <div class=\"num-desc\">When something doesn't work on a page, the Console shows the error. When Claude builds something and it's broken, screenshot the Console \u2014 paste it to Claude \u2014 and it can fix the exact bug instantly.</div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"callout reveal\" style=\"margin-top:28px\">\n      <p class=\"callout-label\">The Power Move</p>\n      <p>Go to any Awwwards winner. Open DevTools. Look at the CSS for the headline. Note the font-family, font-size, and letter-spacing. Look at the body text. Check the color variables in :root. In 2 minutes you've reverse-engineered their entire design system. This is how designers learn \u2014 by studying what works.</p>\n    </div>\n  </div>\n</div>\n</section>\n\n<div class=\"divider\"></div>\n\n<!-- EXERCISE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"exercise reveal\">\n    <p class=\"eyebrow\" style=\"color:var(--jade)\">Chapter 01 \u2014 Exercise</p>\n    <h2 class=\"ex-title\">Dissect a site you love.</h2>\n    <p class=\"ex-desc\">Before touching any design tool, train your eye. Pick any website you admire \u2014 could be a brand you love, an app you use daily, or something from awwwards.com. You're going to reverse-engineer it using only your browser.</p>\n\n    <div class=\"ex-steps\">\n      <div class=\"ex-step\">\n        <div class=\"ex-n\">01</div>\n        <div class=\"ex-text\">Open your chosen site. Right-click anywhere \u2192 <strong>Inspect</strong> (or press F12). The DevTools panel opens.</div>\n      </div>\n      <div class=\"ex-step\">\n        <div class=\"ex-n\">02</div>\n        <div class=\"ex-text\">Click the cursor icon (top-left of DevTools) and hover over the main headline. In the Styles panel, find <strong>font-family</strong>. What font is it?</div>\n      </div>\n      <div class=\"ex-step\">\n        <div class=\"ex-n\">03</div>\n        <div class=\"ex-text\">Find the background color and main text color. Look for <strong>color</strong> and <strong>background</strong> or <strong>background-color</strong> in the Styles panel. Write them down.</div>\n      </div>\n      <div class=\"ex-step\">\n        <div class=\"ex-n\">04</div>\n        <div class=\"ex-text\">Scroll the page slowly. Watch what happens. Do elements appear? Does anything move? That's JavaScript + CSS animation working together.</div>\n      </div>\n      <div class=\"ex-step\">\n        <div class=\"ex-n\">05</div>\n        <div class=\"ex-text\">Now take what you found and describe it back to Claude: <strong>\"Build me a site that uses [font] with [color palette] and [animation style].\"</strong> See what happens.</div>\n      </div>\n    </div>\n  </div>\n</div>\n</section>\n\n<!-- CHAPTER FOOTER -->\n<div class=\"ch-footer\">\n  <div class=\"ch-footer-inner\">\n    <a href=\"index.html\" class=\"ch-btn prev\">\n      <span class=\"ch-btn-arr\">\u2190</span>\n      <div><div class=\"ch-btn-label\">Back to</div><div class=\"ch-btn-title\">Course Overview</div></div>\n    </a>\n    <div class=\"ch-center\">\n      <div style=\"margin-bottom:6px\">Chapter 01 of 12</div>\n      <a href=\"index.html\">Design Mastery</a>\n    </div>\n    <a href=\"chapter-02.html\" class=\"ch-btn next\">\n      <div><div class=\"ch-btn-label\">Next Chapter</div><div class=\"ch-btn-title\">Visual Design Laws</div></div>\n      <span class=\"ch-btn-arr\">\u2192</span>\n    </a>\n  </div>\n</div>\n\n<script>\ngsap.registerPlugin(ScrollTrigger);\nwindow.addEventListener('scroll',()=>{const s=document.documentElement.scrollTop,h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('pb').style.width=(s/h*100)+'%'});\ngsap.utils.toArray('.reveal').forEach((el,i)=>{gsap.fromTo(el,{opacity:0,y:44},{opacity:1,y:0,duration:.85,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 84%'},delay:(i%3)*.07})});\n<\/script>\n</body>\n</html>\n"</script>
<script type="application/json" id="ch-data-1">"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ch 02 \u2014 Visual Design Laws \u00b7 Design Mastery</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap\" rel=\"stylesheet\">\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js\"><\/script>\n<style>\n:root{--bg:#f6f4f0;--bg2:#edeae4;--bg3:#e4e0d8;--surface:rgba(255,255,255,.80);--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.06);--ink:#100f0d;--ink2:#45433f;--ink3:#8c8880;--ink4:#b5b2ac;--fire:#e8500a;--amber:#d4880a;--amber2:#eaac40;--sapphire:#2e6fd4;--jade:#1f7a5c;--glass:rgba(255,255,255,.65);--glass2:rgba(255,255,255,.42);--sh2:0 8px 32px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.05);--sh3:0 20px 60px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.06);--sh4:0 40px 100px rgba(0,0,0,.13),0 8px 24px rgba(0,0,0,.07);--r1:8px;--r2:14px;--r3:22px;--ease-out:cubic-bezier(0.16,1,0.3,1);--ease-io:cubic-bezier(0.4,0,0.2,1)}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}*{scrollbar-width:none}*::-webkit-scrollbar{display:none}\nbody{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden}a{color:inherit;text-decoration:none}\nbody::after{content:'';position:fixed;inset:0;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E\");pointer-events:none;z-index:9999;opacity:.5}\n.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}\n.o1{width:600px;height:600px;background:radial-gradient(circle,rgba(46,111,212,.10),transparent 68%);top:-150px;right:-100px;animation:oA 22s ease-in-out infinite}\n.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(212,136,10,.08),transparent 68%);bottom:-80px;left:-80px;animation:oB 28s ease-in-out infinite}\n@keyframes oA{0%,100%{transform:translate(0,0)}40%{transform:translate(-40px,60px)}70%{transform:translate(30px,-40px)}}\n@keyframes oB{0%,100%{transform:translate(0,0)}35%{transform:translate(60px,-30px)}65%{transform:translate(-40px,50px)}}\n.progress-bar{position:fixed;top:0;left:0;height:2px;z-index:1000;background:linear-gradient(90deg,var(--sapphire),var(--amber2));width:0%;transition:width .1s linear;box-shadow:0 0 12px rgba(46,111,212,.4)}\nnav{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:500;background:var(--glass);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid var(--border);border-radius:100px;padding:10px 22px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh2);opacity:0;animation:navIn .7s var(--ease-out) .4s forwards;white-space:nowrap}\n@keyframes navIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}\n.nav-home{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-right:14px;border-right:1px solid var(--border)}\n.nav-ch{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--sapphire);font-weight:500}\n.wrap{max-width:900px;margin:0 auto;padding:0 32px}\n.wrap-wide{max-width:1100px;margin:0 auto;padding:0 32px}\nsection{position:relative;z-index:10;padding:100px 0}\nsection.hero-sec{min-height:100vh;display:flex;align-items:center;padding:80px 0}\n.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);position:relative;z-index:10}\n.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--sapphire);display:flex;align-items:center;gap:12px;margin-bottom:18px}\n.eyebrow::before{content:'';width:28px;height:1px;background:var(--sapphire);flex-shrink:0}\n.eyebrow-fire{color:var(--fire)}.eyebrow-fire::before{background:var(--fire)}\n.eyebrow-jade{color:var(--jade)}.eyebrow-jade::before{background:var(--jade)}\n.display{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink)}\n.display em{font-style:normal;background:linear-gradient(135deg,var(--sapphire),var(--amber2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.035em;line-height:1.1;color:var(--ink)}\n.h3{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.1rem,2vw,1.5rem);font-weight:700;letter-spacing:-.025em;line-height:1.2;color:var(--ink)}\n.lead{font-size:clamp(1rem,1.5vw,1.12rem);color:var(--ink2);line-height:1.8}\n.body-text{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:20px}\n.body-text:last-child{margin-bottom:0}\n.card{background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh3);padding:52px;position:relative;overflow:hidden}\n.card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.card-sm{background:var(--glass2);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);padding:32px;position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s,background .3s}\n.card-sm::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.55) 0%,transparent 50%);pointer-events:none;border-radius:inherit}\n.card-sm:hover{transform:translateY(-6px);box-shadow:var(--sh3);background:var(--glass)}\n.callout{padding:24px 28px;border-radius:var(--r2);border-left:3px solid var(--fire);background:rgba(232,80,10,.04);margin:28px 0}\n.callout-blue{border-color:var(--sapphire);background:rgba(46,111,212,.04)}\n.callout-amber{border-color:var(--amber);background:rgba(212,136,10,.04)}\n.callout-jade{border-color:var(--jade);background:rgba(31,122,92,.04)}\n.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fire);margin-bottom:10px}\n.callout-blue .callout-label{color:var(--sapphire)}\n.callout-amber .callout-label{color:var(--amber)}\n.callout-jade .callout-label{color:var(--jade)}\n.callout p{font-size:14px;color:var(--ink2);line-height:1.75}\n.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:32px 0}\n.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:32px 0}\n\n/* LAW CARDS */\n.law-card{padding:40px 36px;background:var(--glass);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh2);position:relative;overflow:hidden;transition:transform .4s var(--ease-out),box-shadow .4s}\n.law-card::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;border-radius:inherit}\n.law-card:hover{transform:translateY(-6px);box-shadow:var(--sh4)}\n.law-num{font-family:'Bricolage Grotesque',sans-serif;font-size:80px;font-weight:800;letter-spacing:-.06em;line-height:1;color:rgba(0,0,0,.04);position:absolute;right:24px;top:16px;transition:color .3s}\n.law-card:hover .law-num{color:rgba(0,0,0,.06)}\n.law-icon{font-size:32px;margin-bottom:20px;display:block}\n.law-name{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.3rem,2.5vw,1.9rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:14px;line-height:1.2}\n.law-tagline{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:20px}\n.law-body{font-size:14px;color:var(--ink2);line-height:1.78;margin-bottom:24px}\n.law-example{padding:16px 20px;background:var(--bg2);border-radius:var(--r1);border-left:2px solid var(--sapphire)}\n.law-example-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sapphire);margin-bottom:6px}\n.law-example p{font-size:13px;color:var(--ink2);line-height:1.6}\n.law-grid-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}\n.law-bad,.law-good{padding:16px;border-radius:var(--r1);font-size:13px;line-height:1.6}\n.law-bad{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.12);color:var(--ink2)}\n.law-good{background:rgba(31,122,92,.06);border:1px solid rgba(31,122,92,.12);color:var(--ink2)}\n.law-bad::before{content:'\u2717  ';color:#ef4444;font-weight:700}\n.law-good::before{content:'\u2713  ';color:var(--jade);font-weight:700}\n\n/* VISUAL DEMOS */\n.hier-demo{display:flex;flex-direction:column;gap:8px;padding:28px;background:var(--bg2);border-radius:var(--r2);margin:20px 0;border:1px solid var(--border2)}\n.hier-h1{font-family:'Bricolage Grotesque',sans-serif;font-size:40px;font-weight:800;letter-spacing:-.04em;color:var(--ink);line-height:1.1}\n.hier-h2{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--ink2)}\n.hier-body{font-size:14px;color:var(--ink3);line-height:1.6;max-width:420px}\n.hier-cta{display:inline-block;padding:8px 20px;background:var(--fire);color:white;border-radius:100px;font-size:12px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-top:4px}\n\n.space-demo{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0}\n.space-bad-ex{padding:10px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border2)}\n.space-bad-ex .inner{background:var(--bg3);padding:6px;border-radius:var(--r1);display:flex;flex-direction:column;gap:3px}\n.space-bad-ex .bl{height:8px;background:rgba(0,0,0,.1);border-radius:2px}\n.space-bad-ex .bl.tall{height:14px}\n.space-bad-ex .bl.w60{width:60%}\n.space-bad-ex .bl.w80{width:80%}\n.space-good-ex{padding:10px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border2)}\n.space-good-ex .inner{background:var(--bg3);padding:16px;border-radius:var(--r1);display:flex;flex-direction:column;gap:10px}\n.space-good-ex .bl{height:8px;background:rgba(0,0,0,.12);border-radius:2px}\n.space-good-ex .bl.tall{height:16px}\n.space-good-ex .bl.w60{width:60%}\n.space-good-ex .bl.w80{width:80%}\n.demo-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-align:center;margin-top:8px}\n\n/* EXERCISE */\n.exercise{background:linear-gradient(135deg,rgba(31,122,92,.07),rgba(255,255,255,.4));border:1px solid rgba(31,122,92,.2);border-radius:var(--r3);padding:48px;position:relative;overflow:hidden;margin:48px 0}\n.exercise::before{content:'EXERCISE';position:absolute;top:24px;right:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(31,122,92,.4)}\n.ex-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}\n.ex-desc{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:28px}\n.ex-steps{display:flex;flex-direction:column;gap:12px}\n.ex-step{display:grid;grid-template-columns:32px 1fr;gap:14px;align-items:start;padding:16px 20px;background:rgba(255,255,255,.5);border-radius:var(--r2);border:1px solid rgba(31,122,92,.1)}\n.ex-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--jade);font-weight:500}\n.ex-text{font-size:14px;color:var(--ink2);line-height:1.65}\n.ex-text strong{color:var(--ink)}\n\n/* CHAPTER FOOTER */\n.ch-footer{position:relative;z-index:10;padding:60px 0 80px;border-top:1px solid var(--border)}\n.ch-footer-inner{max-width:900px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}\n.ch-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .35s var(--ease-out);text-decoration:none;color:inherit}\n.ch-btn:hover{background:var(--glass);box-shadow:var(--sh2);transform:translateY(-3px)}\n.ch-btn-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}\n.ch-btn-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}\n.ch-btn.next{flex-direction:row-reverse;text-align:right}\n.ch-btn-arr{font-size:20px;color:var(--ink3);transition:transform .3s}\n.ch-btn.prev:hover .ch-btn-arr{transform:translateX(-4px)}\n.ch-btn.next:hover .ch-btn-arr{transform:translateX(4px)}\n.ch-center{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink4);text-align:center}\n.ch-center a{color:var(--fire)}\n.reveal{opacity:0;transform:translateY(40px)}\n@media(max-width:768px){.two-col,.three-col,.law-grid-pair,.space-demo{grid-template-columns:1fr}.card{padding:32px 24px}.ch-footer-inner{flex-direction:column}}\n@media(max-width:480px){nav{display:none}}\n</style>\n</head>\n<body>\n\n<div class=\"orb o1\"></div><div class=\"orb o2\"></div>\n\n\n\n<section class=\"hero-sec\">\n<div class=\"wrap\">\n  <div style=\"opacity:0;animation:fU .7s cubic-bezier(0.16,1,0.3,1) .5s forwards\"><p class=\"eyebrow\">Chapter 02 \u2014 Foundation</p></div>\n  <h1 class=\"display\" style=\"opacity:0;animation:fU .9s cubic-bezier(0.16,1,0.3,1) .65s forwards;margin-bottom:28px\">The laws<br>of <em>visual</em><br>design.</h1>\n  <p class=\"lead\" style=\"opacity:0;animation:fU .9s cubic-bezier(0.16,1,0.3,1) .8s forwards;max-width:580px;margin-bottom:40px\">These aren't opinions or trends. They're the underlying principles that govern why certain things look good and others don't \u2014 the same rules Vignelli, M\u00fcller-Brockmann, and every Awwwards winner has used.</p>\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fU .7s cubic-bezier(0.16,1,0.3,1) .95s forwards\">\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:var(--glass2);border:1px solid var(--border2);border-radius:100px;color:var(--ink3)\">~30 min read</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(31,122,92,.08);border:1px solid rgba(31,122,92,.18);border-radius:100px;color:var(--jade)\">1 exercise</span>\n    <span style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;background:rgba(46,111,212,.08);border:1px solid rgba(46,111,212,.18);border-radius:100px;color:var(--sapphire)\">Foundation</span>\n  </div>\n</div>\n</section>\n<style>@keyframes fU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}</style>\n<div class=\"divider\"></div>\n\n<!-- INTRO -->\n<section>\n<div class=\"wrap\">\n  <div class=\"card reveal\">\n    <p class=\"eyebrow\">Before the Laws</p>\n    <h2 class=\"h2\" style=\"margin-bottom:20px\">Design is not taste. It's a skill with rules.</h2>\n    <p class=\"body-text\">Most people think design is about having good taste \u2014 some innate ability to know what looks right. That's wrong. Design is a discipline with documented principles developed over 100+ years of practice. Mondrian, Bauhaus, Swiss Style, Apple \u2014 they all follow the same underlying laws.</p>\n    <p class=\"body-text\">The good news: these laws are learnable. Once you understand them, you'll never look at a website the same way. You'll see <em>why</em> something works or fails, rather than just feeling it. That's the leap from viewer to designer.</p>\n    <div class=\"callout-blue callout\">\n      <p class=\"callout-label\">Your New Superpower</p>\n      <p>When you can articulate why something is bad \u2014 \"the hierarchy is broken because the subheading is heavier than the headline\" \u2014 you give Claude instructions that produce the fix on the first try. Designers don't say \"make it better.\" They say \"the visual weight is off \u2014 the body text competes with the heading.\" Precision produces results.</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- LAW 1: HIERARCHY -->\n<section>\n<div class=\"wrap\">\n  <div class=\"law-card reveal\">\n    <div class=\"law-num\">01</div>\n    <span class=\"law-icon\">\ud83d\udc41</span>\n    <div class=\"law-name\">Hierarchy \u2014 Tell them where to look first.</div>\n    <div class=\"law-tagline\">The most fundamental law of visual design.</div>\n    <p class=\"law-body\">Every page has one most important thing. Your eye needs to land somewhere first, then second, then third. Without hierarchy, everything shouts at equal volume and the user is paralysed. Hierarchy is created through size, weight, color, contrast, and position. The bigger, bolder, and higher something is, the more important it reads.</p>\n    <p class=\"law-body\">Apple's homepage is a masterclass: one product photo, one headline, one subheadline, two buttons. Every element knows its rank. Nothing competes. Your eye travels down a clear path.</p>\n\n    <div class=\"hier-demo\">\n      <div class=\"hier-h1\">The Headline Commands</div>\n      <div class=\"hier-h2\">The subheading supports</div>\n      <div class=\"hier-body\">Body text explains the detail in a quieter voice \u2014 smaller, lighter, more color. It knows its place in the hierarchy.</div>\n      <div><span class=\"hier-cta\">Primary Action</span></div>\n    </div>\n\n    <div class=\"law-example\">\n      <div class=\"law-example-label\">Real World</div>\n      <p>Visit stripe.com. Squint until everything blurs. What do you see first? Second? Third? That blur exercise reveals the pure hierarchy \u2014 color and size stripped away, only weight and position remain.</p>\n    </div>\n    <div class=\"law-grid-pair\">\n      <div class=\"law-bad\">Every text block is the same size and weight. Nothing stands out. The user doesn't know where to start.</div>\n      <div class=\"law-good\">One giant headline, one smaller subhead, small body text. Clear rank order. The eye follows a deliberate path.</div>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- LAW 2: WHITE SPACE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"law-card reveal\">\n    <div class=\"law-num\">02</div>\n    <span class=\"law-icon\">\u2b1c</span>\n    <div class=\"law-name\">White Space \u2014 Empty is not wasted.</div>\n    <div class=\"law-tagline\">The single most misunderstood concept in web design.</div>\n    <p class=\"law-body\">Amateurs fill every gap. Luxury brands leave massive empty space and charge 10x. White space (also called negative space) gives content room to breathe. It signals confidence \u2014 a design that's generous with space says \"we don't need to fight for your attention.\"</p>\n    <p class=\"law-body\">Apple, Loewe, Aman Hotels, Loro Piana \u2014 these brands use space as a premium signal. Their sites feel expensive before you read a word, because they're not desperate. Every crowded website, by contrast, feels like a street market stall.</p>\n\n    <div class=\"space-demo\">\n      <div>\n        <div class=\"space-bad-ex\">\n          <div class=\"inner\">\n            <div class=\"bl tall w80\"></div>\n            <div class=\"bl w60\"></div>\n            <div class=\"bl w80\"></div>\n            <div class=\"bl w60\"></div>\n            <div class=\"bl tall w80\"></div>\n            <div class=\"bl w80\"></div>\n            <div class=\"bl w60\"></div>\n          </div>\n        </div>\n        <div class=\"demo-label\">Cramped \u2014 no space to breathe</div>\n      </div>\n      <div>\n        <div class=\"space-good-ex\">\n          <div class=\"inner\">\n            <div class=\"bl tall w80\"></div>\n            <div class=\"bl w60\"></div>\n            <div class=\"bl w80\"></div>\n          </div>\n        </div>\n        <div class=\"demo-label\">Generous \u2014 confident &amp; premium</div>\n      </div>\n    </div>\n\n    <div class=\"law-example\">\n      <div class=\"law-example-label\">The Rule of Thumb</div>\n      <p>Whatever spacing you think looks right \u2014 double it. Then double it again. Most beginners are still using too little space after tripling their initial instinct. Look at any site you admire and use DevTools to check their padding values. You'll be surprised how generous they are.</p>\n    </div>\n    <div class=\"callout-amber callout\" style=\"margin-top:20px\">\n      <p class=\"callout-label\">Prompt Template</p>\n      <p>Tell Claude: \"The spacing between sections feels too tight \u2014 increase it significantly. The design should feel generous and confident, not cramped. Add at least 120px of padding above and below each section.\"</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- LAW 3: CONTRAST -->\n<section>\n<div class=\"wrap\">\n  <div class=\"law-card reveal\">\n    <div class=\"law-num\">03</div>\n    <span class=\"law-icon\">\u25d0</span>\n    <div class=\"law-name\">Contrast \u2014 Create tension. Create interest.</div>\n    <div class=\"law-tagline\">Without contrast, design is noise.</div>\n    <p class=\"law-body\">Contrast is the engine of visual interest. Big vs small. Dark vs light. Serif vs sans-serif. Detailed vs minimal. Fast animation vs slow. Contrast creates drama on a flat screen. Without it, everything feels same-same \u2014 the visual equivalent of a monotone voice.</p>\n    <p class=\"law-body\">The most powerful contrast in web design is typographic: a massive display headline next to tiny mono text. This single pairing appears in nearly every Awwwards winner. The extremity of the contrast is what makes it work \u2014 a small size difference creates hierarchy, a huge size difference creates art.</p>\n\n    <div style=\"padding:32px;background:var(--bg2);border-radius:var(--r2);margin:20px 0;border:1px solid var(--border2);position:relative;overflow:hidden\">\n      <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(48px,8vw,80px);font-weight:800;letter-spacing:-.05em;line-height:.95;color:var(--ink);margin-bottom:16px\">Massive contrast</div>\n      <div style=\"font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3)\">tiny supporting text in mono \u2014 the extreme size gap creates drama</div>\n    </div>\n\n    <div class=\"law-example\">\n      <div class=\"law-example-label\">Types of Contrast You Can Use</div>\n      <p><strong>Size contrast:</strong> 80px headline + 11px mono label<br>\n      <strong>Weight contrast:</strong> 800 weight display + 300 weight body<br>\n      <strong>Color contrast:</strong> Dark background + one bright accent<br>\n      <strong>Style contrast:</strong> Serif headline + sans-serif body<br>\n      <strong>Motion contrast:</strong> Slow background + fast foreground elements<br>\n      <strong>Space contrast:</strong> Dense text block + vast empty section</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- LAW 4: CONSISTENCY -->\n<section>\n<div class=\"wrap\">\n  <div class=\"law-card reveal\">\n    <div class=\"law-num\">04</div>\n    <span class=\"law-icon\">\ud83d\udd17</span>\n    <div class=\"law-name\">Consistency \u2014 The silent system.</div>\n    <div class=\"law-tagline\">What separates a designed system from a collection of pages.</div>\n    <p class=\"law-body\">Pick your colors, fonts, border radii, shadows, spacing units and stick to them everywhere. Users absorb visual patterns unconsciously. When the same design language appears consistently, they feel a coherent world. When it breaks, something feels wrong \u2014 even if they can't say what.</p>\n    <p class=\"law-body\">Notion, Linear, Stripe \u2014 load any page on these sites and it instantly feels like the same company. Same typeface, same spacing rhythm, same button styles, same motion language. That's not accidental \u2014 it's a design system, and it builds deep trust.</p>\n\n    <div class=\"two-col\" style=\"margin-top:20px\">\n      <div class=\"card-sm\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fire);margin-bottom:14px\">Inconsistent</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:1.85\">\n          Three different fonts<br>\n          Five different button styles<br>\n          Shadow on some cards, not others<br>\n          Spacing that varies randomly<br>\n          Colors that don't repeat<br>\n          Rounded corners that change size\n        </div>\n        <div style=\"margin-top:14px;padding:10px 14px;background:rgba(239,68,68,.06);border-radius:var(--r1);border:1px solid rgba(239,68,68,.12);font-size:12px;color:var(--ink3)\">Feels: Amateur, untrustworthy</div>\n      </div>\n      <div class=\"card-sm\">\n        <div style=\"font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:14px\">Consistent System</div>\n        <div style=\"font-size:13px;color:var(--ink2);line-height:1.85\">\n          One display + one body font<br>\n          One button style, one size<br>\n          Same shadow on every card<br>\n          8pt spacing grid throughout<br>\n          2 colors used everywhere<br>\n          14px border radius, always\n        </div>\n        <div style=\"margin-top:14px;padding:10px 14px;background:rgba(31,122,92,.06);border-radius:var(--r1);border:1px solid rgba(31,122,92,.12);font-size:12px;color:var(--ink3)\">Feels: Professional, trustworthy</div>\n      </div>\n    </div>\n\n    <div class=\"callout-blue callout\">\n      <p class=\"callout-label\">How Claude Maintains Consistency</p>\n      <p>When Claude builds your pages, it uses CSS custom properties (variables) at the top of the file. <code style=\"background:rgba(0,0,0,.06);padding:2px 5px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px\">--fire: #e8500a</code> appears once \u2014 but is used 40 times throughout. Change it in one place, everything updates. This is the same system used by design teams at the largest companies in the world.</p>\n    </div>\n  </div>\n</div>\n</section>\n<div class=\"divider\"></div>\n\n<!-- LAW 5: VISUAL WEIGHT & BALANCE -->\n<section>\n<div class=\"wrap\">\n  <div class=\"law-card reveal\">\n    <div class=\"law-num\">05</div>\n    <span class=\"law-icon\">\u2696\ufe0f</span>\n    <div class=\"law-name\">Visual Weight \u2014 Balance without symmetry.</div>\n    <div class=\"law-tagline\">Great designs are balanced but rarely symmetrical.</div>\n    <p class=\"law-body\">Every element has visual weight \u2014 how \"heavy\" it feels visually. Dark colors are heavier than light ones. Large elements heavier than small. Bold type heavier than thin. Detailed textures heavier than empty space. Good design balances these weights across the page \u2014 but not necessarily
